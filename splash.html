<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="max-age=86400"/>
<link rel="dns-prefetch" href="https://i.imgur.com"/>
<link rel="dns-prefetch" href="https://corsproxy.io"/>
<link rel="dns-prefetch" href="https://api.groq.com"/>
<link rel="dns-prefetch" href="https://wallhaven.cc"/>
<link rel="preload" as="image" href="https://i.imgur.com/qFZVo7E.jpeg"/>
<link rel="preload" as="image" href="https://i.imgur.com/zXHrLyf.jpeg"/>
<link rel="preload" as="image" href="https://i.imgur.com/dTCAAK2.png"/>
<link rel="preload" as="image" href="https://i.imgur.com/D1CPYur.png"/>
<link rel="preload" as="image" href="https://i.imgur.com/zedg36b.png"/>
<link rel="preload" as="image" href="https://i.imgur.com/QdgRpoi.png"/>
<link rel="preload" as="image" href="https://i.imgur.com/eJJCxln.png"/>

<title>Ingresando a TFAPP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --neon:#8b3fff;--neon2:#ff3fa0;--neon3:#3fb8ff;
  --bg:#040008;--muted:#a090c0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:Inter,system-ui,sans-serif;color:#fff;background:var(--bg);-webkit-font-smoothing:antialiased}
#bg{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  will-change:transform;
  animation:kinetic 8s ease-in-out infinite alternate;
  background-color:#0b0020;
}
@keyframes kinetic{
  0%  {transform:scale(1.18) translate(-2%,-1%)  rotate(-.3deg)}
  25% {transform:scale(1.22) translate( 2%,-2%)  rotate( .2deg)}
  50% {transform:scale(1.20) translate( 1%, 2%)  rotate(-.2deg)}
  75% {transform:scale(1.24) translate(-1%, 1%)  rotate( .3deg)}
  100%{transform:scale(1.18) translate(-2%, 0%)  rotate(  0deg)}
}
#grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.045;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
  animation:grain .12s steps(1) infinite;
}
@keyframes grain{
  0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,2%)}
  30%{transform:translate(-1%,4%)}40%{transform:translate(4%,-1%)}50%{transform:translate(-3%,2%)}
  60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,3%)}80%{transform:translate(3%,-2%)}
  90%{transform:translate(-2%,4%)}100%{transform:translate(2%,-3%)}
}
#vig{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(4,0,8,.7) 100%);
}
#scan{
  position:fixed;left:0;right:0;z-index:3;height:2px;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(139,63,255,.6),rgba(255,63,160,.6),transparent);
  filter:blur(1px);
  animation:scanLine 4s linear infinite;
  opacity:.5;
}
@keyframes scanLine{
  0%{top:-2px;opacity:0}2%{opacity:.5}98%{opacity:.3}100%{top:100%;opacity:0}
}
.corner{position:fixed;z-index:4;width:28px;height:28px;opacity:.55}
.corner svg{display:block}
.tl{top:14px;left:14px}
.tr{top:14px;right:14px;transform:scaleX(-1)}
.bl{bottom:14px;left:14px;transform:scaleY(-1)}
.br{bottom:14px;right:14px;transform:scale(-1)}
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:appIn .4s ease both}
@keyframes appIn{from{opacity:0}to{opacity:1}}
#card{
  width:clamp(300px,90vw,600px);
  border-radius:16px;
  padding:22px 20px 20px;
  display:flex;flex-direction:column;gap:16px;align-items:center;
  position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(80,20,160,.22),rgba(60,10,120,.12));
  border:1px solid rgba(139,63,255,.22);
  backdrop-filter:blur(18px) saturate(130%);
  -webkit-backdrop-filter:blur(18px) saturate(130%);
  box-shadow:
    0 0 0 1px rgba(139,63,255,.08),
    0 24px 60px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 0 40px rgba(139,63,255,.03);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) .05s both;
  cursor:pointer;
  text-align:center;
}
@keyframes cardIn{
  from{transform:translateY(20px) scale(.97);opacity:0}
  to{transform:none;opacity:1}
}
#card::before{
  content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:linear-gradient(135deg,rgba(139,63,255,.07),transparent 40%,transparent 60%,rgba(255,63,160,.05));
  animation:cardGlow 3s ease-in-out infinite alternate;
}
@keyframes cardGlow{from{opacity:.6}to{opacity:1}}
#card::after{
  content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,63,255,.4),transparent);
  top:50%;animation:glitchLine 5s ease-in-out infinite;pointer-events:none;
}
@keyframes glitchLine{
  0%,85%,100%{transform:scaleX(0);opacity:0}
  87%{transform:scaleX(1);opacity:.6}
  89%{transform:scaleX(.3);opacity:.3}
  91%{transform:scaleX(1);opacity:.5}
  93%{transform:scaleX(0);opacity:0}
}
.headline{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(17px,4.5vw,30px);letter-spacing:2px;
  color:#fff;line-height:1.15;
  text-shadow:0 0 20px rgba(139,63,255,.5),0 0 40px rgba(139,63,255,.25);
  animation:glitchText 6s ease-in-out infinite;
}
@keyframes glitchText{
  0%,88%,100%{text-shadow:0 0 20px rgba(139,63,255,.5),0 0 40px rgba(139,63,255,.25)}
  90%{text-shadow:-2px 0 rgba(255,63,160,.8),2px 0 rgba(63,184,255,.8),0 0 20px rgba(139,63,255,.5);transform:translate(-1px,0)}
  91%{text-shadow:2px 0 rgba(255,63,160,.8),-2px 0 rgba(63,184,255,.8);transform:translate(1px,0)}
  92%{text-shadow:0 0 20px rgba(139,63,255,.5);transform:none}
}
.subline{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.nbar{width:160px;height:4px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:2px}
.npulse{height:100%;width:35%;border-radius:99px;background:linear-gradient(90deg,var(--neon),var(--neon2),var(--neon3));filter:blur(1.5px);animation:npulse 1.3s ease-in-out infinite}
@keyframes npulse{0%{margin-left:-35%}100%{margin-left:100%}}
.factbox{
  width:100%;border-radius:11px;padding:14px 16px;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.factbox::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(139,63,255,.5),rgba(255,63,160,.4),transparent);
}
.fact-label{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--neon);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.fact-label::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--neon);box-shadow:0 0 6px var(--neon);display:block}
.fact-txt{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.6;text-align:left;animation:factIn .4s ease both}
@keyframes factIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.status-row{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.35)}
.status-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:sdot 1.5s ease-in-out infinite}
@keyframes sdot{0%,100%{opacity:1}50%{opacity:.3}}
.status-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.06),transparent)}
#logoWrap{
  position:fixed;bottom:0;left:0;right:0;
  z-index:11;display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:28px 20px 18px;
  background:linear-gradient(transparent, rgba(4,0,8,.82) 40%, rgba(4,0,8,.96) 100%);
  animation:logoIn .6s cubic-bezier(.22,1,.36,1) .1s both;
}
@keyframes logoIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.logo-ring{
  width:68px;height:68px;border-radius:17px;overflow:hidden;position:relative;flex-shrink:0;
  box-shadow:
    0 0 0 1px rgba(139,63,255,.5),
    0 0 8px rgba(139,63,255,.6),
    0 0 20px rgba(139,63,255,.35),
    0 0 40px rgba(139,63,255,.2),
    inset 0 0 12px rgba(139,63,255,.1);
  animation:logoGlow 2.5s ease-in-out infinite alternate;
}
@keyframes logoGlow{
  from{box-shadow:0 0 0 1px rgba(139,63,255,.5),0 0 8px rgba(139,63,255,.6),0 0 20px rgba(139,63,255,.35),0 0 40px rgba(139,63,255,.2)}
  to{box-shadow:0 0 0 1px rgba(255,63,160,.5),0 0 12px rgba(255,63,160,.6),0 0 28px rgba(255,63,160,.3),0 0 50px rgba(139,63,255,.25)}
}
.logo-ring img{width:100%;height:100%;object-fit:cover;display:block}
.logo-caption{font-size:11px;color:rgba(255,255,255,.65);text-align:center;letter-spacing:.3px;text-shadow:0 1px 8px rgba(0,0,0,.9),0 0 16px rgba(0,0,0,.7)}
.skip{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;letter-spacing:.3px;text-shadow:0 1px 6px rgba(0,0,0,.9)}
.exiting #card{animation:exitCard .35s cubic-bezier(.4,0,1,1) both}
@keyframes exitCard{to{transform:scale(.96) translateY(-10px);opacity:0}}
.exiting #logoWrap{animation:exitLogo .3s ease both}
@keyframes exitLogo{to{opacity:0;transform:translateX(-50%) translateY(6px)}}
</style>
<script>
/* FIX 1: BG + Cache API para carga offline instantanea */
(function(){
  var IMGS=[
    'https://i.imgur.com/qFZVo7E.jpeg',
    'https://i.imgur.com/zXHrLyf.jpeg',
    'https://i.imgur.com/dTCAAK2.png',
    'https://i.imgur.com/D1CPYur.png',
    'https://i.imgur.com/zedg36b.png',
    'https://i.imgur.com/QdgRpoi.png',
    'https://i.imgur.com/eJJCxln.png'
  ];
  var CACHE='tfapp-v2';
  var picked=IMGS[Math.floor(Math.random()*IMGS.length)];

  /* Escribir el fondo inmediatamente — sin flash de pantalla en blanco */
  document.write('<style>#bg{background-image:url("'+picked+'");background-color:#04000a;}</style>');

  /* Cache API en background: guarda cada imagen la primera vez con internet */
  /* La proxima apertura — con o sin internet — carga instantaneo desde cache */
  if(typeof caches!=='undefined'){
    caches.open(CACHE).then(function(cache){
      IMGS.forEach(function(src){
        cache.match(src).then(function(m){
          if(!m){
            fetch(src,{mode:'no-cors'})
              .then(function(r){
                try{cache.put(src,r);}catch(e){}
              })
              .catch(function(){
                try{new Image().src=src;}catch(e){}
              });
          }
        }).catch(function(){});
      });
    }).catch(function(){
      IMGS.forEach(function(src){new Image().src=src;});
    });
  }else{
    IMGS.forEach(function(src){new Image().src=src;});
  }
})();
</script>
</head>
<body>

<div id="bg"></div>
<div id="grain"></div>
<div id="vig"></div>
<div id="scan"></div>

<!-- Corner brackets -->
<div class="corner tl">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="rgba(139,63,255,.7)" stroke-width="1.5">
    <path d="M2 14 L2 2 L14 2"></path>
  </svg>
</div>
<div class="corner tr">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="rgba(139,63,255,.7)" stroke-width="1.5">
    <path d="M2 14 L2 2 L14 2"></path>
  </svg>
</div>
<div class="corner bl">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="rgba(139,63,255,.7)" stroke-width="1.5">
    <path d="M2 14 L2 2 L14 2"></path>
  </svg>
</div>
<div class="corner br">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="rgba(139,63,255,.7)" stroke-width="1.5">
    <path d="M2 14 L2 2 L14 2"></path>
  </svg>
</div>

<div id="app">
  <div id="card">
    <div>
      <div class="headline" id="hl">INGRESANDO A TFAPP</div>
      <div class="subline" id="sub">Cargando recursos — The Friendly Village</div>
    </div>
    <div class="nbar"><div class="npulse"></div></div>
    <div class="factbox">
      <div class="fact-label">¿Lo sabías?</div>
      <div class="fact-txt" id="fact">Cargando...</div>
    </div>
    <div class="status-row">
      <div class="status-dot"></div>
      <span id="statusTxt">Conectando con el servidor</span>
      <div class="status-line"></div>
    </div>
  </div>
</div>

<div id="logoWrap">
  <div class="logo-ring">
    <img src="https://i.imgur.com/lALmGx6.png" alt="TFV"/>
  </div>
  <div class="logo-caption">TFV no puede ver ni compartir tus datos guardados</div>
  <div class="skip">Toca para continuar</div>
</div>

<script>
(function(){
'use strict';

var FACTS=[
  'La traduccion informal de TFV ha sido "El club de la pandilla".',
  '¿La gente realmente lee estas cosas? Parece que si.',
  'Puedes escribir notas y objetivos en la app.',
  'Puedes ver anime en TFCore sin problemas.',
  'Aun estando loco, Gonza es uno de los miembros mas emblematicos y antiguos de TFV.',
  'Medina tiene una orientacion dudosa (segun rumores del grupo).',
  'La app seguira recibiendo actualizaciones. Mantente atento.',
  'El primer lore de TFV giraba alrededor de nosotros protagonizando escenarios ficticios de calidad muy dudosa.',
  'Antes TFV tenia personajes representativos: Johnny Bravo, Kronk, Kick, entre otros.',
  'La primera version de la app no tenia estos mensajes.',
  'Puedes entrar al servidor desde esta app.',
  'Alexis es el miembro mas perseguido por la administracion (historicamente).',
  'Olmos sabia muchas cosas del grupo por adelantado.',
  '¿Y el Server Duran?',
  'Dicen que si molestas demasiado al STAFF te puede pasar algo muy malo, ¿recuerdan a Jose? Exacto.',
  'Dragon Ball Super: Broly es la mejor pelicula de la franquicia.',
  'En el server los Wardens tienen mucha relevancia en el lore y son el motivo de muchos problemas.',
  'El cesped es azul por la contaminacion creada por el virus Warden.',
  '¿Algun dia nuestro administrador dejara de delirar?',
  'En TFAPP puedes descargar wallpapers, acceder a juegos, escuchar musica sin Internet y navegar por la web.',
  '¿Cuando el STAFF se reencontrara con Medina?',
  'Antes de alguna novedad en el grupo, Olmos siempre la aprueba.',
  'Existe un consejo de administradores.',
  '¿Alguna vez te has sentido observado luego de insultar al STAFF? Quizas deberias reconsiderar...',
  'ChatTFV puede generar imagenes, leer PDFs y buscar en Internet en tiempo real.',
];

var STATUSES=[
  'Conectando con el servidor',
  'Cargando modulos',
  'Iniciando sesion',
  'Verificando recursos',
  'Preparando la experiencia',
];

document.getElementById('fact').textContent=FACTS[Math.floor(Math.random()*FACTS.length)];

var si=0;
var statusEl=document.getElementById('statusTxt');
var statusInt=setInterval(function(){
  si=(si+1)%STATUSES.length;
  statusEl.style.opacity='0';
  setTimeout(function(){
    statusEl.textContent=STATUSES[si];
    statusEl.style.transition='opacity .25s';
    statusEl.style.opacity='1';
  },150);
},900);

/* FIX 2: flag _exited evita doble disparo (tap + auto-timer al mismo tiempo) */
var _exited=false;

function doExit(){
  if(_exited)return;
  _exited=true;
  clearInterval(statusInt);
  document.body.classList.add('exiting');
  setTimeout(function(){location.href='hub.html';},320);
}

/* Auto-exit despues de 4 segundos */
var _autoTimer=setTimeout(doExit,4000);

/* FIX 2: tap cancela el auto-timer y sale inmediatamente sin doble disparo */
function tapExit(){
  clearTimeout(_autoTimer);
  doExit();
}

/* Toca la tarjeta o el logo para saltar */
document.getElementById('card').addEventListener('click',tapExit);
document.getElementById('logoWrap').addEventListener('click',tapExit);

/* Tambien captura tap en cualquier lugar de la pantalla */
document.body.addEventListener('click',tapExit,{once:true,capture:true});

})();
</script>
</body>
</html>
