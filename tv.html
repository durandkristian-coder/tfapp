<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="max-age=86400"/>
<link rel="dns-prefetch" href="https://api.tmdb.org"/>
<link rel="dns-prefetch" href="https://image.tmdb.org"/>
<link rel="dns-prefetch" href="https://api.jikan.moe"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TFTV</title>
<style>
:root{--bg:#06000f;--bg2:#0e001f;--ac:#a855f7;--ac2:#7c3aed;--glass:rgba(8,0,18,.88);--text:#e8e0f8;--muted:rgba(255,255,255,.5);--border:rgba(255,255,255,.08);--gold:#f59e0b;--red:#f43f5e;--green:#22c55e;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;background:var(--bg)}
#hdr{position:fixed;top:0;left:0;right:0;z-index:400;height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;transition:background .3s}
#hdr.solid{background:rgba(6,0,15,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.h-logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0}
.h-logo img{width:30px;height:30px;border-radius:7px;object-fit:cover}
.h-logo-t{font-size:17px;font-weight:900;background:linear-gradient(90deg,#e9d5ff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hdrSearch{flex:1;min-width:0;height:32px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;padding:0 10px;transition:border-color .14s}
#hdrSearch:focus-within{border-color:rgba(168,85,247,.4);background:rgba(255,255,255,.09)}
#sIn{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12.5px;font-family:inherit;min-width:0}
#sIn::placeholder{color:var(--muted)}
#sCl{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;line-height:0;display:none;flex-shrink:0}
.h-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--text);flex-shrink:0;position:relative}
.h-btn .cnt{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--ac);font-size:8px;font-weight:800;display:grid;place-items:center;color:#fff;display:none}
#heroWrap{margin-top:0;position:relative;width:100%;overflow:hidden;background:#000}
#heroSlider{display:flex;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.hslide{flex:0 0 100%;min-width:100%;position:relative;height:calc(100vw*.56 + 80px);min-height:300px;max-height:480px;overflow:hidden}
.hslide img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.55)}
.hslide-g{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,transparent 40%,rgba(6,0,15,.6) 70%,var(--bg) 100%)}
.hslide-body{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 16px}
.hslide-tags{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.htag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(168,85,247,.25);border:1px solid rgba(168,85,247,.4);color:var(--ac)}
.htag.type{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.hslide-title{font-size:24px;font-weight:900;line-height:1.1;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.hslide-btns{display:flex;gap:8px}
.hbtn-play{height:36px;padding:0 18px;border-radius:9px;background:linear-gradient(135deg,#e91e8c,#a855f7);border:none;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 3px 14px rgba(233,30,140,.4)}
.hbtn-list{height:36px;padding:0 14px;border-radius:9px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px}
.hbtn-list.added{background:rgba(168,85,247,.25);border-color:rgba(168,85,247,.5);color:var(--ac)}
#heroDots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .25s}
.hdot.on{width:16px;border-radius:3px;background:var(--ac)}
#catBar{position:sticky;top:0;z-index:300;background:linear-gradient(to bottom,var(--bg) 80%,transparent);padding:10px 14px 8px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
#catBar::-webkit-scrollbar{display:none}
.cpill{flex:0 0 auto;height:28px;padding:0 14px;border-radius:99px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .14s;white-space:nowrap}
.cpill.on{background:linear-gradient(135deg,rgba(233,30,140,.15),rgba(168,85,247,.18));border-color:rgba(233,30,140,.65);color:#f9a8d4}
#mainContent{padding-bottom:calc(90px + var(--safe));min-height:60vh}
.crow{margin-bottom:24px}
.crow-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:8px}
.crow-title{font-size:15px;font-weight:800;color:var(--text)}
.crow-all{font-size:11px;color:var(--muted);cursor:pointer}
.crow-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 14px 4px;scrollbar-width:none}
.crow-scroll::-webkit-scrollbar{display:none}
.pcard{flex:0 0 100px;border-radius:8px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--border);position:relative;flex-shrink:0;transition:transform .15s}
.pcard:hover{transform:scale(1.04)}
.pcard-art{width:100%;aspect-ratio:2/3;overflow:hidden;background:rgba(109,36,217,.08)}
.pcard-art img{width:100%;height:100%;object-fit:cover;display:block}
.pcard-t{font-size:9.5px;font-weight:600;padding:4px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard-r{font-size:8.5px;color:var(--gold);padding:0 5px 5px}
.ph{width:100%;aspect-ratio:2/3;background:rgba(109,36,217,.1);display:grid;place-items:center}
.cwcard{flex:0 0 180px;border-radius:9px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--border);flex-shrink:0;transition:transform .15s;position:relative}
.cwcard:hover{transform:scale(1.03)}
.cwcard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.cwcard-info{padding:6px 8px 8px}
.cwcard-t{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cwcard-ep{font-size:9px;color:var(--muted);margin-top:1px}
.cwcard-bar{height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin:4px 0 0;overflow:hidden}
.cwcard-prog{height:100%;background:var(--ac);border-radius:1px;width:35%}
.cwcard-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,.72);display:grid;place-items:center;font-size:11px;color:var(--red);cursor:pointer;z-index:2}
.t10card{flex:0 0 120px;flex-shrink:0;cursor:pointer;position:relative;height:120px;transition:transform .15s}
.t10card:hover{transform:scale(1.04)}
.t10card img{position:absolute;right:0;top:0;width:78px;height:120px;object-fit:cover;border-radius:8px;display:block}
.t10card-num{position:absolute;left:0;bottom:-4px;font-size:72px;font-weight:900;line-height:1;background:linear-gradient(135deg,#e91e8c 0%,#a855f7 60%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-4px;user-select:none;font-family:"Arial Black",Impact,sans-serif;filter:drop-shadow(0 2px 8px rgba(233,30,140,.45))}
.skel{border-radius:8px;animation:sk 1.2s ease-in-out infinite}
.skel-p{width:100px;aspect-ratio:2/3;background:rgba(255,255,255,.06)}
.skel-cw{width:180px;height:100px;background:rgba(255,255,255,.06)}
@keyframes sk{0%,100%{opacity:.2}50%{opacity:.55}}
#searchView{display:none;position:fixed;inset:0;z-index:350;background:var(--bg);padding:70px 0 90px;overflow-y:auto;scrollbar-width:none}
#searchView::-webkit-scrollbar{display:none}
#searchGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 10px}
@media(min-width:420px){#searchGrid{grid-template-columns:repeat(4,1fr)}}
.sgcard{border-radius:8px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid var(--border);position:relative}
.sgcard img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.sgcard-t{font-size:9.5px;font-weight:600;padding:4px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sgcard-r{font-size:8.5px;color:var(--gold);padding:0 5px 5px}
.type-badge{position:absolute;top:4px;left:4px;font-size:7px;font-weight:800;padding:2px 5px;border-radius:3px;text-transform:uppercase;z-index:2}
.tbm{background:rgba(59,130,246,.8);color:#fff}.tbs{background:rgba(16,185,129,.8);color:#fff}.tba{background:rgba(249,115,22,.8);color:#fff}
.sibox{padding:30px 14px;text-align:center;color:var(--muted);font-size:12px}
#detBd{position:fixed;inset:0;z-index:9100;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
#detBd.open{display:flex}
#detScroll{flex:1;overflow-y:auto;scrollbar-width:none}
#detScroll::-webkit-scrollbar{display:none}
.det-hero{position:relative;width:100%;height:230px;overflow:hidden;background:#000;flex-shrink:0}
.det-hero img{width:100%;height:100%;object-fit:cover;display:block}
.det-hero-g{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(6,0,15,.98) 100%)}
.det-back{position:absolute;top:12px;left:12px;width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;cursor:pointer;color:#fff;z-index:2}
.det-body{padding:0 14px 14px}
.det-title{font-size:20px;font-weight:900;margin-bottom:5px;line-height:1.2}
.det-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.det-badge{font-size:9.5px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--muted)}
.det-badge.g{color:var(--gold);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.22)}
.det-badge.gr{color:var(--green);background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.22)}
.det-btns{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.det-play{flex:1;min-width:0;height:42px;border-radius:10px;background:linear-gradient(135deg,#e91e8c,#a855f7);border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 18px rgba(233,30,140,.35)}
.det-list{width:42px;height:42px;border-radius:10px;background:rgba(233,30,140,.08);border:1.5px solid rgba(233,30,140,.5);display:grid;place-items:center;cursor:pointer;flex-shrink:0;color:#ec4899}
.det-list.added{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:var(--ac)}
.det-trailer{height:42px;padding:0 14px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px}
.det-dl{height:42px;padding:0 14px;border-radius:10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:var(--green);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px}
.det-desc{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:10px;max-height:72px;overflow:hidden;transition:max-height .28s}
.det-desc.exp{max-height:300px}
.det-more{font-size:10px;color:var(--ac);cursor:pointer;margin-bottom:10px}
.det-genres{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.dg{font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);color:var(--ac)}
.det-sec{font-size:9px;font-weight:700;color:var(--ac);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px}
.cast-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex:0 0 58px;text-align:center;flex-shrink:0}
.cast-img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.08);margin:0 auto 3px;display:block}
.cast-name{font-size:8px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:58px}
.dl-quality{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.dl-btn{padding:9px 12px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s}
.dl-btn:hover{background:rgba(255,255,255,.09)}
.dl-qual{font-size:12px;font-weight:700}.dl-meta{font-size:9.5px;color:var(--muted)}
.eps-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.seas-sel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:10.5px;font-family:inherit;padding:3px 9px;cursor:pointer;outline:none}
option{background:#06000d;color:#fff}
.ep-list{display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto;scrollbar-width:none}
.ep-list::-webkit-scrollbar{display:none}
.ep-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:background .11s}
.ep-row:hover,.ep-row:active{background:rgba(109,36,217,.12);border-color:rgba(168,85,247,.3)}
.ep-n{font-size:9.5px;font-weight:800;color:var(--ac);min-width:24px;flex-shrink:0}
.ep-nm{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-d{font-size:9.5px;color:var(--muted);flex-shrink:0}
.ep-row.current{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.35)}
.ep-check{font-size:11px;color:var(--green);flex-shrink:0;margin-left:2px}
.mini-spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin:16px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── JK ANIME TOGGLE ── */
.jk-toggle-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-bottom:10px;cursor:pointer}
.jk-toggle-txt{font-size:11px;color:var(--muted);flex:1}
.jk-toggle-txt span{color:var(--ac);font-weight:700}
.toggle-sw{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:linear-gradient(135deg,#e91e8c,#a855f7);border-color:rgba(233,30,140,.5)}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-sw.on::after{left:18px}

/* ── FAKE PLAYER SCREEN ── */
#fakePl{position:fixed;inset:0;z-index:9500;display:none;flex-direction:column;background:#000}
#fakePl.open{display:flex}
#fpl-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(18px) brightness(.35);transform:scale(1.05)}
#fpl-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.5),rgba(6,0,15,.85))}
#fpl-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:0 16px}
#fpl-top{display:flex;align-items:center;gap:10px;padding:14px 0 0}
#fpl-back{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);border:none;display:grid;place-items:center;cursor:pointer;color:#fff;flex-shrink:0}
#fpl-title{flex:1;font-size:13px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#fpl-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#fpl-poster{width:100px;height:150px;border-radius:12px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.6);display:block}
#fpl-play{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#e91e8c,#a855f7);border:none;display:grid;place-items:center;cursor:pointer;color:#fff;box-shadow:0 0 0 8px rgba(233,30,140,.18),0 8px 28px rgba(233,30,140,.4);transition:transform .15s}
#fpl-play:active{transform:scale(.93)}
#fpl-play-spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
#fpl-opts{padding:0 0 16px}
#fpl-opts-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;text-align:center}
#fpl-chips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.fpl-chip{height:30px;padding:0 14px;border-radius:7px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .14s}
.fpl-chip.on{background:linear-gradient(135deg,rgba(233,30,140,.4),rgba(168,85,247,.4));border-color:rgba(233,30,140,.6);color:#fff}
#fpl-ext-note{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:8px}

#mlBd{position:fixed;inset:0;z-index:9200;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center}
#mlBd.open{display:flex}
#mlBox{width:min(100%,560px);max-height:70vh;background:rgba(6,0,15,.99);border:1px solid var(--border);border-radius:14px 14px 0 0;display:flex;flex-direction:column;overflow:hidden}
.ml-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ml-hdr span{font-size:14px;font-weight:800}
#mlGrid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;scrollbar-width:none}
#mlGrid::-webkit-scrollbar{display:none}
.ml-card{border-radius:7px;overflow:hidden;cursor:pointer;position:relative;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.ml-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.ml-card-t{font-size:9px;font-weight:600;padding:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ml-x{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:4px;background:rgba(0,0,0,.75);display:grid;place-items:center;color:var(--red);font-size:10px;cursor:pointer;z-index:2}
.ml-empty{padding:30px;text-align:center;color:var(--muted);font-size:12px}
#tst{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:9700;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.toast{background:rgba(6,0,15,.97);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:7px 14px;font-size:12px;color:#fff;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;white-space:nowrap}
.toast.s{opacity:1;transform:none}
</style>
</head>
<body>
<header id="hdr">
  <a class="h-logo" href="#"><img src="https://i.imgur.com/lALmGx6.png" alt="TFV" onerror="this.style.display='none'"/><span class="h-logo-t">TFTV</span></a>
  <div id="hdrSearch">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
    <input id="sIn" type="search" placeholder="Buscar series, películas, anime…" autocomplete="off" spellcheck="false"/>

/* ── ANIME TITLE MATCHING ── */
function bestTmdbMatch(results,title){
  if(!results||!results.length)return null;
  var tl=title.toLowerCase().trim();
  var exact=results.find(function(x){return(x.name||'').toLowerCase()===tl;});if(exact)return exact;
  exact=results.find(function(x){return(x.original_name||'').toLowerCase()===tl;});if(exact)return exact;
  var spinOffRe=/[\s:–—](0|zero|ii|iii|2|3|4|5|part|season|arc|vigilant|new|movie|film|ova|special)\b/i;
  var noSpin=results.find(function(x){var n=(x.name||'').toLowerCase();return n.startsWith(tl)&&!spinOffRe.test(n);});
  if(noSpin)return noSpin;
  var scored=results.map(function(x){var n=(x.name||'').toLowerCase();var score=0;if(n===tl)score+=200;else if(n.startsWith(tl)&&!spinOffRe.test(n))score+=80;else if(n.startsWith(tl))score+=30;else if(n.includes(tl.slice(0,6)))score+=10;var ld=n.length-tl.length;if(ld>5)score-=ld*3;if(spinOffRe.test(n))score-=60;score+=(x.popularity||0)*0.05;return{x:x,score:score};}).sort(function(a,b){return b.score-a.score;});
  return scored[0].x||results[0];
}

async function getAnimeTmdb(mal,title,year){

  var q=encodeURIComponent(title);

    if(year)url+='&first_air_date_year='+year;
    var r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    if(r.ok){var d=await r.json();var hit=bestTmdbMatch(d.results||[],title);if(hit){_animeTmdb[mal]=hit.id;return hit.id;}}
    var r2=await fetch(TMDB+'/search/tv?api_key='+TMDB_KEY+'&language=es-ES&query='+q,{signal:AbortSignal.timeout(5000)});
    if(r2.ok){var d2=await r2.json();var hit2=bestTmdbMatch(d2.results||[],title);if(hit2){_animeTmdb[mal]=hit2.id;return hit2.id;}}
  }catch(e){}
  return null;
}

  var defs=_CAT_ROWS[S.cat]||_CAT_ROWS.todo;
  defs.forEach(function(def){if(def.type==='mylist'&&S.myList.length===0)return;renderRowShell(container,def);});
  container.querySelectorAll('[data-row]').forEach(function(rowEl){var rowId=rowEl.dataset.row;var def=defs.find(function(d){return d.id===rowId;});if(!def)return;loadRowData(rowEl,def);});
  /* Set dynamic titles */
  setTimeout(function(){
    var recTitles=container.querySelectorAll('[data-row="rec_rec"],[data-row="rec_s"],[data-row="rec_m"],[data-row="rec_a"]');
    recTitles.forEach(function(el){
      var t=el.querySelector('.crow-title');if(!t)return;
      if(S.recent.length>0)t.textContent='Porque te gustó '+S.recent[0].title;
    });
  },0);
}
function renderRowShell(container,def){
  var div=document.createElement('div');div.className='crow';div.dataset.row=def.id;
  var hdr='<div class="crow-hdr"><div class="crow-title">'+esc(def.title)+'</div>';
  if(def.id==='mylist'||def.id==='games'){hdr+='<div class="crow-all">'+(def.id==='games'?'Ver juegos ›':'Ver todo ›')+'</div>';}
  hdr+='</div>';
  div.innerHTML=hdr+'<div class="crow-scroll" id="cs-'+def.id+'"></div>';
  container.appendChild(div);
  if(def.id==='games')div.querySelector('.crow-all').onclick=function(){window.location.href='games.html';};
  if(def.id==='mylist')div.querySelector('.crow-all').onclick=function(){renderMyListPanel();mlBd.classList.add('open');};
}
async function loadRowData(rowEl,def){
  var scroll=rowEl.querySelector('.crow-scroll');if(!scroll)return;
  for(var i=0;i<8;i++){var s=document.createElement('div');s.className='skel '+(def.type==='cw'?'skel-cw':'skel-p');scroll.appendChild(s);}
  try{
    var items=[];
    if(def.type==='cw'){items=S.recent.slice(0,12);}
    else if(def.type==='mylist'){items=S.myList.slice(0,20);}
    else if(def.type==='games'){items=[];}
    else if(_rowCache[def.id]){items=_rowCache[def.id];}
    else{items=await def.fetch();_rowCache[def.id]=items;}
    scroll.innerHTML='';
    if(!items.length){rowEl.style.display='none';return;}
    if(def.type==='cw'){renderCWRow(scroll,items,rowEl);}
    else if(def.type==='top10'){renderTop10Row(scroll,items);}
    else if(def.type==='games'){renderGamesRow(scroll);}
    else{renderStdRow(scroll,items);}
  }catch(e){rowEl.style.display='none';}
}

/* ── RENDER ROWS ── */
function renderCWRow(scroll,items,rowEl){
  items.forEach(function(r){
    var el=document.createElement('div');el.className='cwcard';
    var imgSrc=r.backdrop||r.poster;
    el.innerHTML=(imgSrc?'<img src="'+esc(imgSrc)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'')
      +'<div class="cwcard-del">×</div>'
      +'<div class="cwcard-info"><div class="cwcard-t">'+esc(r.title)+'</div><div class="cwcard-ep">'+esc(r.ep||'')+'</div><div class="cwcard-bar"><div class="cwcard-prog"></div></div></div>';
    el.querySelector('.cwcard-del').onclick=function(e){
      e.stopPropagation();
      S.recent=S.recent.filter(function(x){return!(x.id===r.id&&x.tab===r.tab);});
      lsSave();el.remove();
      /* Hide row if empty */
      if(scroll.children.length===0&&rowEl)rowEl.style.display='none';
    };
    /* Click → play directly at the saved episode, or open detail */
    el.onclick=function(){
      if(r.tab==='movies'){
        playMovie(r);
      } else if((r.tab==='series'||r.tab==='anime')&&r.episode){
        /* Resume directly */
        if(r.tab==='series')playItem(r,r.season||1,r.episode);
        else playAnime(r,r.episode);
      } else {
        openDetail(r);
      }
    };
    scroll.appendChild(el);
  });
}

function renderSEps(item,data){
  var sel=$('seasonSel'),list=$('epList');if(!sel||!list)return;
  var lastEp=S.recent.find(function(x){return x.id===item.id&&x.tab===item.tab;});

      var r=await fetch(TMDB+'/tv/'+data.tmdbId+'/season/'+sn+'?api_key='+TMDB_KEY+'&language=es-ES');var sd=await r.json();var eps=sd.episodes||[];list.innerHTML='';
      var frag=document.createDocumentFragment();
      eps.forEach(function(ep){
        var isCur=lastEp&&lastEp.season===sn&&lastEp.episode===ep.episode_number;
        var watched=isWatched('series',item.id,sn+'_'+ep.episode_number);
        var row=document.createElement('div');row.className='ep-row'+(isCur?' current':'');
        row.innerHTML='<span class="ep-n">E'+ep.episode_number+'</span><span class="ep-nm">'+esc(ep.name||'Ep '+ep.episode_number)+'</span>'+(ep.runtime?'<span class="ep-d">'+ep.runtime+'m</span>':'')+(isCur?'<span class="ep-d" style="color:var(--ac)">▶</span>':'')+(watched?'<span class="ep-check">✔</span>':'');

/* ═══════════════════════════════════════════════════════

   No iframe, no sandbox issues, no crash on back
   ═══════════════════════════════════════════════════════ */
var _fplSrcs=[],_fplIdx=0,_fplItem=null;

function openFakePlayer(title,srcs,item){
  _fplSrcs=srcs;_fplIdx=0;_fplItem=item||_curItem;
  var fpl=$('fakePl');var bg=$('fpl-bg');var poster=$('fpl-poster');
  var titleEl=$('fpl-title'),chips=$('fpl-chips');
  /* Background */
  var bgUrl=(_fplItem&&(_fplItem.backdrop||_fplItem.poster))||'';
  if(bgUrl){bg.style.backgroundImage='url('+bgUrl+')';}
  /* Poster */
  var postSrc=(_fplItem&&_fplItem.poster)||bgUrl;
  if(postSrc){poster.src=postSrc;poster.style.display='block';}else{poster.style.display='none';}
  /* Title */
  titleEl.textContent=title;
  /* Chips */
  chips.innerHTML='';
  srcs.forEach(function(url,i){
    var chip=document.createElement('button');chip.className='fpl-chip'+(i===0?' on':'');
    chip.textContent='Opción '+(i+1);chip.dataset.si=i;
    chip.onclick=function(e){e.stopPropagation();_fplIdx=i;chips.querySelectorAll('.fpl-chip').forEach(function(x){x.classList.toggle('on',x===chip);});};
    chips.appendChild(chip);
  });
  /* Reset play button */
  var playIcon=$('fpl-play-icon'),playSpin=$('fpl-play-spin');
  if(playIcon)playIcon.style.display='block';if(playSpin)playSpin.style.display='none';
  /* Show */
  fpl.classList.add('open');document.body.style.overflow='hidden';
  history.pushState({tftv:'player'},'');
}
function closeFakePlayer(){
  $('fakePl').classList.remove('open');
  document.body.style.overflow='hidden';/* detail stays open */
}
/* Play button */
$('fpl-play').onclick=function(){
  var url=_fplSrcs[_fplIdx];if(!url)return;
  /* Show loading */
  var icon=$('fpl-play-icon'),spin=$('fpl-play-spin');
  if(icon)icon.style.display='none';if(spin)spin.style.display='block';
  setTimeout(function(){
    if(icon)icon.style.display='block';if(spin)spin.style.display='none';
    try{window.open(url,'_blank','noopener,noreferrer');}catch(e){}
  },600);
};
/* Back button */
$('fpl-back').onclick=function(){history.back();};

window.addEventListener('popstate',function(){
  if($('fakePl').classList.contains('open')){
    closeFakePlayer();

    return;
  }
  if(detBd.classList.contains('open')){detBd.classList.remove('open');document.body.style.overflow='';return;}

});

function playMovie(item){
  addRecent(item,null,null,null);
  markWatched('movies',item.id||item.tmdbId,1);
  openFakePlayer(item.title+' · Película',M_SRCS.map(function(fn){return fn(item.tmdbId);}),item);
}
function playItem(item,season,episode){
  var s=season||1,e=episode||1;
  addRecent(item,'S'+String(s).padStart(2,'0')+'E'+String(e).padStart(2,'0'),s,e);
  markWatched('series',item.id||item.tmdbId,s+'_'+e);
  openFakePlayer(item.title+' S'+String(s).padStart(2,'0')+'E'+String(e).padStart(2,'0'),T_SRCS.map(function(fn){return fn(item.tmdbId,s,e);}),item);
}
async function playAnime(item,episode){
  var ep=episode||1,mal=item.malId||item.id,title=item.title;
  addRecent(item,'Ep. '+ep,1,ep);
  markWatched('anime',item.id,ep);
  /* Refresh checkmarks in open detail */
  var epRow=detBody.querySelector('[data-ep="'+ep+'"]');
  if(epRow&&!epRow.querySelector('.ep-check')){var chk=document.createElement('span');chk.className='ep-check';chk.textContent='✔';epRow.appendChild(chk);}
  /* Check if JKAnime mode */
  var jkOn=!!_jkMode[mal];
  var srcs;
  if(jkOn){
    /* JKAnime — múltiples formatos de URL */
    var slug=toJKSlug(title);
    srcs=[
      'https://jkanime.net/'+slug+'/'+ep+'/',
      'https://jkanime.net/?s='+encodeURIComponent(title)
    ];
  } else {
    var tmdb=await getAnimeTmdb(mal,title,item.year);
    srcs=tmdb?[
      'https://vidsrc.xyz/embed/tv?tmdb='+tmdb+'&season=1&episode='+ep+'&lang=es',
      'https://vidsrc.to/embed/tv/'+tmdb+'/1/'+ep+'?ds=1',
      'https://multiembed.mov/?video_id='+tmdb+'&tmdb=1&s=1&e='+ep
    ]:[
      'https://vidsrc.xyz/embed/anime/'+mal+'/'+ep,
      'https://embed.su/embed/anime/'+mal+'/'+ep,
      'https://vidsrc.me/embed/anime/'+mal+'/'+ep
    ];
  }
  openFakePlayer(title+' — Ep. '+ep,srcs,item);
}

TF.injectProfile=function(){var u=TF.getUser();var existing=document.getElementById('tf-profile-widget');if(existing)existing.remove();var widget=document.createElement('div');widget.id='tf-profile-widget';widget.style.cssText='display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0';widget.title='Mi perfil';var av=u&&u.avatar?'<div style="position:relative;flex-shrink:0"><img src="'+u.avatar+'" style="width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(168,85,247,.4)"/><div style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:#4ade80;border:1.5px solid #06000d;box-shadow:0 0 4px #4ade80"></div></div>':'<div style="position:relative;flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(109,36,217,.2);border:1.5px solid rgba(168,85,247,.3);display:grid;place-items:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.7)" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><div style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:#4ade80;border:1.5px solid #06000d;box-shadow:0 0 4px #4ade80"></div></div>';widget.innerHTML=av;widget.onclick=function(){if(!u){TF.showLogin(function(){TF.injectProfile();});return;}TF.showProfilePanel();};var hdr=document.getElementById('hdr');if(hdr)hdr.appendChild(widget);};

TF.showLogin=function(onSuccess){if(document.getElementById('tf-login-modal'))return;var u=TF.getUser();var isEdit=!!u;var modal=document.createElement('div');modal.id='tf-login-modal';modal.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center';var avPrev=u&&u.avatar?'<img src="'+u.avatar+'" style="width:68px;height:68px;border-radius:50%;object-fit:cover;display:block"/>':'<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="1.6" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>';modal.innerHTML='<div style="width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px;animation:loginIn .3s cubic-bezier(.22,1,.36,1) both"><style>@keyframes loginIn{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}</style><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:15px;font-weight:800;color:#eee8f8">'+(isEdit?'Editar perfil':'Bienvenido a TFAPP')+'</div>'+(isEdit?'<button onclick="document.getElementById(\'tf-login-modal\').remove()" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;font-size:14px;display:grid;place-items:center;font-family:inherit">✕</button>':'')+'</div>'+(!isEdit?'<p style="font-size:12px;color:#7a6e98;line-height:1.5">Crea tu perfil para usar todas las funciones de TFAPP.</p>':'')+'<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div id="tf-av-preview" style="width:72px;height:72px;border-radius:50%;background:rgba(109,36,217,.15);border:2px solid rgba(168,85,247,.3);display:grid;place-items:center;overflow:hidden;cursor:pointer" onclick="document.getElementById(\'tf-av-file\').click()">'+avPrev+'</div><div style="font-size:10.5px;color:#7a6e98">Toca para cambiar foto</div><input type="file" id="tf-av-file" accept="image/*" style="display:none"/></div><div><div style="font-size:11px;color:#7a6e98;margin-bottom:6px;font-weight:600">Nombre de usuario</div><input id="tf-login-name" type="text" placeholder="Tu nombre…" maxlength="24" value="'+(u&&u.name?u.name:'')+'" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;color:#eee8f8;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .14s" onfocus="this.style.borderColor=\'rgba(168,85,247,.4)\'" onblur="this.style.borderColor=\'rgba(255,255,255,.09)\'"/></div>'+(!isEdit?'<div><div style="font-size:11px;color:#7a6e98;margin-bottom:6px;font-weight:600">Contraseña</div><input id="tf-login-pass" type="password" placeholder="Mínimo 4 caracteres…" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;color:#eee8f8;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .14s" onfocus="this.style.borderColor=\'rgba(168,85,247,.4)\'" onblur="this.style.borderColor=\'rgba(255,255,255,.09)\'"/></div>':'')+'<button id="tf-login-submit" style="padding:12px;border-radius:11px;background:linear-gradient(135deg,#6d24d9,#a855f7);border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer">'+(isEdit?'Guardar cambios':'Crear perfil')+'</button></div>';document.body.appendChild(modal);var avFile=document.getElementById('tf-av-file');var avPreview=document.getElementById('tf-av-preview');var _na=u&&u.avatar?u.avatar:null;avFile.onchange=function(){var f=avFile.files[0];if(!f)return;var r=new FileReader();r.onload=function(){_na=r.result;avPreview.innerHTML='<img src="'+r.result+'" style="width:72px;height:72px;border-radius:50%;object-fit:cover;display:block"/>';};r.readAsDataURL(f);};document.getElementById('tf-login-submit').onclick=function(){var name=(document.getElementById('tf-login-name').value||'').trim();if(!name){TF.toast('Escribe tu nombre','err');return;}if(!isEdit){var pass=(document.getElementById('tf-login-pass').value||'').trim();if(pass.length<4){TF.toast('La contraseña debe tener al menos 4 caracteres','err');return;}var saved=TF.getUser();if(saved&&saved.pass&&pass!==saved.pass){TF.toast('Contraseña incorrecta','err');return;}TF.saveUser({name:name,pass:pass,avatar:_na});}else{var ex=TF.getUser()||{};ex.name=name;ex.avatar=_na;TF.saveUser(ex);}modal.remove();TF.toast((isEdit?'Perfil actualizado':'¡Bienvenido, '+name+'!'),'ok');TF.updateProfileUI();if(onSuccess)onSuccess();};modal.onclick=function(e){if(e.target===modal)modal.remove();};};
TF.showProfilePanel=function(){if(document.getElementById('tf-profile-panel'))return;var u=TF.getUser()||{};var lvl=TF.getLvl();var rank=TF.getRank(lvl);var pct=TF.xpPct();var panel=document.createElement('div');panel.id='tf-profile-panel';panel.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center';panel.innerHTML='<div style="width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px;animation:loginIn .3s cubic-bezier(.22,1,.36,1) both"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:14px;font-weight:800;color:#eee8f8">Mi perfil</div><button onclick="document.getElementById(\'tf-profile-panel\').remove()" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;font-size:14px;display:grid;place-items:center;font-family:inherit">✕</button></div><div style="display:flex;align-items:center;gap:12px">'+(u.avatar?'<div style="position:relative"><img src="'+u.avatar+'" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.4)"/><div style="position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#4ade80;border:2px solid #06000d"></div></div>':'<div style="width:52px;height:52px;border-radius:50%;background:rgba(109,36,217,.15);border:2px solid rgba(168,85,247,.3);display:grid;place-items:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>')+'<div><div style="font-size:15px;font-weight:800;color:#eee8f8">'+(u.name||'Usuario')+'</div><div style="font-size:11.5px;color:#a855f7;margin-top:2px">'+rank.icon+' '+rank.label+'</div></div></div><div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><div style="font-size:11.5px;font-weight:700;color:#eee8f8">Nivel '+lvl+'</div><div style="font-size:10.5px;color:#7a6e98">'+pct+'%</div></div><div style="height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#6d24d9,#a855f7);border-radius:99px;transition:width .6s ease"></div></div>'+(lvl<TF.MAX_LEVEL?'<div style="font-size:10.5px;color:#7a6e98;margin-top:6px">'+(TF.MAX_LEVEL-lvl)+' niveles para el máximo</div>':'<div style="font-size:10.5px;color:#4ade80;margin-top:6px;font-weight:700">🏆 ¡Nivel máximo!</div>')+'</div><div style="display:flex;gap:8px"><button onclick="document.getElementById(\'tf-profile-panel\').remove();TF.showLogin(function(){TF.injectProfile();})" style="flex:1;padding:10px;border-radius:10px;background:rgba(109,36,217,.15);border:1px solid rgba(168,85,247,.25);color:#a855f7;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer">✏️ Editar</button><button onclick="if(confirm(\'¿Cerrar sesión?\')){localStorage.removeItem(\'tfapp_user\');document.getElementById(\'tf-profile-panel\').remove();TF.injectProfile();TF.toast(\'Sesión cerrada\');}" style="padding:10px;border-radius:10px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);color:#f43f5e;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer">Salir</button></div></div>';document.body.appendChild(panel);panel.onclick=function(e){if(e.target===panel)panel.remove();};};
TF.init=function(sectionKey){TF.injectNav(sectionKey);TF.injectProfile();TF.startTicker();setInterval(TF.syncMini,3000);var user=TF.getUser();if(!user){setTimeout(function(){TF.showLogin();},800);}};
TF.init("tv");
</script>
