<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"/>
<title>TFReader</title>
<style>
:root{--bg:#06000f;--bg2:#0a0020;--ac:#a855f7;--pink:#e91e8c;--bd:rgba(255,255,255,.08);--mu:rgba(255,255,255,.45);--gr:#22c55e;--rd:#f43f5e;--go:#f59e0b;--tx:#ede8f8;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
body{background:radial-gradient(ellipse at 20% 0%,#120030,#0a0020 35%,var(--bg) 70%) fixed}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:400;height:52px;display:flex;align-items:center;padding:0 12px;gap:8px;overflow:hidden}
#hdr.s{background:rgba(6,0,15,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd)}
#hLogo{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;text-decoration:none}
#hLogo span{font-size:15px;font-weight:900;background:linear-gradient(90deg,#e9d5ff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#hSearch{flex:1;min-width:0;height:30px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:8px;padding:0 9px}
#hSearch:focus-within{border-color:rgba(168,85,247,.4)}
#hSIn{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--tx);font-size:12px;font-family:inherit}
#hSIn::placeholder{color:var(--mu)}
#hSCl{background:none;border:none;color:var(--mu);cursor:pointer;display:none;line-height:0;flex-shrink:0}
.hb{width:30px;height:30px;min-width:30px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid var(--bd);display:grid;place-items:center;cursor:pointer;color:var(--tx);flex-shrink:0;position:relative}

/* HERO */
#heroW{position:relative;overflow:hidden;margin-top:52px}
#heroSl{display:flex;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.hs{flex:0 0 100%;position:relative;height:calc(100vw*.58 + 76px);min-height:260px;max-height:420px;overflow:hidden}
.hs img{width:100%;height:100%;object-fit:cover;filter:brightness(.45)}
.hsg{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),transparent 40%,rgba(6,0,15,.7) 70%,var(--bg) 100%)}
.hsb{position:absolute;bottom:0;left:0;right:0;padding:12px 14px 14px}
.hst{font-size:20px;font-weight:900;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,.7);margin-bottom:8px}
.hsbtn{height:33px;padding:0 15px;border-radius:8px;background:linear-gradient(135deg,var(--pink),var(--ac));border:none;color:#fff;font-size:12.5px;font-weight:800;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:0 3px 12px rgba(233,30,140,.38)}
#hDots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.hd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .25s}
.hd.on{width:15px;border-radius:3px;background:var(--ac)}

/* CATS */
#catBar{position:relative;z-index:300;background:rgba(6,0,15,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.08);padding:8px 14px 7px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
#catBar::-webkit-scrollbar{display:none}
.cp{flex:0 0 auto;height:26px;padding:0 13px;border-radius:99px;border:1px solid rgba(255,255,255,.14);background:transparent;color:var(--mu);cursor:pointer;font-size:11.5px;font-weight:600;font-family:inherit;white-space:nowrap;transition:all .14s}
.cp.on{background:linear-gradient(135deg,rgba(233,30,140,.14),rgba(168,85,247,.18));border-color:rgba(233,30,140,.6);color:#f9a8d4}

/* ROWS */
#main{padding-bottom:calc(72px + var(--safe));min-height:60vh}
.row{margin-bottom:20px}
.rowH{display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:7px}
.rowT{font-size:14px;font-weight:800}
.rowS{display:flex;gap:8px;overflow-x:auto;padding:2px 14px 4px;scrollbar-width:none}
.rowS::-webkit-scrollbar{display:none}

/* CARDS */
.pc{flex:0 0 94px;border-radius:8px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid var(--bd);position:relative;flex-shrink:0}
.pc:active{opacity:.8}
.pca{width:100%;aspect-ratio:2/3;overflow:hidden;background:rgba(109,36,217,.1);position:relative}
.pca img{width:100%;height:100%;object-fit:cover;display:block}
.pct{font-size:9px;font-weight:600;padding:4px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb{position:absolute;top:3px;left:3px;font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;text-transform:uppercase;z-index:2}
.tb-m{background:rgba(239,68,68,.85);color:#fff}
.tb-mh{background:rgba(34,197,94,.85);color:#fff}
.tb-c{background:rgba(59,130,246,.85);color:#fff}
.ph{width:100%;aspect-ratio:2/3;background:rgba(109,36,217,.1);display:grid;place-items:center}
.cwc{flex:0 0 168px;border-radius:9px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--bd);flex-shrink:0;position:relative}
.cwc img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;object-position:top}
.cwci{padding:5px 8px 8px}
.cwct{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cwcc{font-size:9px;color:var(--mu);margin-top:1px}
.cwdel{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,.72);display:grid;place-items:center;cursor:pointer;z-index:2;color:var(--rd)}
.t10c{flex:0 0 112px;flex-shrink:0;cursor:pointer;position:relative;height:112px}
.t10c img{position:absolute;right:0;top:0;width:72px;height:112px;object-fit:cover;border-radius:7px;display:block;object-position:top}
.t10n{position:absolute;left:0;bottom:-4px;font-size:66px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--pink),var(--ac),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-4px;user-select:none;font-family:"Arial Black",Impact,sans-serif}
.sk{border-radius:8px;animation:sk 1.2s ease-in-out infinite;background:rgba(255,255,255,.06)}
.sk-p{width:94px;aspect-ratio:2/3}
.sk-cw{width:168px;height:98px}
@keyframes sk{0%,100%{opacity:.2}50%{opacity:.55}}

/* SEARCH */
#srchV{display:none;position:fixed;inset:0;z-index:350;background:var(--bg);padding:60px 0 20px;overflow-y:auto}
#srchG{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 10px}
@media(min-width:400px){#srchG{grid-template-columns:repeat(4,1fr)}}
.sgc{border-radius:8px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid var(--bd);position:relative}
.sgc img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;object-position:top}
.sgct{font-size:9px;font-weight:600;padding:3px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sinf{padding:24px 14px;text-align:center;color:var(--mu);font-size:12px}

/* DETAIL */
#detBd{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
#detBd.open{display:flex}
#detSc{flex:1;overflow-y:auto;scrollbar-width:none}
#detSc::-webkit-scrollbar{display:none}
.dh{position:relative;width:100%;height:210px;overflow:hidden;background:rgba(109,36,217,.1)}
.dh img{width:100%;height:100%;object-fit:cover;display:block;object-position:top}
.dhg{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(6,0,15,.99))}
.dbk{position:fixed;top:12px;left:12px;width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;cursor:pointer;color:#fff;z-index:2}
.dby{padding:0 14px 16px}
.dttl{font-size:18px;font-weight:900;margin-bottom:4px;line-height:1.2}
.dmt{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.dbg{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--mu)}
.dbg.gr{color:var(--gr);background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2)}
.dbtns{display:flex;gap:7px;margin-bottom:11px}
.drd{flex:1;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--pink),var(--ac));border:none;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 14px rgba(233,30,140,.3)}
.dls{width:40px;height:40px;border-radius:10px;background:rgba(233,30,140,.08);border:1.5px solid rgba(233,30,140,.45);display:grid;place-items:center;cursor:pointer;flex-shrink:0;color:#ec4899}
.dls.on{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.4);color:var(--ac)}
.ddsc{font-size:11.5px;color:var(--mu);line-height:1.65;margin-bottom:9px;max-height:66px;overflow:hidden;transition:max-height .28s}
.ddsc.exp{max-height:300px}
.dmore{font-size:10px;color:var(--ac);cursor:pointer;margin-bottom:9px}
.dgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
.dg{font-size:8.5px;padding:2px 7px;border-radius:99px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);color:var(--ac)}
.dsec{font-size:9px;font-weight:700;color:var(--ac);letter-spacing:.08em;text-transform:uppercase;margin:11px 0 6px}
.chlist{display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto;scrollbar-width:none}
.chlist::-webkit-scrollbar{display:none}
.chr{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--bd);cursor:pointer;transition:background .12s}
.chr:active{background:rgba(109,36,217,.1);border-color:rgba(168,85,247,.3)}
.chn{font-size:9px;font-weight:800;color:var(--ac);min-width:38px;flex-shrink:0}
.chnm{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chd{font-size:9px;color:var(--mu);flex-shrink:0}
.chk{font-size:10px;color:var(--gr);flex-shrink:0}
.chr.cur{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3)}
.chr.ext{border-style:dashed;opacity:.8}
.nodata{padding:12px;font-size:11px;color:var(--mu);text-align:center;line-height:1.7}
.sp{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:spn .6s linear infinite;margin:16px auto;display:block}
@keyframes spn{to{transform:rotate(360deg)}}

/* READER */
#rdr{position:fixed;inset:0;z-index:600;background:#0a0a0a;display:none;flex-direction:column}
#rdr.open{display:flex}
#rScr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:none;touch-action:pan-y pinch-zoom}
#rScr::-webkit-scrollbar{display:none}
#rScr img{width:100%;display:block;max-width:800px;margin:0 auto}
#rPg{flex:1;overflow:hidden;display:none;position:relative;background:#0a0a0a}
#rPgImg{width:100%;height:100%;object-fit:contain;display:block;touch-action:manipulation pinch-zoom}
#rPgPrev{position:absolute;top:0;left:0;width:38%;height:100%;cursor:pointer;z-index:2}
#rPgNext{position:absolute;top:0;right:0;width:62%;height:100%;cursor:pointer;z-index:2}
#rPgN{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border-radius:99px;padding:3px 12px;font-size:11px;color:rgba(255,255,255,.7);z-index:3;pointer-events:none}
#rLoadO{position:absolute;inset:0;z-index:10;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#rLoadO.gone{display:none}
#rLMsg{font-size:12px;color:rgba(255,255,255,.6);text-align:center;padding:0 20px;line-height:1.6}
.rb{display:none;height:32px;padding:0 18px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}
#rRtry{background:linear-gradient(135deg,var(--pink),var(--ac));color:#fff}
#rExtO{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff}
/* Controls overlay */
#rCtrl{position:fixed;inset:0;z-index:610;display:none;pointer-events:none;transition:opacity .3s}
#rCtrl.h{opacity:0!important}
#rTop{position:absolute;top:0;left:0;right:0;padding:10px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.93),transparent);display:flex;align-items:center;gap:7px;pointer-events:all}
#rBk{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.1);border:none;display:grid;place-items:center;cursor:pointer;color:#fff;flex-shrink:0}
#rTitl{flex:1;font-size:11.5px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcb{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;cursor:pointer;color:#fff;flex-shrink:0}
.rcb.on{background:linear-gradient(135deg,rgba(233,30,140,.5),rgba(168,85,247,.5));border-color:rgba(233,30,140,.6)}
#rBot{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(to top,rgba(0,0,0,.93),transparent);display:flex;align-items:center;gap:7px;pointer-events:all}
.rchb{height:28px;padding:0 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px}
.rchb:disabled{opacity:.3;cursor:default}
#rNxtCh{background:linear-gradient(135deg,rgba(233,30,140,.35),rgba(168,85,247,.35));border-color:rgba(168,85,247,.5)}
#rCpSel{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:10px;font-family:inherit;padding:4px 6px;cursor:pointer;outline:none;text-align:center}
option{background:#06000d}

/* MY LIST */
#mlBd{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center}
#mlBd.open{display:flex}
#mlBox{width:min(100%,540px);max-height:68vh;background:rgba(6,0,15,.99);border:1px solid var(--bd);border-radius:13px 13px 0 0;display:flex;flex-direction:column;overflow:hidden}
.mlhdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;font-size:13px;font-weight:800}
#mlGr{flex:1;overflow-y:auto;padding:11px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mlc{border-radius:7px;overflow:hidden;cursor:pointer;position:relative;background:rgba(255,255,255,.03);border:1px solid var(--bd)}
.mlc img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;object-position:top}
.mlct{font-size:8.5px;font-weight:600;padding:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mlx{position:absolute;top:2px;right:2px;width:15px;height:15px;border-radius:3px;background:rgba(0,0,0,.75);display:grid;place-items:center;color:var(--rd);font-size:9px;cursor:pointer;z-index:2}

/* SETTINGS */
#settBd{position:fixed;inset:0;z-index:710;background:rgba(0,0,0,.75);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center}
#settBd.open{display:flex}
#settBox{width:min(100%,480px);background:rgba(6,0,15,.99);border:1px solid var(--bd);border-radius:13px 13px 0 0;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.srow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--bd)}
.slbl{flex:1}.slbl b{display:block;font-size:13px;font-weight:700;margin-bottom:2px}.slbl small{font-size:10.5px;color:var(--mu)}
.tog{width:38px;height:21px;border-radius:10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.tog.on{background:linear-gradient(135deg,var(--pink),var(--ac));border-color:rgba(233,30,140,.5)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .2s}
.tog.on::after{left:20px}

#tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.toast{background:rgba(4,0,12,.98);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:7px 13px;font-size:11.5px;color:#fff;opacity:0;transform:translateY(4px);transition:all .15s;white-space:nowrap}
.toast.s{opacity:1;transform:none}
</style>
</head>
<body>

<header id="hdr">
  <div id="hLogo">
    <img src="https://i.imgur.com/lALmGx6.png" width="26" height="26" style="border-radius:6px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'"/>
    <span>TFReader</span>
  </div>
  <div id="hSearch">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
    <input id="hSIn" type="search" placeholder="Buscar manga, manhwa…" autocomplete="off" spellcheck="false"/>
    <button id="hSCl"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"></path></svg></button>
  </div>
  <button class="hb" id="mlBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    <span id="mlCnt" style="position:absolute;top:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--ac);font-size:7px;font-weight:800;display:none;place-items:center;color:#fff"></span>
  </button>
  <button class="hb" id="settBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>
</header>

<div id="heroW"><div id="heroSl"></div><div id="hDots"></div></div>

<div id="catBar">
  <button class="cp on" data-cat="todo">Todo</button>
  <button class="cp" data-cat="manga">Manga</button>
  <button class="cp" data-cat="manhwa">Manhwa</button>
  <button class="cp" data-cat="comic">Cómics</button>
</div>

<div id="main"><div id="rows"></div></div>
<div id="srchV"><div id="srchG"></div><div id="srchI"></div></div>

<!-- DETAIL -->
<div id="detBd">
  <div id="detSc">
    <div class="dh"><img id="dImg" src="" alt=""/><div class="dhg"></div>
      <button class="dbk" id="dBk">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"></path></svg>
      </button>
    </div>
    <div class="dby" id="dBy"><div class="sp"></div></div>
  </div>
</div>

<!-- READER -->
<div id="rdr">

/* Fetch — manual timeout, compatible con todos los Android WebView */
function F(url,ms){
  ms=ms||14000;
  return new Promise(function(ok,fail){
    var done=false,t=setTimeout(function(){done||(done=true,fail(new Error('timeout')));},ms);
    fetch(url).then(function(r){done||(done=true,clearTimeout(t),ok(r));}).catch(function(e){done||(done=true,clearTimeout(t),fail(e));});
  });
}

/* Construir query string para MangaDex */
function QS(obj){
  var p=[];
  Object.keys(obj).forEach(function(k){
    var v=obj[k];
    if(Array.isArray(v))v.forEach(function(x){p.push(k+'%5B%5D='+encodeURIComponent(x));});
    else p.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
  });
  return p.join('&');
}

async function GET(path,params){
  var r=await F(MD+path+(params?'?'+QS(params):''));
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

}

function ckMapItem(c){
  var img=c.md_covers&&c.md_covers.length?CKI+c.md_covers[0].b2key:null;

async function ckChaptersBySlug(slug,hid){
  var id=hid||slug;if(!id)return[];

  for(var li=0;li<langs.length;li++){

      if(d&&d.chapters&&d.chapters.length){
        return d.chapters.map(function(c){
          return{id:'ck_'+c.hid,src:'ck',hid:c.hid,num:c.chap||'?',title:c.title||'',lang:c.lang||langs[li]};
        });
      }

  return[];
}

async function ckPages(hid){
  var d=await ckFetch(CK+'/chapter/'+hid+'?tachiyomi=true');
  var imgs=[];
  if(d&&d.chapter&&d.chapter.images)imgs=d.chapter.images;
  else if(d&&Array.isArray(d))imgs=d;
  else if(d&&Array.isArray(d.images))imgs=d.images;
  if(!imgs.length)throw new Error('ckPages sin imagenes hid='+hid);
  return imgs.map(function(img){
    if(typeof img==='string')return img.startsWith('http')?img:CKI+img;
    if(img.url)return img.url;
    if(img.b2key)return CKI+img.b2key;
    return'';
  }).filter(Boolean);
}

async function ckFindSlug(title){
  try{
    var q=title.replace(/[^\w\s]/g,' ').trim().slice(0,50);
    var d=await ckFetch(CK+'/v1.0/search?q='+encodeURIComponent(q)+'&limit=5&page=1');
    if(!Array.isArray(d)||!d.length)return null;
    var tl=title.toLowerCase().replace(/[^a-z0-9]/g,'');
    for(var i=0;i<d.length;i++){
      var rt=(d[i].title||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if(rt===tl||rt.indexOf(tl)>=0||tl.indexOf(rt)>=0)return{slug:d[i].slug,hid:d[i].hid};
    }
    return{slug:d[0].slug,hid:d[0].hid};
  }catch(e){return null;}
}

    Harem:'Harem',Psychological:'Psicologico',Historical:'Historico',
    'School Life':'Vida escolar',Adventure:'Aventura','Martial Arts':'Artes marciales',
    Sports:'Deportes',Tragedy:'Tragedia',Magic:'Magia',Superhero:'Superheroes',
    Reincarnation:'Reencarnacion',Survival:'Supervivencia','Reverse Harem':'Harem inverso',
    'Time Travel':'Viaje en el tiempo',Villainess:'Villana','Long Strip':'Tira larga',
    'Web Comic':'Webcomic','Office Workers':'Oficinistas',Monsters:'Monstruos',

    'Full Color':'Color completo',Doujinshi:'Doujinshi','Fan Colored':'Coloreado por fans',
    Gore:'Gore','Sexual Violence':'Violencia sexual',Philosophical:'Filosofico',

    'Magical Girls':'Chicas magicas','Monster Girls':'Chicas monstruo',
    Gyaru:'Gyaru',Delinquents:'Delincuentes',Samurai:'Samurai',Ninja:'Ninja',

  var tags=(a.tags||[]).map(function(tg){
    var en=tg.attributes&&tg.attributes.name&&tg.attributes.name.en||'';
    var es=tg.attributes&&tg.attributes.name&&(tg.attributes.name.es||'')||'';
    return es||TG[en]||en;
  }).filter(Boolean);
  return{id:m.id,tab:tab,title:t,desc:d,poster:cov(m),year:a.year||null,status:a.status||'',tags:tags};
}

/* CHAPTERS — solo los que se pueden leer en la app (sin externalUrl) */
async function apiChapters(mangaId){
  /* Step 1: Try MangaDex paginated */
  var mdResult=[];
  try{
    var all=[];var offset=0;var hasMore=true;
    while(hasMore){
      var p={limit:500,offset:offset,'order[chapter]':'asc',contentRating:CR(true)};
      var d=await mdFetch('/manga/'+mangaId+'/feed',p);
      var batch=d.data||[];all=all.concat(batch);offset+=batch.length;
      hasMore=batch.length===500&&all.length<(d.total||99999);
    }
    var readable=all.filter(function(c){return!c.attributes.externalUrl;});
    var byNum={};
    readable.forEach(function(c){
      var a=c.attributes||{};var n=a.chapter;if(n===null||n===undefined)return;
      var l=a.translatedLanguage||'';
      var pr=l==='es'?0:l==='es-la'?1:l==='en'?2:3;
      if(!byNum[n]||pr<byNum[n].pr)byNum[n]={c:c,pr:pr};
    });
    mdResult=Object.values(byNum).sort(function(a,b){
      return parseFloat(a.c.attributes.chapter||0)-parseFloat(b.c.attributes.chapter||0);
    }).map(function(x){return x.c;});
  }catch(e){}

  /* Step 2: Try Comick via proxy — usually more complete in Spanish */
  var ckResult=[];
  if(typeof ckFindSlug==='function'){
    try{
      var info=S.detCache[mangaId];
      var searchTitle=info&&info.title?info.title:'';
      if(searchTitle){
        var found=await ckFindSlug(searchTitle);
        if(found){ckResult=await ckChaptersBySlug(found.slug,found.hid);}
      }
    }catch(e){}
  }

  /* Use whichever has more chapters */
  if(ckResult.length>mdResult.length&&ckResult.length>0)return ckResult;
  if(mdResult.length>0)return mdResult;
  return ckResult;
}

/* PÁGINAS — 2 intentos */
async function apiPages(chId){
  async function tryURL(url){
    var r=await F(url,15000);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(!d||!d.baseUrl)throw new Error('Sin servidor');
    var ch=d.chapter;if(!ch||!ch.hash)throw new Error('Sin hash');
    var pgs,pfx;
    if(ch.dataSaver&&ch.dataSaver.length){pgs=ch.dataSaver;pfx='/data-saver/';}
    else if(ch.data&&ch.data.length){pgs=ch.data;pfx='/data/';}
    else throw new Error('Sin páginas');
    return pgs.map(function(p){return d.baseUrl+pfx+ch.hash+'/'+p;});
  }
  try{return await tryURL(MD+'/at-home/server/'+chId);}catch(e1){}
  return tryURL(MD+'/at-home/server/'+chId+'?forcePort443=true');
}

/* Pinch-to-zoom for cascade mode */
(function(){
  var sc=gi('rScr');var scale=1;var startDist=0;
  sc.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      startDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    }
  },{passive:true});
  sc.addEventListener('touchmove',function(e){
    if(e.touches.length===2&&startDist>0){
      var dist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      scale=Math.min(4,Math.max(1,(scale*(dist/startDist))));
      startDist=dist;
      sc.style.transformOrigin='center top';
      sc.style.transform='scale('+scale+')';
    }
  },{passive:true});
  sc.addEventListener('touchend',function(e){
    if(e.touches.length<2){startDist=0;}
    if(scale<1.05){sc.style.transform='';scale=1;}
  },{passive:true});
})();
