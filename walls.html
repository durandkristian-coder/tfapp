<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="max-age=86400"/>
<link rel="dns-prefetch" href="https://i.imgur.com"/>
<link rel="dns-prefetch" href="https://corsproxy.io"/>
<link rel="dns-prefetch" href="https://wallhaven.cc"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TFWallpapers</title>
<style>
:root{
  --bg:#04000a;--bg2:#120028;--bg3:#1a003a;
  --ac:#a855f7;--ac2:#6d24d9;--ac3:#c084fc;
  --glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.09);
  --glassDark:rgba(4,0,10,.88);
  --border:rgba(255,255,255,.07);--border2:rgba(168,85,247,.28);
  --text:#ede8f8;--muted:#6b6082;--soft:#3d3558;
  --good:#4ade80;
  --top-h:56px;
  --bot-h:64px;
  --radius:14px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;
  background:radial-gradient(ellipse at 30% -10%,var(--bg3),var(--bg2) 40%,var(--bg) 70%) fixed;
  overflow-x:hidden;
}
#topNav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:var(--top-h);
  background:rgba(6,0,14,.55);
  backdrop-filter:blur(32px) saturate(200%) brightness(0.85);
  -webkit-backdrop-filter:blur(32px) saturate(200%) brightness(0.85);
  border-bottom:1px solid rgba(168,85,247,.18);
  box-shadow:0 1px 24px rgba(109,36,217,.12),inset 0 0 0 1px rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;gap:10px;
}
.tnLeft{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tnLogoImg{width:32px;height:32px;border-radius:9px;object-fit:cover;display:block;border:1.5px solid rgba(168,85,247,.35);box-shadow:0 0 8px rgba(168,85,247,.2);}
.tnBrand{font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#f0abfc 0%,#c084fc 40%,#a855f7 70%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Exo 2',-apple-system,BlinkMacSystemFont,sans-serif;}
.tnBtns{display:flex;align-items:center;gap:6px}
.tnBtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.75);transition:all .15s cubic-bezier(.34,1.56,.64,1);position:relative;flex-shrink:0;overflow:hidden;}
.tnBtn:active{transform:scale(.9);background:rgba(255,255,255,.1)}
.tnBtn.active{background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.4);color:var(--ac);box-shadow:0 0 12px rgba(168,85,247,.2);}
.tnBtn .onlineDot{position:absolute;bottom:1px;right:1px;width:8px;height:8px;border-radius:50%;background:var(--good);border:2px solid var(--bg);}
#btnCreate{width:38px;height:38px;background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:#fff;box-shadow:0 4px 14px rgba(109,36,217,.5),0 0 0 1px rgba(168,85,247,.2);transition:all .15s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;}
#btnCreate:active{transform:scale(.88);box-shadow:0 2px 8px rgba(109,36,217,.3)}
/* FIX 3: Pill nav matching TFHub style */
#tf-nav{
  position:fixed !important;
  bottom:16px !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  z-index:8000 !important;
  display:flex !important;
  align-items:center !important;
  gap:2px !important;
  background:rgba(8,0,18,.85) !important;
  backdrop-filter:blur(24px) !important;
  -webkit-backdrop-filter:blur(24px) !important;
  border:1px solid rgba(255,255,255,.1) !important;
  border-radius:22px !important;
  padding:6px 8px !important;
  width:auto !important;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(168,85,247,.08) !important;
}
.page{display:none;padding-top:calc(var(--top-h) + 6px);padding-bottom:calc(var(--bot-h) + 32px);min-height:100vh;}
.page.active{display:block}
#homeTabs{position:sticky;top:var(--top-h);z-index:400;background:transparent;display:flex;align-items:center;padding:0 12px;height:40px;gap:4px;}
.htab{height:32px;padding:0 14px;border-radius:99px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .13s;white-space:nowrap;}
.htab.on{background:var(--glass2);color:var(--text);border:1px solid var(--border2);}
#homeGrid{padding:8px 8px 0;display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.hgCol{flex:1;display:flex;flex-direction:column;gap:8px;min-width:120px}
.pin{break-inside:avoid;margin-bottom:8px;border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.pin:active{transform:scale(.96);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.pin:hover{border-color:rgba(168,85,247,.25);box-shadow:0 4px 16px rgba(109,36,217,.18)}
.pin img{width:100%;display:block;object-fit:cover;background:rgba(109,36,217,.06);}
.pinFoot{padding:7px 9px 9px;background:linear-gradient(transparent,rgba(4,0,10,.8));position:absolute;bottom:0;left:0;right:0;opacity:0;transition:opacity .14s;}
.pin:hover .pinFoot,.pin:focus .pinFoot{opacity:1}
.pinTitle{font-size:11px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.pinSave{position:absolute;top:7px;right:7px;padding:5px 10px;border-radius:99px;background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;color:#fff;font-size:10px;font-weight:800;font-family:inherit;cursor:pointer;opacity:0;transform:translateY(-4px);transition:opacity .13s,transform .13s;pointer-events:none;}
.pin:hover .pinSave,.pin:focus .pinSave{opacity:1;transform:none;pointer-events:auto}
.feedSection{padding:16px 12px 6px;display:flex;align-items:center;justify-content:space-between}
.feedTitle{font-size:16px;font-weight:800;color:var(--text)}
.feedSub{font-size:11px;color:var(--muted)}
.feedSeeAll{font-size:11px;font-weight:700;color:var(--ac);background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);padding:4px 10px;border-radius:99px;cursor:pointer;border-color:var(--border2);transition:background .12s;}
.feedSeeAll:hover{background:rgba(168,85,247,.18)}
.skPin{break-inside:avoid;margin-bottom:8px;border-radius:var(--radius);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);animation:skPulse 1.5s ease-in-out infinite;}
@keyframes skPulse{0%,100%{opacity:.25}50%{opacity:.6}}
#searchPage{padding-top:calc(var(--top-h) + 6px);padding-bottom:calc(var(--bot-h) + 20px);}
#searchBar{position:sticky;top:var(--top-h);z-index:400;padding:8px 12px;background:transparent;}
.sBarInner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:0 12px;height:38px;transition:border-color .14s;}
.sBarInner:focus-within{border-color:var(--border2)}
#sInSearch{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;}
#sInSearch::placeholder{color:var(--soft)}
#searchHero{height:180px;overflow:hidden;position:relative;margin:0 12px 16px;border-radius:var(--radius);margin-top:10px;}
#searchHeroImg{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.7)}
.heroOverlay{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(4,0,10,.75));display:flex;flex-direction:column;justify-content:flex-end;padding:16px;}
.heroLabel{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.heroTitle{font-size:20px;font-weight:900;color:#fff}
.ideaSection{margin-bottom:18px}
.ideaHeader{display:flex;align-items:center;justify-content:space-between;padding:0 12px;margin-bottom:8px;}
.ideaLabel{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.ideaTitle{font-size:17px;font-weight:800;color:var(--text)}
.ideaSearchBtn{width:34px;height:34px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:all .12s;}
.ideaSearchBtn:hover{background:var(--glass2);color:var(--ac)}
.ideaRow{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 12px;}
.ideaThumb{aspect-ratio:1;border-radius:9px;overflow:hidden;background:rgba(109,36,217,.06);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:transform .12s;}
.ideaThumb:active{transform:scale(.96)}
.ideaThumb img{width:100%;height:100%;object-fit:cover;display:block}
#profilePage{padding-top:calc(var(--top-h) + 6px);padding-bottom:calc(var(--bot-h) + 20px);}
.profHero{padding:24px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.profAvCircle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--ac2),var(--ac));display:grid;place-items:center;overflow:hidden;border:2px solid var(--border2);position:relative;}
.profAvCircle img{width:100%;height:100%;object-fit:cover;display:block}
.profName{font-size:18px;font-weight:800;color:var(--text)}
.profXpBar{width:100%;max-width:260px;background:rgba(255,255,255,.07);border-radius:99px;height:4px;overflow:hidden;}
.profXpFill{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:99px;transition:width .5s ease}
.profStats{display:flex;gap:28px;margin-top:4px}
.pStat{display:flex;flex-direction:column;align-items:center;gap:2px}
.pStatN{font-size:16px;font-weight:800;color:var(--text)}
.pStatL{font-size:10px;color:var(--muted);font-weight:600}
.colGrid{padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:500px){.colGrid{grid-template-columns:repeat(3,1fr);}}
.colCard{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:transform .13s;position:relative;}
.colCard:active{transform:scale(.97)}
.colThumbGrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:90px;gap:2px;}
.colThumbGrid img{width:100%;height:100%;object-fit:cover;display:block}
.colThumbGrid .empty{background:rgba(109,36,217,.06)}
.colInfo{padding:7px 9px}
.colName{font-size:12px;font-weight:700;color:var(--text)}
.colCount{font-size:10px;color:var(--muted);margin-top:1px}
.newColCard{border:1.5px dashed rgba(168,85,247,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;height:124px;border-radius:12px;cursor:pointer;transition:background .12s;background:transparent;}
.newColCard:hover{background:rgba(168,85,247,.05)}
.newColCard span{font-size:11px;font-weight:600;color:var(--muted)}
#pinDetail{position:fixed;inset:0;z-index:600;background:rgba(4,0,10,.97);backdrop-filter:blur(20px);display:none;flex-direction:column;overflow-y:auto;}
#pinDetail.open{display:flex}
#pdHeader{position:sticky;top:0;z-index:10;height:50px;background:rgba(4,0,10,.78);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid rgba(168,85,247,.15);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
.pdBtn{width:34px;height:34px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--text);transition:all .13s;flex-shrink:0;}
.pdBtn.liked svg{fill:var(--ac);stroke:var(--ac)}
#pdActions{display:flex;align-items:center;gap:6px;margin-left:auto}
#pdSaveBtn{padding:0 20px;height:36px;border-radius:99px;background:linear-gradient(135deg,#5b21b6,var(--ac2),var(--ac));border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(109,36,217,.5),0 0 0 1px rgba(168,85,247,.2);transition:all .13s;white-space:nowrap;letter-spacing:.2px;}
#pdSaveBtn:active{transform:scale(.94);box-shadow:0 2px 10px rgba(109,36,217,.3)}
#pdImgWrap{width:100%;background:rgba(0,0,0,.3);position:relative;overflow:hidden;flex-shrink:0;}
#pdImg{width:100%;display:block;object-fit:contain;background:#000;max-height:75vh}
#pdBody{padding:14px 14px 0}
.pdTitle{font-size:16px;font-weight:800;margin-bottom:4px}
.pdMeta{font-size:11px;color:var(--muted);margin-bottom:12px}
.pdStatRow{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pdStat{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:7px 12px;border-radius:99px;transition:transform .12s;}
.pdStat:active{transform:scale(.95)}
.pdStat strong{color:var(--text);font-weight:700}
.pdTags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pdTag{font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(109,36,217,.1);border:1px solid rgba(109,36,217,.22);color:var(--ac);cursor:pointer;transition:background .11s;}
.pdTag:hover{background:rgba(109,36,217,.2)}
.pdMore{padding:16px 14px;margin-top:8px;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.05)}
.pdMoreTitle{font-size:14px;font-weight:700;margin-bottom:10px}
.pdMoreGrid{column-count:2;column-gap:8px}
#saveSheet{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center;}
#saveSheet.open{display:flex}
#saveBox{width:min(100%,520px);background:rgba(4,0,10,.88);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(168,85,247,.18);border-radius:18px 18px 0 0;padding:14px;max-height:72vh;display:flex;flex-direction:column;gap:0;box-shadow:0 -8px 32px rgba(109,36,217,.2);}
.ssHandle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 12px;}
.ssTitle{font-size:14px;font-weight:800;text-align:center;margin-bottom:14px;color:var(--text);}
.ssScroll{overflow-y:auto;flex:1}
.ssItem{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .1s;border-radius:8px;}
.ssItem:hover{background:rgba(255,255,255,.04)}
.ssThumb{width:56px;height:56px;border-radius:9px;overflow:hidden;background:rgba(109,36,217,.1);border:1px solid rgba(168,85,247,.15);flex-shrink:0;}
.ssThumb img{width:100%;height:100%;object-fit:cover;display:block}
.ssInfo{flex:1;min-width:0}
.ssName{font-size:13px;font-weight:700;color:var(--text)}
.ssCnt{font-size:10px;color:var(--muted);margin-top:2px}
.ssLock{color:var(--soft)}
.ssNew{display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer;}
.ssNewIcon{width:56px;height:56px;border-radius:9px;background:rgba(255,255,255,.05);border:1.5px dashed rgba(168,85,247,.3);display:grid;place-items:center;flex-shrink:0;color:var(--ac);}
.ssNewLabel{font-size:13px;font-weight:700;color:var(--text)}
#createSheet{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.72);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center;}
#createSheet.open{display:flex}
#createBox{width:min(100%,520px);background:rgba(8,2,22,.85);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(168,85,247,.18);border-radius:18px 18px 0 0;padding:18px 16px;display:flex;flex-direction:column;gap:14px;}
.crTitle{font-size:14px;font-weight:800;color:var(--text);text-align:center}
.crOpts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.crOpt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:14px;background:var(--glass);border:1px solid var(--border);cursor:pointer;transition:all .13s;color:var(--text);}
.crOpt:hover{background:var(--glass2);border-color:var(--border2)}
.crOpt:active{transform:scale(.96)}
.crOptIcon{width:48px;height:48px;border-radius:12px;background:rgba(109,36,217,.15);border:1px solid rgba(168,85,247,.2);display:grid;place-items:center;}
.crOptLabel{font-size:11px;font-weight:700;text-align:center}
#uploadArea{border:2px dashed rgba(168,85,247,.35);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:background .13s;display:none;}
#uploadArea.visible{display:block}
#uploadArea:hover{background:rgba(168,85,247,.06)}
#uploadArea input{display:none}
.upText{font-size:13px;color:var(--muted);margin-top:8px}
.upBtn{margin-top:12px;padding:9px 18px;border-radius:8px;background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
#newColForm{display:none}
#newColForm.visible{display:block}
.ncInput{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border-color .14s;margin-bottom:10px;}
.ncInput:focus{border-color:var(--border2)}
.ncCreate{width:100%;padding:11px;border-radius:10px;background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;}
#shareSheet{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.75);backdrop-filter:blur(18px);display:none;align-items:flex-end;justify-content:center;}
#shareSheet.open{display:flex}
#shareBox{width:min(100%,520px);background:rgba(4,0,10,.99);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:16px;display:flex;flex-direction:column;gap:14px;}
.shrPreview{border-radius:12px;overflow:hidden;max-height:200px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);}
.shrPreview img{width:100%;object-fit:cover;display:block;max-height:200px}
.shrTitle{font-size:14px;font-weight:800;color:var(--text)}
.shrSub{font-size:12px;color:var(--muted)}
.shrBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.shrBtn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .12s;}
.shrBtn:active{transform:scale(.94)}
.shrBtnIcon{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.1);}
.shrBtnLabel{font-size:10px;font-weight:600;color:var(--muted)}
.shrClose{width:100%;padding:11px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
#tfwTst{position:fixed;bottom:calc(var(--bot-h) + 16px);left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;width:max-content;max-width:86vw;}
.tfwT{background:rgba(4,0,10,.98);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 13px;font-size:12px;color:#fff;opacity:0;transform:translateY(5px);transition:opacity .14s,transform .14s;}
.tfwT.s{opacity:1;transform:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
.glass-btn{padding:7px 14px;border-radius:8px;background:var(--glass);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .12s;}
.glass-btn:hover{background:var(--glass2)}
</style>

<body>

<nav id="topNav">
  <div class="tnLeft">
    <img src="https://i.imgur.com/lALmGx6.png" alt="TFV" class="tnLogoImg" onerror="this.style.display='none'"/>
    <span class="tnBrand" style="cursor:pointer" onclick="showPage('homePage');window.scrollTo(0,0);loadHome(true);">TFW</span>
  </div>
  <div class="tnBtns">
    <button class="tnBtn" id="btnSearch" title="Buscar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>

<div id="tfwTst"></div>

<script>
(function(){
'use strict';

var WH_BASE = 'https://wallhaven.cc/api/v1/search';
var PROXIES = [
  function(u){ return 'https://corsproxy.io/?url='+encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u); },
  function(u){ return 'https://corsproxy.io/?url='+encodeURIComponent(u)+'&t='+Date.now(); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u); },
];
var proxyIdx = 0;
async function fetchWallhaven2(){
  try{
    var qs=['anime art','digital illustration','fantasy art','cyberpunk aesthetic','space cosmos'];
    var q=qs[Math.floor(Math.random()*qs.length)];
    var data=await fetchApi(WH_BASE+'?purity=100&categories=010&sorting=random&per_page=6&seed='+Math.floor(Math.random()*999999)+'&q='+encodeURIComponent(q));
    return data.data||[];
  }catch(e){return[];}
}

async function fetchApi(url){
  for(var i=0;i<PROXIES.length;i++){
    var pi=(proxyIdx+i)%PROXIES.length;
    try{
      var r=await fetch(PROXIES[pi](url),{cache:'no-store',signal:AbortSignal.timeout(12000)});
      if(r.ok){
        var text=await r.text();
        if(text.includes('"contents"')&&text.startsWith('{')){var obj=JSON.parse(text);if(obj.contents){text=obj.contents;}}
        proxyIdx=pi;
        return JSON.parse(text);
      }
    }catch(e){}
  }
  throw new Error('Sin conexión. Verifica tu internet.');
}

function buildUrl(params){
  var base=WH_BASE+'?purity=100';
  Object.keys(params).forEach(function(k){
    if(k==='ratios'){base+='&ratios='+String(params[k]);}
    else{base+='&'+k+'='+encodeURIComponent(params[k]);}
  });
  return base;
}

var TASTE_KEY='tfwp_taste';
var LIKED_KEY='tfwp_liked';
var COLS_KEY='tfwp_cols';
var UPLOADED_KEY='tfwp_uploaded';

function getTaste(){
  try{
    var raw=JSON.parse(localStorage.getItem(TASTE_KEY)||'{}');
    var out={};
    Object.keys(raw).forEach(function(k){var v=raw[k]*0.97;if(v>0.05)out[k]=parseFloat(v.toFixed(2));});
    if(Object.keys(out).length)localStorage.setItem(TASTE_KEY,JSON.stringify(out));
    return Object.keys(out).length?out:{};
  }catch(e){return{};}
}
function saveTaste(t){localStorage.setItem(TASTE_KEY,JSON.stringify(t));}
function recordInteraction(wall,type){
  var taste=getTaste();
  var w=type==='download'?3:type==='save'?2:type==='like'?1.5:0.5;
  var cat=wall.category||'';
  if(cat){taste['cat_'+cat]=(taste['cat_'+cat]||0)+w;}
  (wall.tags||[]).slice(0,5).forEach(function(t){var tn='tag_'+(t.name||t);taste[tn]=(taste[tn]||0)+w;});
  saveTaste(taste);
}
function getTopTasteTerms(n){
  var taste=getTaste();
  var entries=Object.entries(taste).sort(function(a,b){return b[1]-a[1];});
  var terms=[];
  entries.slice(0,n||4).forEach(function(e){terms.push(e[0].replace(/^(cat_|tag_)/,''));});
  return terms;
}

function getLiked(){try{return JSON.parse(localStorage.getItem(LIKED_KEY)||'[]');}catch{return[];}}
function saveLiked(arr){localStorage.setItem(LIKED_KEY,JSON.stringify(arr.slice(0,500)));}
function isLiked(id){return getLiked().includes(id);}
function toggleLike(wall){
  var liked=getLiked();
  if(liked.includes(wall.id)){liked=liked.filter(function(x){return x!==wall.id;});toast('Like eliminado');}
  else{liked.unshift(wall.id);recordInteraction(wall,'like');toast('❤ Te gustó');}
  saveLiked(liked);
  updateLikeUi(wall.id);
}

function getCols(){try{return JSON.parse(localStorage.getItem(COLS_KEY)||'[]');}catch{return[];}}
function saveCols(c){localStorage.setItem(COLS_KEY,JSON.stringify(c));}
function createCol(name){var cols=getCols();var col={id:'col_'+Date.now(),name:name,pins:[],created:Date.now()};cols.unshift(col);saveCols(cols);return col;}
function saveToCol(colId,wall){
  var cols=getCols();var col=cols.find(function(c){return c.id===colId;});
  if(!col)return;
  if(!col.pins.some(function(p){return p.id===wall.id;})){col.pins.unshift({id:wall.id,thumb:wall.thumbs.small,path:wall.path,res:wall.resolution});recordInteraction(wall,'save');}
  saveCols(cols);
}

function getUploaded(){try{return JSON.parse(localStorage.getItem(UPLOADED_KEY)||'[]');}catch{return[];}}
function addUploaded(item){var arr=getUploaded();arr.unshift(item);localStorage.setItem(UPLOADED_KEY,JSON.stringify(arr.slice(0,50)));}

var tstEl=document.getElementById('tfwTst');
function toast(msg,ms){
  var el=document.createElement('div');el.className='tfwT';el.textContent=msg;
  tstEl.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('s');});});
  setTimeout(function(){el.classList.remove('s');setTimeout(function(){el.remove();},180);},ms||1800);
}

function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&','<':'<','>':'>','"':'"',"'":'''}[c];});}
function fmtN(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return String(n);}
function fmtB(b){if(!b)return'?';if(b>=1048576)return(b/1048576).toFixed(1)+' MB';return(b/1024).toFixed(0)+' KB';}

var SESSION_SEED=Math.floor(Math.random()*9999999);

function makeSkeletons(container,n){
  container.innerHTML='';
  for(var i=0;i<(n||8);i++){
    var sk=document.createElement('div');sk.className='skPin';
    var ht=(160+Math.random()*160)|0;sk.style.height=ht+'px';sk.style.breakInside='avoid';sk.style.marginBottom='8px';
    container.appendChild(sk);
  }
}

function makePin(w,opts){
  opts=opts||{};
  var card=document.createElement('div');card.className='pin';
  var img=document.createElement('img');
  var _cn=document.querySelectorAll('#homePage .pin').length;
  img.loading=_cn<12?'eager':'lazy';
  if(_cn<12)img.setAttribute('fetchpriority','high');
  img.alt=w.resolution||'';img.src=w.thumbs.small;
  img.onerror=function(){if(!this.dataset.r){this.dataset.r='1';var _s=this;setTimeout(function(){_s.src=w.thumbs.small+'?r='+Date.now();},1500);}};
  var rx=w.dimension_x||1280,ry=w.dimension_y||800;var ar=rx/ry;
  var cssAr;
  if(ar>=1.6){cssAr='16/9';}else if(ar>=1.2){cssAr='4/3';}else if(ar<=0.6){cssAr='9/16';}else if(ar<=0.8){cssAr='3/4';}else{cssAr='1/1';}
  img.style.aspectRatio=cssAr;
  img.onerror=function(){img.src=w.thumbs.large||w.thumbs.small;};
  var saveBtn=document.createElement('button');saveBtn.className='pinSave';saveBtn.textContent='Guardar';
  saveBtn.onclick=function(e){e.stopPropagation();openSaveSheet(w);};
  var foot=document.createElement('div');foot.className='pinFoot';
  foot.innerHTML='<div class="pinTitle">'+(w.resolution||'HD')+(w.category?' · '+w.category:'')+'</div>';
  card.appendChild(img);card.appendChild(saveBtn);card.appendChild(foot);
  card.onclick=function(){openPinDetail(w);};
  foot.style.opacity='1';
  return card;
}

var HOME={page:1,loading:false,hasMore:true,tab:'foryou',items:[]};
var homeGrid=document.getElementById('homeGrid');
var CURRENT_GRID=homeGrid;
var homeInfo=document.getElementById('homeInfo');

var DISCOVER_QUERIES=['aesthetic dark','space galaxy','nature landscape','cyberpunk city','anime art','fantasy dragon','minimal clean','digital art','architecture','ocean sunset','forest mountains','neon night','abstract colorful','sci-fi futuristic','vintage retro'];
function homeQuery(){
  if(HOME.tab==='general')return '';
  var taste=getTaste();var entries=Object.entries(taste).sort(function(a,b){return b[1]-a[1];});
  var tasteTerms=[];
  entries.slice(0,2).forEach(function(e){var term=e[0].replace(/^(cat_|tag_)/,'').trim();if(term.length>2)tasteTerms.push(term);});
  if(!tasteTerms.length||Math.random()<0.5)return DISCOVER_QUERIES[(HOME.page+Math.floor(Date.now()/3600000))%DISCOVER_QUERIES.length];
  return tasteTerms[Math.floor(Math.random()*tasteTerms.length)];
}

async function loadHome(reset){
  if(HOME.loading)return;
  if(reset){
    HOME.page=1;HOME.hasMore=true;HOME.items=[];
    homeGrid.innerHTML='';homeInfo.textContent='';
    SESSION_SEED=Math.floor(Math.random()*9999999);
    makeSkeletons(homeGrid,10);
  }
  HOME.loading=true;
  try{
    var ratioStr='9x16,9x16,9x18,9x16,16x9,16x10';
    var params={categories:'111',sorting:'random',seed:SESSION_SEED+(HOME.page*7),page:HOME.page,per_page:24,ratios:ratioStr,q:homeQuery(),order:'desc'};
    var data=await fetchApi(buildUrl(params));
    var wh2X=HOME.page%3===0?await fetchWallhaven2():[];

TF.getLvl=function(){return parseInt(localStorage.getItem(TF.KEY_LVL)||'1');};
TF.saveXP=function(xp,lvl){localStorage.setItem(TF.KEY_XP,xp);localStorage.setItem(TF.KEY_LVL,lvl);};
TF.xpTick=function(){var lvl=TF.getLvl();if(lvl>=TF.MAX_LEVEL)return;var xp=TF.getXP()+60;if(xp>=TF.XP_PER_LEVEL){xp=0;lvl=Math.min(lvl+1,TF.MAX_LEVEL);TF.saveXP(xp,lvl);TF.showLevelUp(lvl);}else{TF.saveXP(xp,lvl);}};
TF.xpPct=function(){var lvl=TF.getLvl();if(lvl>=TF.MAX_LEVEL)return 100;return Math.round((TF.getXP()/TF.XP_PER_LEVEL)*100);};
TF.startTicker=function(){if(TF._ticker)return;TF._ticker=setInterval(TF.xpTick,60000);};
TF.getUser=function(){try{return JSON.parse(localStorage.getItem(TF.KEY_USER)||'null');}catch(e){return null;}};
TF.saveUser=function(u){localStorage.setItem(TF.KEY_USER,JSON.stringify(u));};

        ov.remove();openProfileOverlay();
      };
      var dlBtn=document.createElement('button');dlBtn.style.cssText='padding:5px 8px;border-radius:6px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.15);color:#f43f5e;font-size:10px;font-family:inherit;cursor:pointer';
      dlBtn.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"></path></svg>';
      dlBtn.onclick=function(e){
        e.stopPropagation();if(!confirm('Eliminar "'+col.name+'"?'))return;
        var all=window.getCols?window.getCols():[];
        if(window.saveCols)window.saveCols(all.filter(function(c){return c.id!==col.id;}));
        ov.remove();openProfileOverlay();
      };
      btnRow.appendChild(rnBtn);btnRow.appendChild(dlBtn);card.appendChild(btnRow);
    }
    card.onclick=function(){ov.remove();if(window.openColDetail)openColDetail(col);};
    colsGrid.appendChild(card);
  }

  if(liked.length)mkCC({id:'__liked__',name:'💜 Favoritos',pins:liked.slice(0,4).map(function(id){return{id:id,thumb:'',path:''};})},false);
  cols.forEach(function(c){mkCC(c,true);});
  if(uploaded.length)mkCC({id:'__up__',name:'📤 Mis subidas',pins:uploaded.slice(0,4).map(function(u){return{id:u.id,thumb:u.thumb,path:u.path};})},false);
  if(!liked.length&&!cols.length&&!uploaded.length){
    var empty=document.createElement('div');empty.style.cssText='grid-column:1/-1;padding:30px 0;text-align:center;color:var(--muted);font-size:13px';
    empty.innerHTML='Aún no tienes tableros<br><span style="font-size:11px">Guarda imágenes para empezar</span>';
    colsGrid.appendChild(empty);
  }
  ov.appendChild(colsGrid);
  document.body.appendChild(ov);
  requestAnimationFrame(function(){requestAnimationFrame(function(){ov.style.transform='translateX(0)';});});
  history.pushState({profOv:1},'');
}

window.openProfileOverlay=openProfileOverlay;

/* Wire profile button — capture phase for WebView compatibility */
document.addEventListener('click',function(e){
  var t=e.target;
  while(t&&t!==document.body){
    if(t.id==='btnProfile'){
      e.preventDefault();e.stopImmediatePropagation();
      var u=window.TF&&TF.getUser?TF.getUser():null;
      if(!u){if(window.TF&&TF.showLogin)TF.showLogin(function(){openProfileOverlay();});}
      else{openProfileOverlay();}
      return;
    }
    t=t.parentNode;
  }
},true);

(function(){
  function syncPB(){
    var btn=document.getElementById('btnProfile');if(!btn)return;
    var u=window.TF&&TF.getUser?TF.getUser():null;
    if(u&&u.avatar){
      var ei=btn.querySelector('img');
      if(ei){ei.src=u.avatar;}
      else{while(btn.firstChild)btn.removeChild(btn.firstChild);var pbi=document.createElement('img');pbi.style.cssText='width:28px;height:28px;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(168,85,247,.5)';pbi.src=u.avatar;pbi.onerror=function(){this.style.display='none';};btn.appendChild(pbi);var dot=document.createElement('div');dot.className='onlineDot';btn.appendChild(dot);}
    }
  }
  syncPB();
  var orig=window.TF&&TF.updateProfileUI?TF.updateProfileUI:null;
  if(window.TF)TF.updateProfileUI=function(){if(orig)orig();syncPB();};
})();

TF.init('walls');
setTimeout(function(){var _bp=document.querySelector('style[data-bp]');if(!_bp){_bp=document.createElement('style');_bp.setAttribute('data-bp','1');document.head.appendChild(_bp);}_bp.textContent='body{padding-bottom:calc(90px + env(safe-area-inset-bottom,0px)) !important}';},50);
setTimeout(function(){var m=document.getElementById('tf-mini');if(m)m.remove();},400);

(function(){
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='hidden'){try{sessionStorage.setItem('tfwp_scroll',window.scrollY);}catch(e){}}
    else{try{var s=sessionStorage.getItem('tfwp_scroll');if(s)window.scrollTo(0,parseInt(s));}catch(e){}if(window.TF&&TF.syncMini)TF.syncMini();}
  });
  window.addEventListener('pageshow',function(e){if(e.persisted){try{var s=sessionStorage.getItem('tfwp_scroll');if(s)window.scrollTo(0,parseInt(s));}catch(e){}}});
})();
</script>
</body>
