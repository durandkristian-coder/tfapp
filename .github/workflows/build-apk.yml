name: Build TFApp APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Sistema
        run: sudo apt-get install -y imagemagick
      - name: Configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 -c "import base64; open('www/index.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8')); print('splash OK')"
          python3 -c "import base64; open('www/browser_home.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8')); print('browser_home OK')"

      - name: core.html 1/4
        run: python3 -c "import base64; open('www/core.html','wb').write(base64.b64decode(''))"

      - name: core.html 2/4
        run: python3 -c "import base64; open('www/core.html','ab').write(base64.b64decode(''))"

      - name: core.html 3/4
        run: python3 -c "import base64; open('www/core.html','ab').write(base64.b64decode(''))"

      - name: core.html 4/4
        run: python3 -c "import base64; open('www/core.html','ab').write(base64.b64decode(''))"

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: SDK AGP minSdk
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Iconos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Permisos y Browser
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: MainActivity
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode()); print('MA OK')"

      - name: BrowserActivity 1/4
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','wb').write(base64.b64decode('')); print('BA 1/4 OK')"
      - name: BrowserActivity 2/4
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','ab').write(base64.b64decode('')); print('BA 2/4 OK')"
      - name: BrowserActivity 3/4
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','ab').write(base64.b64decode('')); print('BA 3/4 OK')"
      - name: BrowserActivity 4/4
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','ab').write(base64.b64decode('YXJhbXMgbHAoaW50IHcsIGludCBoKSB7IHJldHVybiBuZXcgTGluZWFyTGF5b3V0LkxheW91dFBhcmFtcyh3LCBoKTsgfQp9Cg==')); print('BA 4/4 OK')"
      - name: GeckoView version real
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"
      - name: BrowserActivity en Manifest
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Parchar music.html
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
