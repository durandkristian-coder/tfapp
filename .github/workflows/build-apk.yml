name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Crear configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Preparar www y splash
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generar iconos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Agregar permisos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Generar MainActivity
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode())"

      - name: Parchar music.html
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
