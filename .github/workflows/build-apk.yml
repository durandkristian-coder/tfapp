name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Crear package.json
        run: |
          printf '%s' '{
            "name": "tfapp",
            "version": "1.0.0",
            "description": "TFAPP - The Friendly Village",
            "dependencies": {
              "@capacitor/core": "6.2.0",
              "@capacitor/android": "6.2.0",
              "@capacitor/cli": "6.2.0"
            }
          }' > package.json

      - name: Crear capacitor.config.json
        run: |
          printf '%s' '{
            "appId": "com.tfv.tfapp",
            "appName": "TFAPP",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false,
              "backgroundColor": "#0a0011"
            }
          }' > capacitor.config.json

      - name: Preparar www y splash mejorado
        run: |
          mkdir -p www
          cp *.html www/
          python3 -c "
          html = '''<!DOCTYPE html>
          <html lang=\"es\">
          <head>
          <meta charset=\"utf-8\"/>
          <meta name=\"viewport\" content=\"width=device-width,initial-scale=1,viewport-fit=cover\"/>
          <title>TFAPP</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
          #bg{position:fixed;inset:0;background-size:cover;background-position:center;transition:opacity 1s;z-index:0}
          #overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(10,0,17,.55),rgba(10,0,17,.82) 60%,rgba(10,0,17,.97));z-index:1}
          #content{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
          .logo{width:100px;height:100px;border-radius:24px;box-shadow:0 0 0 2px rgba(168,85,247,.4),0 0 40px rgba(168,85,247,.35);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
          .name{font-size:32px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#e9d5ff,#a855f7 50%,#7e3cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .5s .2s both}
          .sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.15em;text-transform:uppercase;animation:fadeUp .5s .3s both}
          .msg{font-size:13px;color:rgba(255,255,255,.6);text-align:center;max-width:260px;line-height:1.5;font-style:italic;animation:fadeUp .5s .4s both;min-height:40px}
          .bar-wrap{width:160px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;animation:fadeUp .4s .5s both}
          .bar{height:100%;width:0%;background:linear-gradient(90deg,#7e3cff,#d9a3ff);border-radius:2px;animation:load 1.8s .3s ease forwards}
          .ver{position:fixed;bottom:20px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.1em}
          @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
          @keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
          @keyframes load{from{width:0%}to{width:100%}}
          </style>
          </head>
          <body>
          <div id=\"bg\"></div>
          <div id=\"overlay\"></div>
          <div id=\"content\">
            <img class=\"logo\" src=\"https://i.imgur.com/lALmGx6.png\" alt=\"TFAPP\"/>
            <div class=\"name\">TFAPP</div>
            <div class=\"sub\">The Friendly Village</div>
            <div class=\"msg\" id=\"msg\"></div>
            <div class=\"bar-wrap\"><div class=\"bar\"></div></div>
          </div>
          <div class=\"ver\">v1.0</div>
          <script>
          var msgs = [
            \"Todo TFV en un solo lugar âœ¨\",
            \"Bienvenido de vuelta ðŸ‘‹\",
            \"Tu comunidad te espera ðŸŽ®\",
            \"Hay mas de 50 juegos en TFGames ðŸ•¹ï¸\",
            \"TFReader tiene miles de mangas en espaÃ±ol ðŸ“š\",
            \"Puedes descargar wallpapers tocando el icono ðŸ–¼ï¸\",
            \"Las historias duran 42 horas automÃ¡ticamente â³\",
            \"Chatea con Nora, tu IA personal ðŸ¤–\",
            \"TFMusic es tu reproductor offline ðŸŽµ\",
            \"Puedes compartir posts con tus amigos ðŸ’¬\"
          ];
          var bgs = [
            \"https://i.imgur.com/lALmGx6.png\"
          ];
          document.getElementById(\"msg\").textContent = msgs[Math.floor(Math.random()*msgs.length)];
          setTimeout(function(){ window.location.replace(\"hub.html\"); }, 2200);
          </script>
          </body>
          </html>'''
          open('www/index.html', 'w').write(html)
          print('splash OK')
          "

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Generar iconos TFV
        run: |
          curl -L "https://i.imgur.com/lALmGx6.png" -o logo.png
          convert -size 1024x1024 xc:"#1a0035" bg.png
          convert bg.png logo.png -gravity center -resize 800x800 -composite icon_full.png
          rm -rf android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi
          rm -rf android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi
          rm -rf android/app/src/main/res/mipmap-xxxhdpi android/app/src/main/res/mipmap-anydpi-v26
          for row in "mipmap-mdpi 48" "mipmap-hdpi 72" "mipmap-xhdpi 96" "mipmap-xxhdpi 144" "mipmap-xxxhdpi 192"; do
            folder=$(echo $row | cut -d' ' -f1); size=$(echo $row | cut -d' ' -f2)
            dir="android/app/src/main/res/$folder"; mkdir -p "$dir"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done
          for row in "mipmap-mdpi 108" "mipmap-hdpi 162" "mipmap-xhdpi 216" "mipmap-xxhdpi 324" "mipmap-xxxhdpi 432"; do
            folder=$(echo $row | cut -d' ' -f1); size=$(echo $row | cut -d' ' -f2)
            inner=$((size * 66 / 100)); dir="android/app/src/main/res/$folder"; mkdir -p "$dir"
            convert logo.png -resize "${inner}x${inner}" -gravity center -background none               -extent "${size}x${size}" "$dir/ic_launcher_foreground.png"
          done
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          printf '%s' '<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml              android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          python3 -c "
          import re, os
          path = 'android/app/src/main/res/values/ic_launcher_background.xml'
          if os.path.exists(path):
              c = open(path).read()
              c = re.sub(r'<color name=\"ic_launcher_background\">[^<]+</color>',
                         '<color name=\"ic_launcher_background\">#1a0035</color>', c)
              open(path, 'w').write(c)
          else:
              os.makedirs('android/app/src/main/res/values', exist_ok=True)
              open(path, 'w').write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <color name=\"ic_launcher_background\">#1a0035</color>\n</resources>\n')
          print('Color OK')
          "

      - name: Agregar permisos
        run: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          perms = ['android.permission.INTERNET','android.permission.POST_NOTIFICATIONS',
                   'android.permission.READ_MEDIA_IMAGES','android.permission.READ_MEDIA_VIDEO',
                   'android.permission.CAMERA','android.permission.FOREGROUND_SERVICE',
                   'android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK',
                   'android.permission.WAKE_LOCK','android.permission.VIBRATE']
          lines = ['    <uses-permission android:name=\"{}\"/>'.format(p) for p in perms]
          lines += ['    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\"/>',
                    '    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"29\"/>']
          c = open(path).read()
          if 'POST_NOTIFICATIONS' not in c:
              c = c.replace('<application', '\n'.join(lines) + '\n    <application', 1)
              open(path, 'w').write(c)
          print('Permisos OK')
          "

      - name: Generar MainActivity con MediaSession nativo
        run: |
          python3 -c "
          import base64
          java = base64.b64decode('').decode('utf-8')
          dest = 'android/app/src/main/java/com/tfv/tfapp/MainActivity.java'
          open(dest, 'w').write(java)
          print('MainActivity OK -', len(java), 'chars')
          "

      - name: Parchar music.html con bridge nativo robusto
        run: |
          python3 -c "
          import base64
          bridge_js = base64.b64decode('').decode('utf-8')
          path = 'www/music.html'
          content = open(path).read()
          if 'TFMusicNativeCallback' not in content:
              tag = '<script>' + bridge_js + '<\/script>'
              content = content.replace('<\/body>', tag + '<\/body>')
              open(path, 'w').write(content)
              print('music.html parcheado OK')
          else:
              print('Bridge ya presente')
          "

      - name: Construir APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
