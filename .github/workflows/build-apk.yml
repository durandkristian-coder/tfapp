name: Build TFApp APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: |
          python3 - <<'PYEOF'
          import base64,sys; exec(base64.b64decode('').decode())
          PYEOF

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 - <<'PYEOF'
          import base64
          open('www/index.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8'))
          print('splash OK')
          PYEOF
          python3 - <<'PYEOF'
          import base64
          open('www/browser_home.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8'))
          print('browser_home OK')
          PYEOF
