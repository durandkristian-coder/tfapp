name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Crear package.json
        run: |
          printf '%s' '{
            "name": "tfapp",
            "version": "1.0.0",
            "description": "TFAPP - The Friendly Village",
            "dependencies": {
              "@capacitor/core": "6.2.0",
              "@capacitor/android": "6.2.0",
              "@capacitor/cli": "6.2.0"
            }
          }' > package.json

      - name: Crear capacitor.config.json
        run: |
          printf '%s' '{
            "appId": "com.tfv.tfapp",
            "appName": "TFAPP",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false,
              "backgroundColor": "#0a0011"
            }
          }' > capacitor.config.json

      - name: Preparar carpeta www
        run: |
          mkdir -p www
          cp *.html www/
          python3 -c "
          html = open('www/splash.html').read() if __import__('os').path.exists('www/splash.html') else ''
          splash = '''<!DOCTYPE html>
          <html lang=\"es\">
          <head>
          <meta charset=\"utf-8\"/>
          <meta name=\"viewport\" content=\"width=device-width,initial-scale=1,viewport-fit=cover\"/>
          <title>TFAPP</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          html,body{height:100%;background:#0a0011;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
          .logo{width:110px;height:110px;border-radius:26px;box-shadow:0 0 40px rgba(168,85,247,.5);animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
          .name{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:30px;font-weight:900;background:linear-gradient(90deg,#e9d5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
          .sub{font-family:-apple-system,sans-serif;font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-align:center;text-transform:uppercase}
          .bar-wrap{width:140px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:10px}
          .bar{height:100%;width:0%;background:linear-gradient(90deg,#7e3cff,#d9a3ff);border-radius:2px;animation:load 1.7s ease forwards}
          @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
          @keyframes load{from{width:0%}to{width:100%}}
          </style>
          </head>
          <body>
          <img class=\"logo\" src=\"https://i.imgur.com/lALmGx6.png\" alt=\"TFAPP\"/>
          <div>
            <div class=\"name\">TFAPP</div>
            <div class=\"sub\" style=\"margin-top:5px\">The Friendly Village</div>
          </div>
          <div class=\"bar-wrap\"><div class=\"bar\"></div></div>
          <script>setTimeout(function(){window.location.replace(\"hub.html\");},2000);</script>
          </body>
          </html>'''
          open('www/index.html', 'w').write(splash)
          print('index.html creado')
          "

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Generar iconos TFV
        run: |
          curl -L "https://i.imgur.com/lALmGx6.png" -o logo.png
          convert -size 1024x1024 xc:"#1a0035" bg.png
          convert bg.png logo.png -gravity center -resize 800x800 -composite icon_full.png

          rm -rf android/app/src/main/res/mipmap-mdpi
          rm -rf android/app/src/main/res/mipmap-hdpi
          rm -rf android/app/src/main/res/mipmap-xhdpi
          rm -rf android/app/src/main/res/mipmap-xxhdpi
          rm -rf android/app/src/main/res/mipmap-xxxhdpi
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

          for row in "mipmap-mdpi 48" "mipmap-hdpi 72" "mipmap-xhdpi 96" "mipmap-xxhdpi 144" "mipmap-xxxhdpi 192"; do
            folder=$(echo $row | cut -d' ' -f1)
            size=$(echo $row | cut -d' ' -f2)
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done

          for row in "mipmap-mdpi 108" "mipmap-hdpi 162" "mipmap-xhdpi 216" "mipmap-xxhdpi 324" "mipmap-xxxhdpi 432"; do
            folder=$(echo $row | cut -d' ' -f1)
            size=$(echo $row | cut -d' ' -f2)
            inner=$((size * 66 / 100))
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            convert logo.png -resize "${inner}x${inner}" \
              -gravity center -background none -extent "${size}x${size}" \
              "$dir/ic_launcher_foreground.png"
          done

          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          printf '%s' '<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          # Editar el color en ic_launcher_background.xml que Capacitor ya creó
          python3 -c "
          import re, os
          path = 'android/app/src/main/res/values/ic_launcher_background.xml'
          if os.path.exists(path):
              c = open(path).read()
              c = re.sub(r'<color name=\"ic_launcher_background\">[^<]+</color>',
                         '<color name=\"ic_launcher_background\">#1a0035</color>', c)
              open(path, 'w').write(c)
              print('Color actualizado en', path)
          else:
              os.makedirs('android/app/src/main/res/values', exist_ok=True)
              open(path, 'w').write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <color name=\"ic_launcher_background\">#1a0035</color>\n</resources>\n')
              print('ic_launcher_background.xml creado')
          "

      - name: Agregar permisos en AndroidManifest.xml
        run: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          perms = [
              'android.permission.INTERNET',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.READ_MEDIA_IMAGES',
              'android.permission.READ_MEDIA_VIDEO',
              'android.permission.CAMERA',
              'android.permission.FOREGROUND_SERVICE',
              'android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK',
              'android.permission.WAKE_LOCK',
              'android.permission.VIBRATE',
          ]
          lines = ['    <uses-permission android:name=\"{}\"/>'.format(p) for p in perms]
          lines += [
              '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\"/>',
              '    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"29\"/>',
          ]
          block = '\n'.join(lines) + '\n'
          c = open(path).read()
          if 'POST_NOTIFICATIONS' not in c:
              c = c.replace('<application', block + '    <application', 1)
              open(path, 'w').write(c)
              print('Permisos agregados')
          else:
              print('Permisos ya existen')
          "

      - name: Construir APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Generar MainActivity con CORS bypass, audio background y permisos
        run: |
          MAIN="android/app/src/main/java/com/tfv/tfapp/MainActivity.java"
          python3 -c "
          java = '''package com.tfv.tfapp;

import android.Manifest;
import android.app.NotificationChannel;
import android.app.NotificationManager;
import android.content.pm.PackageManager;
import android.os.Build;
import android.os.Bundle;
import android.webkit.WebResourceRequest;
import android.webkit.WebResourceResponse;
import android.webkit.WebSettings;
import android.webkit.WebView;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;
import com.getcapacitor.BridgeActivity;
import com.getcapacitor.BridgeWebViewClient;
import java.io.InputStream;
import java.net.HttpURLConnection;
import java.net.URL;
import java.util.ArrayList;
import java.util.HashMap;
import java.util.List;
import java.util.Map;

public class MainActivity extends BridgeActivity {
    private static final int PERM_REQ = 1001;

    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        crearCanalesNotificacion();
        pedirPermisos();
    }

    @Override
    public void onStart() {
        super.onStart();
        configurarWebView();
    }

    private void crearCanalesNotificacion() {
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            NotificationChannel canal = new NotificationChannel(
                "tfmusic_playback", "TFMusic - Reproduccion", NotificationManager.IMPORTANCE_LOW);
            canal.setDescription("Controles de TFMusic");
            canal.setSound(null, null);
            canal.setShowBadge(false);
            NotificationManager nm = getSystemService(NotificationManager.class);
            if (nm != null) nm.createNotificationChannel(canal);
        }
    }

    private void pedirPermisos() {
        List<String> perms = new ArrayList<>();
        if (Build.VERSION.SDK_INT >= 33) {
            if (check(Manifest.permission.POST_NOTIFICATIONS)) perms.add(Manifest.permission.POST_NOTIFICATIONS);
            if (check(Manifest.permission.READ_MEDIA_IMAGES))  perms.add(Manifest.permission.READ_MEDIA_IMAGES);
            if (check(Manifest.permission.READ_MEDIA_VIDEO))   perms.add(Manifest.permission.READ_MEDIA_VIDEO);
        } else {
            if (check(Manifest.permission.READ_EXTERNAL_STORAGE)) perms.add(Manifest.permission.READ_EXTERNAL_STORAGE);
            if (check(Manifest.permission.WRITE_EXTERNAL_STORAGE)) perms.add(Manifest.permission.WRITE_EXTERNAL_STORAGE);
        }
        if (check(Manifest.permission.CAMERA)) perms.add(Manifest.permission.CAMERA);
        if (!perms.isEmpty())
            ActivityCompat.requestPermissions(this, perms.toArray(new String[0]), PERM_REQ);
    }

    private boolean check(String p) {
        return ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED;
    }

    private void configurarWebView() {
        WebView wv = getBridge().getWebView();
        if (wv == null) return;

        WebSettings s = wv.getSettings();
        s.setMediaPlaybackRequiresUserGesture(false);
        s.setDomStorageEnabled(true);
        s.setDatabaseEnabled(true);
        s.setAllowFileAccess(true);
        s.setAllowContentAccess(true);
        s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

        // CORS bypass: interceptar APIs externas y hacerlas nativas
        wv.setWebViewClient(new BridgeWebViewClient(getBridge()) {
            @Override
            public WebResourceResponse shouldInterceptRequest(WebView view, WebResourceRequest req) {
                String url = req.getUrl().toString();
                boolean intercept = url.contains("wallhaven.cc")
                    || url.contains("corsproxy.io")
                    || url.contains("api.tmdb.org")
                    || url.contains("api.jikan.moe")
                    || url.contains("image.tmdb.org");

                if (intercept && "GET".equals(req.getMethod())) {
                    try {
                        String target = url;
                        if (target.startsWith("https://corsproxy.io/?"))
                            target = target.substring("https://corsproxy.io/?".length());
                        if (target.startsWith("https://corsproxy.io/raw?url="))
                            target = java.net.URLDecoder.decode(
                                target.substring("https://corsproxy.io/raw?url=".length()), "UTF-8");

                        URL javaUrl = new URL(target);
                        HttpURLConnection conn = (HttpURLConnection) javaUrl.openConnection();
                        conn.setRequestMethod("GET");
                        conn.setConnectTimeout(15000);
                        conn.setReadTimeout(15000);
                        conn.setRequestProperty("User-Agent",
                            "Mozilla/5.0 (Android; TFApp/1.0)");
                        conn.setRequestProperty("Accept", "application/json,image/*,*/*");

                        int code = conn.getResponseCode();
                        String mime = "application/json";
                        String ct = conn.getContentType();
                        if (ct != null) mime = ct.split(";")[0].trim();

                        Map<String, String> hdrs = new HashMap<>();
                        hdrs.put("Access-Control-Allow-Origin", "*");
                        hdrs.put("Access-Control-Allow-Methods", "GET,POST,OPTIONS");
                        hdrs.put("Cache-Control", "max-age=300");

                        InputStream is = code >= 400 ? conn.getErrorStream() : conn.getInputStream();
                        return new WebResourceResponse(mime, "UTF-8", code, "OK", hdrs, is);
                    } catch (Exception e) { /* fall through */ }
                }
                return super.shouldInterceptRequest(view, req);
            }
        });
    }

    @Override
    public void onPause() {
        super.onPause();
        WebView wv = getBridge().getWebView();
        if (wv != null) wv.resumeTimers();
    }

    @Override
    public void onResume() {
        super.onResume();
        WebView wv = getBridge().getWebView();
        if (wv != null) wv.resumeTimers();
    }
}'''
          open(\'android/app/src/main/java/com/tfv/tfapp/MainActivity.java\', \'w\').write(java)
          print(\'MainActivity.java generado con CORS bypass\')
          "
