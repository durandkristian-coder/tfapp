name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 -c "import base64; open('www/index.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8')); print('splash OK')"

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Iconos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Permisos y Browser
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: MainActivity
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode()); print('MA OK')"

      - name: BrowserActivity GeckoView
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','w').write(base64.b64decode('').decode()); print('BrowserActivity OK')"

      - name: GeckoView en build.gradle
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: BrowserActivity en Manifest
        run: |
          python3 << 'PYEOF'
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          c = open(path).read()
          entry = '\n        <activity android:name=".BrowserActivity" android:configChanges="orientation|screenSize|keyboardHidden" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize" android:exported="false"/>'
          if 'BrowserActivity' not in c:
              c = c.replace('</application>', entry + '\n    </application>', 1)
              open(path, 'w').write(c)
              print('BrowserActivity added OK')
          else:
              print('BrowserActivity already in manifest')
          PYEOF

      - name: Parchar music.html
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
