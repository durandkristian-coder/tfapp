name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 << 'PYEOF'
          import base64
          open('www/index.html','w',encoding='utf-8').write(base64.b64decode(''.replace('Ym9yZf','Ym9keQ=='),'utf-8'))
          PYEOF

      - name: Install
        run: npm install

      - name: Build
        run: |
          mkdir -p www
          # No eliminamos index.html ya que fue generado arriba con el splash
          npx cap add android
          npx cap copy android

      - name: Patch Java
        run: |
          python3 -c "
          import os
          f = 'android/app/src/main/java/com/tfv/tfx/MainActivity.java'
          if not os.path.exists(f): 
              # Buscar la ruta real segun el package id
              for root, dirs, files in os.walk('android/app/src/main/java'):
                  if 'MainActivity.java' in files:
                      f = os.path.join(root, 'MainActivity.java')
                      break
          c = open(f).read()
          if 'import android.os.Bundle;' not in c:
              c = c.replace('import com.getcapacitor.BridgeActivity;', 'import com.getcapacitor.BridgeActivity;\nimport android.os.Bundle;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;')
              c = c.replace('public class MainActivity extends BridgeActivity {}', 'public class MainActivity extends BridgeActivity {\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n    }\n    @Override\n    public void onStart() {\n        super.onStart();\n        WebView webView = getBridge().getWebView();\n        WebSettings settings = webView.getSettings();\n        settings.setAllowFileAccess(true);\n        settings.setAllowContentAccess(true);\n        settings.setDomStorageEnabled(true);\n        settings.setJavaScriptEnabled(true);\n        settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);\n    }\n}')
              open(f,'w').write(c)
          "

      - name: Patch JS
        run: |
          python3 -c "
          import os, base64
          f = 'android/app/src/main/assets/capacitor.js'
          # El archivo puede no existir hasta el primer build, pero npx cap copy lo trae.
          # Si no esta en assets, se busca en la carpeta de capas.
          # Para simplificar, este parche se aplica si el archivo existe.
          if os.path.exists(f):
              c = open(f).read()
              # Aqui agregarias parches especificos si fallara el bridge
              pass
          "

      - name: Icons
        run: |
          curl -sL https://thefriendlyvillage.github.io/TFApp/icon.png -o icon.png
          # Generar mipmaps requeridos por Android
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          magick icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          magick icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          magick icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          magick icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          magick icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TFApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
