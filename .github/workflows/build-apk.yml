name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Crear package.json
        run: |
          printf '%s' '{
            "name": "tfapp",
            "version": "1.0.0",
            "description": "TFV App",
            "dependencies": {
              "@capacitor/core": "6.2.0",
              "@capacitor/android": "6.2.0",
              "@capacitor/cli": "6.2.0"
            }
          }' > package.json

      - name: Crear capacitor.config.json
        run: |
          printf '%s' '{
            "appId": "com.tfv.tfapp",
            "appName": "TFApp",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false,
              "backgroundColor": "#0a0011"
            }
          }' > capacitor.config.json

      - name: Preparar carpeta www
        run: |
          mkdir -p www
          cp *.html www/
          python3 - << 'PYEOF'
          html = """<!DOCTYPE html>
          <html lang="es">
          <head>
          <meta charset="utf-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
          <title>TFApp</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          html,body{height:100%;background:#0a0011;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
          .logo{width:110px;height:110px;border-radius:26px;box-shadow:0 0 40px rgba(168,85,247,.5);animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
          .name{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:30px;font-weight:900;background:linear-gradient(90deg,#e9d5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
          .sub{font-family:-apple-system,sans-serif;font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-align:center;text-transform:uppercase}
          .bar-wrap{width:140px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:10px}
          .bar{height:100%;width:0%;background:linear-gradient(90deg,#7e3cff,#d9a3ff);border-radius:2px;animation:load 1.7s ease forwards}
          @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
          @keyframes load{from{width:0%}to{width:100%}}
          </style>
          </head>
          <body>
          <img class="logo" src="https://i.imgur.com/lALmGx6.png" alt="TFApp"/>
          <div>
            <div class="name">TFAPP</div>
            <div class="sub" style="margin-top:5px">The Friendly Village</div>
          </div>
          <div class="bar-wrap"><div class="bar"></div></div>
          <script>setTimeout(function(){window.location.replace('hub.html');},2000);</script>
          </body>
          </html>"""
          with open("www/index.html", "w") as f:
              f.write(html)
          print("index.html creado")
          PYEOF

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Generar iconos desde logo TFV
        run: |
          curl -L "https://i.imgur.com/lALmGx6.png" -o logo.png

          # Base con fondo morado
          convert -size 1024x1024 xc:"#1a0035" bg.png
          convert bg.png logo.png -gravity center -resize 800x800 -composite icon_full.png

          # Tamaños estándar
          for row in "mipmap-mdpi 48" "mipmap-hdpi 72" "mipmap-xhdpi 96" "mipmap-xxhdpi 144" "mipmap-xxxhdpi 192"; do
            folder=$(echo $row | cut -d' ' -f1)
            size=$(echo $row | cut -d' ' -f2)
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert icon_full.png -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done

          # Foreground adaptive icon
          for row in "mipmap-mdpi 108" "mipmap-hdpi 162" "mipmap-xhdpi 216" "mipmap-xxhdpi 324" "mipmap-xxxhdpi 432"; do
            folder=$(echo $row | cut -d' ' -f1)
            size=$(echo $row | cut -d' ' -f2)
            inner=$((size * 66 / 100))
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            convert logo.png -resize "${inner}x${inner}" \
              -gravity center -background none -extent "${size}x${size}" \
              "$dir/ic_launcher_foreground.png"
          done

          # Adaptive icon XML
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          python3 -c "
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\">
            <background android:drawable=\"@color/ic_launcher_background\"/>
            <foreground android:drawable=\"@mipmap/ic_launcher_foreground\"/>
          </adaptive-icon>'''
          open('android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml','w').write(xml)
          open('android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml','w').write(xml)
          "

          # Color de fondo
          mkdir -p android/app/src/main/res/values
          python3 -c "
          import os, re
          colors_path = 'android/app/src/main/res/values/colors.xml'
          new_color = '    <color name=\"ic_launcher_background\">#1a0035</color>'
          if os.path.exists(colors_path):
              content = open(colors_path).read()
              if 'ic_launcher_background' not in content:
                  content = content.replace('</resources>', new_color + '\n</resources>')
                  open(colors_path, 'w').write(content)
          else:
              open(colors_path, 'w').write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n' + new_color + '\n</resources>\n')
          "

      - name: Agregar permisos en AndroidManifest.xml
        run: |
          python3 - << 'PYEOF'
          perms = [
            'android.permission.INTERNET',
            'android.permission.POST_NOTIFICATIONS',
            'android.permission.READ_MEDIA_IMAGES',
            'android.permission.READ_MEDIA_VIDEO',
            'android.permission.CAMERA',
            'android.permission.FOREGROUND_SERVICE',
            'android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK',
            'android.permission.WAKE_LOCK',
            'android.permission.VIBRATE',
          ]
          extras = [
            '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
            '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />',
          ]
          lines = ['    <uses-permission android:name="{}" />'.format(p) for p in perms]
          lines += ['    ' + e for e in extras]
          block = '\n'.join(lines) + '\n    '
          path = 'android/app/src/main/AndroidManifest.xml'
          content = open(path).read()
          content = content.replace('<application', block + '<application', 1)
          open(path, 'w').write(content)
          print("Permisos agregados OK")
          PYEOF

      - name: Construir APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: TFApp-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
