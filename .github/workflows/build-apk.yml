name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 << 'PYEOF'
          import base64
          open('www/index.html','w',encoding='utf-8').write(base64.b64decode(' ').decode('utf-8'))
          print('splash OK')
          PYEOF
          python3 << 'PYEOF'
          import base64
          open('www/core.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8'))
          print('core.html OK')
          PYEOF

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Iconos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Permisos y Browser
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: MainActivity
        run: |
          python3 << 'PYEOF'
          import base64
          open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode())
          print('MainActivity OK')
          PYEOF

      - name: BrowserActivity GeckoView
        run: |
          python3 << 'PYEOF'
          import base64
          open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','w').write(base64.b64decode('
    ').decode())
          print('BrowserActivity.java OK')
          PYEOF

      # ── ÚNICO CAMBIO REAL: GeckoView con versión real + repo Mozilla ──
      - name: GeckoView en build.gradle
        run: |
          python3 << 'PYEOF'
          import re, os

          # 1. Repo Mozilla en project-level build.gradle
          proj = 'android/build.gradle'
          if os.path.exists(proj):
              pg = open(proj).read()
              if 'maven.mozilla.org' not in pg:
                  pg = pg.replace(
                      'repositories {',
                      'repositories {\n        maven { url "https://maven.mozilla.org/maven2/" }',
                      1
                  )
                  open(proj, 'w').write(pg)
                  print('Mozilla repo added to project build.gradle OK')
              else:
                  print('Mozilla repo already in project build.gradle')

          # 2. Repo Mozilla + dependencia en app/build.gradle
          app_gradle = 'android/app/build.gradle'
          c = open(app_gradle).read()

          if 'maven.mozilla.org' not in c:
              if 'repositories {' in c:
                  c = c.replace(
                      'repositories {',
                      'repositories {\n    maven { url "https://maven.mozilla.org/maven2/" }',
                      1
                  )
              else:
                  c = c.replace(
                      'dependencies {',
                      'repositories {\n    maven { url "https://maven.mozilla.org/maven2/" }\n}\n\ndependencies {',
                      1
                  )
              print('Mozilla repo added to app build.gradle OK')

          # 3. Dependencia GeckoView version 119.0 (existe en maven.mozilla.org)
          gecko_dep = "    implementation 'org.mozilla.geckoview:geckoview-arm64-v8a:119.0.20231025210441'"
          if 'geckoview' not in c:
              c = re.sub(r'(dependencies\s*\{)', r'\1\n' + gecko_dep, c, count=1)
              print('GeckoView dependency added OK')
          else:
              c = re.sub(
                  r"implementation 'org\.mozilla\.geckoview:geckoview-arm64-v8a:[^']*'",
                  gecko_dep.strip(),
                  c
              )
              print('GeckoView version fixed to 119.0.20231025210441 OK')

          open(app_gradle, 'w').write(c)
          print('build.gradle patched OK')
          PYEOF

      - name: BrowserActivity en Manifest
        run: |
          python3 << 'PYEOF'
          import re, os
          path = 'android/app/src/main/AndroidManifest.xml'
          c = open(path).read()
          browser_activity = '''
          <activity
              android:name=".BrowserActivity"
              android:configChanges="orientation|screenSize|keyboardHidden"
              android:hardwareAccelerated="true"
              android:windowSoftInputMode="adjustResize"
              android:exported="false"/>'''
          if 'BrowserActivity' not in c:
              c = c.replace('</application>', browser_activity + '\n    </application>', 1)
              open(path, 'w').write(c)
              print('BrowserActivity added to manifest OK')
          else:
              print('BrowserActivity already in manifest')
          PYEOF

      - name: Parchear hub.html para GeckoView
        run: |
          python3 << 'PYEOF'
          import os
          path = 'www/hub.html'
          if not os.path.exists(path):
              print('hub.html not found - skipping'); exit(0)
          c = open(path, 'r', encoding='utf-8').read()
          inject = """
          <script>
          (function(){
            function openGeckoBrowser(url) {
              if (window.TFBrowserBridge && window.TFBrowserBridge.openBrowser) {
                window.TFBrowserBridge.openBrowser(url || 'https://www.google.com');
              } else {
                window.location.href = 'core.html';
              }
            }
            window.openGeckoBrowser = openGeckoBrowser;
            document.addEventListener('DOMContentLoaded', function() {
              setTimeout(function() {
                var nav = document.getElementById('tf-nav');
                if (!nav) return;
                var btns = nav.querySelectorAll('.tf-nb');
                btns.forEach(function(btn) {
                  var lbl = btn.querySelector('.tf-nb-lbl');
                  if (lbl && lbl.textContent === 'Navegar') {
                    btn.onclick = function() { openGeckoBrowser(); };
                  }
                });
              }, 500);
            });
          })();
          </script>
          """
          if 'openGeckoBrowser' not in c:
              c = c.replace('</body>', inject + '</body>', 1)
              open(path, 'w', encoding='utf-8').write(c)
              print('hub.html patched for GeckoView bridge OK')
          else:
              print('hub.html already patched')
          PYEOF

      - name: Parchar music.html
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
