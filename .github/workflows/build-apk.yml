name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Splash y www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          python3 -c "import base64; open('www/index.html','w',encoding='utf-8').write(base64.b64decode('').decode('utf-8')); print('splash OK')"

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Iconos
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Permisos y Browser
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: MainActivity
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode()); print('MainActivity OK')"

      - name: BrowserActivity GeckoView
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/BrowserActivity.java','w').write(base64.b64decode('').decode()); print('BrowserActivity OK')"

      - name: GeckoView en build.gradle
        run: |
          python3 << 'PYEOF'
          import re, os

          proj = 'android/build.gradle'
          if os.path.exists(proj):
              pg = open(proj).read()
              if 'maven.mozilla.org' not in pg:
                  pg = pg.replace('repositories {', 'repositories {\n        maven { url "https://maven.mozilla.org/maven2/" }', 1)
                  open(proj, 'w').write(pg)
                  print('Mozilla repo added to project build.gradle OK')
              else:
                  print('Mozilla repo already present')

          app_gradle = 'android/app/build.gradle'
          c = open(app_gradle).read()
          if 'maven.mozilla.org' not in c:
              if 'repositories {' in c:
                  c = c.replace('repositories {', 'repositories {\n    maven { url "https://maven.mozilla.org/maven2/" }', 1)
              else:
                  c = c.replace('dependencies {', 'repositories {\n    maven { url "https://maven.mozilla.org/maven2/" }\n}\n\ndependencies {', 1)
              print('Mozilla repo added to app build.gradle OK')

          gecko_dep = "    implementation 'org.mozilla.geckoview:geckoview-arm64-v8a:119.0.20231025210441'"
          if 'geckoview' not in c:
              c = re.sub(r'(dependencies\s*\{)', r'\1\n' + gecko_dep, c, count=1)
              print('GeckoView dependency added OK')
          else:
              c = re.sub(r"implementation 'org\.mozilla\.geckoview:geckoview-arm64-v8a:[^']*'", gecko_dep.strip(), c)
              print('GeckoView version fixed OK')

          open(app_gradle, 'w').write(c)
          print('build.gradle patched OK')
          PYEOF

      - name: BrowserActivity en Manifest
        run: |
          python3 << 'PYEOF'
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          c = open(path).read()
          entry = '\n        <activity android:name=".BrowserActivity" android:configChanges="orientation|screenSize|keyboardHidden" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize" android:exported="false"/>'
          if 'BrowserActivity' not in c:
              c = c.replace('</application>', entry + '\n    </application>', 1)
              open(path, 'w').write(c)
              print('BrowserActivity added to manifest OK')
          else:
              print('BrowserActivity already in manifest')
          PYEOF

      - name: Parchar music.html
        run: python3 -c "import base64,sys; exec(base64.b64decode('').decode())"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
