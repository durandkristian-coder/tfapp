name: Build TFApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sistema
        run: sudo apt-get install -y imagemagick

      - name: Configs
        run: |
          python3 -c "import json; json.dump({'name':'tfapp','version':'1.0.0','dependencies':{'@capacitor/core':'6.2.0','@capacitor/android':'6.2.0','@capacitor/cli':'6.2.0'}},open('package.json','w')); json.dump({'appId':'com.tfv.tfapp','appName':'TFAPP','webDir':'www','server':{'androidScheme':'https'},'android':{'allowMixedContent':True,'captureInput':True,'webContentsDebuggingEnabled':False,'backgroundColor':'#0a0011'}},open('capacitor.config.json','w'))"

      - name: Splash
        run: |
          mkdir -p www
          cp *.html www/
          python3 -c "import base64; open('www/index.html','w').write(base64.b64decode('').decode())"

      - name: npm install
        run: npm install

      - name: Agregar Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Iconos
        run: |
          curl -L "https://i.imgur.com/lALmGx6.png" -o logo.png
          convert -size 1024x1024 xc:"#1a0035" bg.png
          convert bg.png logo.png -gravity center -resize 800x800 -composite ic.png
          rm -rf android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi android/app/src/main/res/mipmap-anydpi-v26
          for SZ in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            FOLDER="${SZ%%:*}" SIZE="${SZ##*:}"
            DIR="android/app/src/main/res/$FOLDER" && mkdir -p "$DIR"
            convert ic.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            convert ic.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher_round.png"
          done
          for SZ in "mipmap-mdpi:108" "mipmap-hdpi:162" "mipmap-xhdpi:216" "mipmap-xxhdpi:324" "mipmap-xxxhdpi:432"; do
            FOLDER="${SZ%%:*}" SIZE="${SZ##*:}" INNER=$((${SZ##*:}*66/100))
            DIR="android/app/src/main/res/$FOLDER" && mkdir -p "$DIR"
            convert logo.png -resize "${INNER}x${INNER}" -gravity center -background none -extent "${SIZE}x${SIZE}" "$DIR/ic_launcher_foreground.png"
          done
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          printf '%s' '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          python3 -c "
          import re,os
          p='android/app/src/main/res/values/ic_launcher_background.xml'
          if os.path.exists(p):
            c=open(p).read()
            c=re.sub(r'<color name=chr(34)ic_launcher_backgroundchr(34)>[^<]+</color>','<color name=chr(34)ic_launcher_backgroundchr(34)>#1a0035</color>',c)
          else:
            os.makedirs(os.path.dirname(p),exist_ok=True)
            c='<?xml version=chr(34)1.0chr(34) encoding=chr(34)utf-8chr(34)?><resources><color name=chr(34)ic_launcher_backgroundchr(34)>#1a0035</color></resources>'
          open(p,'w').write(c)
          print('color OK')
          "

      - name: Permisos
        run: |
          python3 -c "
          p='android/app/src/main/AndroidManifest.xml'
          ps=['android.permission.INTERNET','android.permission.POST_NOTIFICATIONS','android.permission.READ_MEDIA_IMAGES','android.permission.READ_MEDIA_VIDEO','android.permission.CAMERA','android.permission.FOREGROUND_SERVICE','android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK','android.permission.WAKE_LOCK','android.permission.VIBRATE']
          ls=['    <uses-permission android:name=chr(34)'+x+'chr(34)/>' for x in ps]+['    <uses-permission android:name=chr(34)android.permission.READ_EXTERNAL_STORAGEchr(34) android:maxSdkVersion=chr(34)32chr(34)/>','    <uses-permission android:name=chr(34)android.permission.WRITE_EXTERNAL_STORAGEchr(34) android:maxSdkVersion=chr(34)29chr(34)/>']
          c=open(p).read()
          if 'POST_NOTIFICATIONS' not in c: c=c.replace('<application','\n'.join(ls)+'\n    <application',1); open(p,'w').write(c)
          print('permisos OK')
          "

      - name: MainActivity
        run: python3 -c "import base64; open('android/app/src/main/java/com/tfv/tfapp/MainActivity.java','w').write(base64.b64decode('').decode()); print('MainActivity OK')"

      - name: Parchar music.html
        run: python3 -c "import base64; js=base64.b64decode('').decode(); p='www/music.html'; c=open(p).read(); c=c.replace('</body>','<script>'+js+'</script></body>') if 'TFMusicNativeCallback' not in c else c; open(p,'w').write(c); print('bridge OK')"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TFAPP-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
