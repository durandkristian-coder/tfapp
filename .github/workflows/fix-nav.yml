name: Fix Navigation
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace go: links
        run: |
          for f in *.html; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's|go:principal|hub.html|g' \
              -e 's|go:chatbot|nora.html|g' \
              -e 's|go:tfmusic|music.html|g' \
              -e 's|go:tfvcore|core.html|g' \
              -e 's|go:Tfgames|games.html|g' \
              -e 's|go:wallpapers|walls.html|g' \
              -e 's|go:tftv|tv.html|g' \
              -e 's|go:tfreader|reader.html|g' \
              -e 's|go:QR|hub.html|g' \
              -e 's|go:flip|games.html|g' \
              -e 's|go:Flipjump|games.html|g' \
              -e 's|go:Driftboss|games.html|g' \
              -e 's|go:Bottleflip|games.html|g' \
              -e 's|go:Hopstars|games.html|g' \
              -e 's|go:SpiralStai|games.html|g' \
              -e 's|go:TicTicToe|games.html|g' \
              -e 's|go:Jumpsplat|games.html|g' \
              -e 's|go:Flowstate|games.html|g' \
              -e 's|go:Hardest|games.html|g' \
              -e 's|go:PipeMaster|games.html|g' \
              "$f"
          done

      - name: Commit if changed
        run: |
          git config user.name "TFApp Bot"
          git config user.email "bot@tfapp.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: fix go: navigation"
          git push
