<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TFCore</title>
<style>
:root{
  --bg1:#060010;--bg2:#2a0052;
  --accent:#c084fc;--accent2:#7c3aed;
  --a3:#4c1d95;
  --glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.11);
  --border:rgba(255,255,255,.1);--border2:rgba(168,85,247,.3);
  --text:#f0eaf8;--muted:#9d8fba;
  --good:#34d399;--danger:#f87171;
  --bar:56px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;background:radial-gradient(ellipse at top,var(--bg2) 0%,var(--bg1) 100%)}

/* ── TOP BAR ── */
#topBar{
  position:fixed;top:0;left:0;right:0;height:var(--bar);
  background:rgba(4,0,14,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid rgba(124,58,237,.2);
  z-index:200;display:flex;align-items:center;gap:5px;padding:0 7px;
}
.tb{width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--text);transition:all .15s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.tb:active{transform:scale(.9);background:var(--glass2)}
.tb.hi{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;box-shadow:0 0 12px rgba(124,58,237,.4)}
/* Search pill */
#searchPill{
  flex:1;height:36px;border-radius:18px;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  display:flex;align-items:center;gap:7px;padding:0 12px;
  cursor:text;transition:all .2s;overflow:hidden;position:relative;
}
#searchPill.focus{background:rgba(255,255,255,.1);border-color:var(--border2);box-shadow:0 0 0 2px rgba(124,58,237,.15)}
#pillText{flex:1;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
#pillInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;display:none}
#pillSecure{font-size:10px;color:var(--good);font-weight:700;display:none;flex-shrink:0}
#pillClear{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.2);border:none;display:none;place-items:center;cursor:pointer;color:#fff;font-size:10px;flex-shrink:0}
/* Tab counter */
#tabPill{width:34px;height:34px;border-radius:10px;background:var(--glass);border:1.5px solid rgba(255,255,255,.2);display:grid;place-items:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:all .15s cubic-bezier(.34,1.56,.64,1)}
#tabPill:active{transform:scale(.9)}
#tabCount{font-size:12px;font-weight:800}
/* Progress bar */
#progBar{position:fixed;top:var(--bar);left:0;right:0;height:2px;z-index:201;background:linear-gradient(90deg,var(--accent2),var(--accent));transform-origin:left;transform:scaleX(0);transition:transform .3s ease;display:none}

/* ── CONTENT ── */
#content{position:fixed;top:var(--bar);left:0;right:0;bottom:0;z-index:10}
.page{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg1)}
.page.active{display:flex}
/* HOME */
.home{overflow-y:auto;scrollbar-width:none}
.home::-webkit-scrollbar{display:none}
.home-inner{width:min(660px,96%);margin:0 auto;padding:28px 0 120px;display:flex;flex-direction:column;align-items:center;gap:16px}
.brand-title{font-size:28px;font-weight:900;letter-spacing:.3px;background:linear-gradient(135deg,#e9d5ff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.brand-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}
/* Search bar home */
.h-search{width:100%;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:14px;padding:0 12px;height:48px;transition:border-color .15s,background .15s}
.h-search:focus-within{border-color:var(--border2);background:rgba(255,255,255,.09)}
.h-search input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14.5px;font-family:inherit}
.h-search input::placeholder{color:var(--muted)}
.h-search-btn{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
/* NORA AI box */
.nora-box{width:100%;background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(192,132,252,.05));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.nora-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(192,132,252,.5),transparent)}
.nora-header{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.nora-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:grid;place-items:center;font-size:14px;flex-shrink:0}
.nora-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
.nora-text{font-size:13px;color:var(--text);line-height:1.65}
.nora-cta{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 12px;border-radius:8px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.35);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .12s}
.nora-cta:hover{background:rgba(124,58,237,.3)}
/* Shortcuts */
.sc-title{width:100%;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.sc-grid{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:400px){.sc-grid{grid-template-columns:repeat(2,1fr)}}
.sc{display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 6px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.sc:active,.sc:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);transform:translateY(-2px) scale(1.03)}
.sc-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;overflow:hidden}
.sc-icon img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.sc-label{font-size:11px;font-weight:600;text-align:center;color:var(--text)}
.sc-add{font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.12);border-radius:14px;padding:13px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.sc-add:hover{border-color:rgba(124,58,237,.4);color:var(--accent)}
/* Recent */
.recent-list{width:100%;display:flex;flex-direction:column;gap:4px}
.r-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:background .12s}
.r-item:hover{background:rgba(255,255,255,.07)}
.r-fav{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.r-fav img{width:24px;height:24px;border-radius:5px;object-fit:cover}
.r-info{flex:1;min-width:0}
.r-title{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.r-host{font-size:10.5px;color:var(--muted)}
/* IFRAME PAGE */
.ifr-wrap{flex:1;position:relative;overflow:hidden}
.ifr-wrap iframe{width:100%;height:100%;border:none;background:#fff;display:block}
.page-ov{position:absolute;inset:0;background:rgba(6,0,16,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:5;transition:opacity .25s}
.page-ov.hidden{opacity:0;pointer-events:none}
.spin{width:30px;height:30px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{text-align:center;padding:22px;max-width:290px}
.err-box h3{font-size:15px;color:var(--accent);margin-bottom:7px}
.err-box p{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:12px}
.ext-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;cursor:pointer;font-size:13px;font-family:inherit}

/* ── SEARCH RESULTS ── */
.res-page{overflow-y:auto;scrollbar-width:none}
.res-page::-webkit-scrollbar{display:none}
.res-inner{width:min(660px,96%);margin:0 auto;padding:14px 0 120px;display:flex;flex-direction:column;gap:10px}
.nora-res-box{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(192,132,252,.05));border:1px solid rgba(124,58,237,.25);border-radius:14px;padding:14px;position:relative}
.nora-res-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(192,132,252,.5),transparent)}
.res-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s}
.res-back:hover{background:var(--glass2);color:var(--text)}
.res-query{font-size:13px;color:var(--muted)}
.res-query strong{color:var(--text)}
.img-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.img-strip::-webkit-scrollbar{display:none}
.img-strip img{height:88px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:transform .12s}
.img-strip img:hover{transform:scale(1.03)}
.section-label{font-size:10px;font-weight:700;color:rgba(192,132,252,.7);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.web-result{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;transition:background .12s}
.web-result:hover{background:rgba(255,255,255,.07)}
.wr-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wr-url{font-size:11px;color:var(--good);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wr-desc{font-size:12.5px;color:var(--muted);line-height:1.55}
.snip-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:0 10px 10px 0;padding:12px 14px}
.snip-label{font-size:10px;font-weight:700;color:rgba(192,132,252,.7);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.paa-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.paa-q{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;gap:8px;border-top:1px solid rgba(255,255,255,.06)}
.paa-q:first-child{border-top:none}
.paa-q span{font-size:13px;color:var(--text);font-weight:500;flex:1}
.paa-a{display:none;padding:0 14px 12px;font-size:12.5px;color:var(--muted);line-height:1.6}
.yt-box{background:rgba(255,50,50,.05);border:1px solid rgba(255,100,100,.12);border-radius:12px;padding:10px}
.yt-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:7px;cursor:pointer;transition:background .1s}
.yt-item:hover{background:rgba(255,255,255,.05)}

/* ── TABS PANEL ── */
#tabsPanel{position:fixed;inset:0;z-index:300;background:rgba(4,0,14,.97);backdrop-filter:blur(24px);display:none;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1)}
#tabsPanel.open{display:flex;transform:translateY(0)}
#tabsPanelBar{height:var(--bar);display:flex;align-items:center;gap:8px;padding:0 10px;border-bottom:1px solid rgba(124,58,237,.15);flex-shrink:0}
#tabsPanelTitle{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--muted)}
#tabsGrid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:9px;align-content:start;scrollbar-width:none}
#tabsGrid::-webkit-scrollbar{display:none}
.tc{border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);overflow:hidden;cursor:pointer;position:relative;transition:all .16s cubic-bezier(.34,1.56,.64,1)}
.tc:active{transform:scale(.96)}
.tc.cur{border-color:rgba(124,58,237,.55);background:rgba(124,58,237,.1);box-shadow:0 0 0 1px rgba(124,58,237,.2)}
.tc-prev{height:100px;background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(10,0,24,.8));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.tc-fav{width:32px;height:32px;border-radius:8px;object-fit:cover}
.tc-label{position:absolute;bottom:0;left:0;right:0;padding:4px 7px;font-size:9px;font-weight:600;color:rgba(255,255,255,.6);background:linear-gradient(to top,rgba(0,0,0,.7),transparent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-close{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);border:none;display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px}
.tc-close:hover{background:rgba(248,113,113,.7);color:#fff}
.tc-info{padding:8px 10px 10px}
.tc-title{font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.tc-url{font-size:9.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SEARCH OVERLAY ── */
#searchOv{position:fixed;inset:0;z-index:500;background:rgba(2,0,10,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;flex-direction:column}
#searchOv.open{display:flex}
.so-top{background:rgba(4,0,14,.99);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.so-input{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.so-go{padding:9px 14px;border-radius:9px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.so-cancel{padding:9px 10px;border-radius:9px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
.so-list{flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:3px;scrollbar-width:none}
.so-list::-webkit-scrollbar{display:none}
.so-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:background .1s}
.so-item:hover{background:rgba(255,255,255,.08)}
.so-text{flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.so-badge{font-size:10px;color:var(--muted);background:var(--glass);padding:2px 7px;border-radius:5px;border:1px solid var(--border);flex-shrink:0}
/* Suggestions from engine */
#suggBox{position:fixed;left:10px;right:10px;top:calc(var(--bar) + 4px);z-index:501;background:rgba(4,0,14,.98);border:1px solid rgba(124,58,237,.3);border-radius:14px;overflow:hidden;display:none;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.8);backdrop-filter:blur(24px)}
.sg-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:background .1s}
.sg-row:last-child{border-bottom:none}
.sg-row:hover{background:rgba(255,255,255,.06)}

/* ── MENU ── */
#menu{position:fixed;top:calc(var(--bar) + 5px);right:8px;z-index:400;width:210px;background:rgba(4,0,14,.98);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.8);opacity:0;pointer-events:none;transform:scale(.95) translateY(-5px);transform-origin:top right;transition:opacity .14s,transform .14s;overflow:hidden;backdrop-filter:blur(24px)}
#menu.open{opacity:1;pointer-events:auto;transform:scale(1) translateY(0)}
.mi{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .1s;color:var(--text)}
.mi:last-child{border-bottom:none}
.mi:hover{background:rgba(255,255,255,.05)}
.mi svg{flex-shrink:0;opacity:.7}
.mi span{flex:1}
.mbadge{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(124,58,237,.2);color:var(--accent);border:1px solid rgba(124,58,237,.3)}
.mbadge.on{background:rgba(52,211,153,.15);color:var(--good);border-color:rgba(52,211,153,.3)}

/* ── MODALS ── */
.modal-bd{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center}
.modal-bd.open{display:flex}
.modal-box{width:min(95%,480px);background:rgba(4,0,14,.98);border:1px solid var(--border);border-radius:14px;padding:17px;box-shadow:0 24px 64px rgba(0,0,0,.9);max-height:calc(100vh - 60px);overflow-y:auto}
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.modal-title{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.mx{width:26px;height:26px;border-radius:6px;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--muted);font-size:14px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px}
.btn.pri{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none}
.btn.red{background:linear-gradient(135deg,#991b1b,var(--danger));color:#fff;border:none}
.h-item{display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-bottom:5px;transition:background .1s}
.h-item:hover{background:rgba(255,255,255,.07)}
.h-info{flex:1;min-width:0;cursor:pointer}
.h-title{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.h-url{font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-del{width:24px;height:24px;border-radius:5px;background:transparent;border:none;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:all .1s;flex-shrink:0}
.h-del:hover{color:var(--danger);background:rgba(248,113,113,.1)}
/* Settings */
.cs{margin-bottom:16px}
.ct{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.cr{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-bottom:5px;gap:8px}
.cr-l{min-width:0}
.cr-name{font-size:13px;font-weight:600;color:var(--text)}
.cr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tog{position:relative;width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.07);border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background .17s}
.tog .k{position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .17s;pointer-events:none}
.tog.on{background:linear-gradient(90deg,var(--accent2),var(--accent));border-color:transparent}
.tog.on .k{transform:translateX(18px)}
.th-chips{display:flex;flex-wrap:wrap;gap:6px}
.thc{width:32px;height:32px;border-radius:7px;border:2px solid transparent;cursor:pointer;position:relative;transition:border-color .14s}
.thc.act::after{content:'';position:absolute;inset:-4px;border-radius:11px;border:2px solid var(--accent)}
.eng-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.engc{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s}
.engc:hover{background:var(--glass2)}

.engc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Toast */
#toasts{position:fixed;right:10px;top:calc(var(--bar) + 8px);z-index:700;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{background:rgba(4,0,14,.98);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 12px;font-size:12.5px;color:#fff;opacity:0;transform:translateX(12px);transition:opacity .16s,transform .16s;max-width:240px;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:none}
/* Context menu */
#ctxSheet{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center}
#ctxSheet.open{display:flex}
.ctx-inner{width:min(100%,440px);background:rgba(4,0,14,.99);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:14px;max-height:70vh;overflow-y:auto}
.ctx-url{font-size:11px;color:var(--muted);padding:4px 4px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctx-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;margin-bottom:5px;text-align:left;transition:background .1s}
.ctx-btn:hover{background:rgba(255,255,255,.08)}
.ctx-btn.red{border-color:rgba(248,113,113,.2);color:var(--danger)}

body.incog{--bg1:#050505;--bg2:#0a0a0a;--accent:#8888ff;--accent2:#4040cc;background:var(--bg1)}

}

function closeTab(id){

  var idx=tabs.findIndex(function(t){return t.id===id;});

/* ═══════════ NAVIGATE ═══════════ */
function processInput(raw){
  var v=(raw||'').trim();if(!v)return null;
  /* Internal pages */
  if(v==='nora.html'||v.endsWith('.html'))return{type:'internal',url:v};
  /* Explicit URL */
  var url=toUrl(v);
  if(url)return{type:'url',url:url};
  /* Search */
  return{type:'search',query:v};
}

function navigate(input){
  var r=processInput(input);if(!r)return;
  var tab=getTab();if(!tab)return;
  closeSearchOv();

  if(r.type==='internal'){
    /* Navigate to internal HTML page */
    tab.back.push(tab.url||'');tab.fwd=[];tab.url=r.url;
    updatePillUI();
    var page=document.querySelector('.page[data-id="'+tab.id+'"]');if(!page)return;
    page.className='page active';
    page.innerHTML='<div class="ifr-wrap"><div class="page-ov" id="ov_'+tab.id+'"><div class="spin"></div></div>'
      +'<iframe id="ifr_'+tab.id+'" src="'+esc(r.url)+'" allow="autoplay;fullscreen;camera;microphone"></iframe></div>';
    wireIframe(tab.id);
    return;
  }

  if(r.type==='search'){
    var eng=ENGINES[cfg.engine]||ENGINES.nora;
    if(eng.ext&&eng.fn){
      /* External search engine */
      var su=eng.fn(r.query);
      toast('Abriendo '+eng.n+' en el navegador del sistema…',2200);
      setTimeout(function(){window.open(su,'_blank','noopener,noreferrer');},300);
      return;
    }
    /* NORA internal search */
    tab.back.push(tab.url||'');tab.fwd=[];
    tab.url='tfcore://search?q='+encodeURIComponent(r.query);
    tab.title='NORA: '+r.query;
    updateTabTitle(tab.id,tab.title);
    updatePillUI();
    renderSearch(tab.id,r.query);
    return;
  }

  /* URL navigation */
  var url=r.url;
  if(isExt(url)){
    var host='';try{host=new URL(url).hostname.replace('www.','');}catch{}
    toast('"'+host+'" se abre en el navegador del sistema (seguridad)',2400);
    setTimeout(function(){window.open(url,'_blank','noopener,noreferrer');},350);
    addHist(url,host);
    return;
  }
  if(tab.url&&tab.url!==url){tab.back.push(tab.url);if(tab.back.length>80)tab.back.shift();tab.fwd=[];}
  tab.url=url;
  updatePillUI();
  loadPage(tab.id,url);
}

function navBack(){
  var tab=getTab();if(!tab||!tab.back||!tab.back.length)return;
  var prev=tab.back.pop();tab.fwd.push(tab.url);tab.url=prev;
  updatePillUI();
  if(!prev||prev===''){renderHome(tab.id);return;}
  if(prev.endsWith('.html')){navigate(prev);return;}
  if(prev.startsWith('tfcore://search?q=')){
    renderSearch(tab.id,decodeURIComponent(prev.replace('tfcore://search?q=','')));return;
  }
  if(isExt(prev)){window.open(prev,'_blank','noopener,noreferrer');return;}
  loadPage(tab.id,prev);
}
function navFwd(){
  var tab=getTab();if(!tab||!tab.fwd||!tab.fwd.length)return;
  var next=tab.fwd.pop();tab.back.push(tab.url);tab.url=next;
  updatePillUI();
  if(!next||next===''){renderHome(tab.id);return;}
  if(next.endsWith('.html')){navigate(next);return;}
  if(next.startsWith('tfcore://search?q=')){
    renderSearch(tab.id,decodeURIComponent(next.replace('tfcore://search?q=','')));return;
  }
  loadPage(tab.id,next);
}
function navReload(){
  var tab=getTab();if(!tab||!tab.url)return;
  if(!tab.url){renderHome(tab.id);return;}
  if(tab.url.startsWith('tfcore://search?q=')){
    renderSearch(tab.id,decodeURIComponent(tab.url.replace('tfcore://search?q=','')));return;
  }
  loadPage(tab.id,tab.url,true);
}

var NAV_INJECT='(function(){function go(u){try{var a=new URL(u,location.href).href;parent.postMessage({type:"TFC_NAV",url:a},"*");}catch(e){}}document.addEventListener("click",function(e){var a=e.target.closest("a[href]");if(!a)return;var h=a.getAttribute("href");if(!h||h.startsWith("#")||h.startsWith("javascript:")||h.startsWith("mailto:"))return;e.preventDefault();go(a.href);},true);document.addEventListener("submit",function(e){var f=e.target;if(!f||!f.action)return;e.preventDefault();var fd=new URLSearchParams(new FormData(f));var m=(f.method||"GET").toUpperCase();var u=f.action+(m==="GET"?"?"+fd.toString():"");go(u);},true);window.open=function(u){if(u)go(u);return null;};})();';

function rewriteHtml(html,base){
  var h=html
    .replace(/<meta[^>]+(x-frame-options|content-security-policy|x-content-type-options)[^>]*>/gi,'')
    .replace(/<meta[^>]+name=["']?referrer["']?[^>]*>/gi,'');
  var bt='<base href="'+base+'">';
  var sc='<script>'+NAV_INJECT+'<\/script>';
  h=/<head[^>]*>/i.test(h)?h.replace(/(<head[^>]*>)/i,'$1'+bt):bt+h;
  h=/<body[^>]*>/i.test(h)?h.replace(/(<body[^>]*>)/i,'$1'+sc):sc+h;
  return h;
}

async function tryProxy(url){
  for(var i=0;i<PROX.length;i++){
    try{
      var r=await fetch(PROX[i](url),{cache:'no-store',signal:AbortSignal.timeout(9000)});
      if(r.ok){var html=await r.text();if(html&&html.length>100)return{ok:true,html:html,url:url};}
    }catch{}
  }
  return{ok:false};
}

function showProgress(v){
  var pb=$('progBar');if(!pb)return;
  if(v===0){pb.style.display='block';pb.style.transform='scaleX(0)';}
  else if(v>=1){pb.style.transform='scaleX(1)';setTimeout(function(){if(pb){pb.style.transition='none';pb.style.display='none';pb.style.transform='scaleX(0)';setTimeout(function(){if(pb)pb.style.transition='transform .3s ease';},50);}},350);}
  else pb.style.transform='scaleX('+v+')';
}

function wireIframe(tabId){
  var ifr=document.getElementById('ifr_'+tabId);
  var ov=document.getElementById('ov_'+tabId);
  if(!ifr)return;
  var settled=false;
  var mh=function(e){if(e.data&&e.data.type==='TFC_NAV'&&e.data.url){window.removeEventListener('message',mh);navigate(e.data.url);}};
  window.addEventListener('message',mh);
  ifr.onload=function(){
    if(settled)return;settled=true;
    showProgress(1);
    if(ov)ov.classList.add('hidden');
    var title='';
    try{title=ifr.contentDocument&&ifr.contentDocument.title;}catch{}
    var tab=getTab(tabId);
    if(!title&&tab&&tab.url){try{title=new URL(tab.url).hostname;}catch{title=tab.url;}}
    updateTabTitle(tabId,title||'Sin título');
    if(tab&&tab.url)addHist(tab.url,title);
    updatePillUI();
  };
  ifr.onerror=function(){window.removeEventListener('message',mh);tryLoad(tabId);};
  setTimeout(function(){if(!settled){window.removeEventListener('message',mh);tryLoad(tabId);}},6000);
}

async function tryLoad(tabId){
  var tab=getTab(tabId);if(!tab||!tab.url)return;
  showProgress(.6);
  var res=await tryProxy(tab.url);
  if(res.ok){
    var blob=new Blob([rewriteHtml(res.html,res.url)],{type:'text/html;charset=utf-8'});
    var bu=URL.createObjectURL(blob);
    var ifr=document.getElementById('ifr_'+tabId);
    if(!ifr)return;
    if(ifr._blob)URL.revokeObjectURL(ifr._blob);
    ifr._blob=bu;
    var mh2=function(e){if(e.data&&e.data.type==='TFC_NAV'&&e.data.url){window.removeEventListener('message',mh2);navigate(e.data.url);}};
    window.addEventListener('message',mh2);
    ifr.onload=function(){
      showProgress(1);
      var ov=document.getElementById('ov_'+tabId);if(ov)ov.classList.add('hidden');
      setTimeout(function(){if(ifr._blob){URL.revokeObjectURL(ifr._blob);ifr._blob=null;}},30000);
    };
    ifr.onerror=function(){window.removeEventListener('message',mh2);showErr(tabId,tab.url);};
    ifr.src=bu;
  }else{
    showProgress(1);showErr(tabId,tab.url);
  }
}

function loadPage(tabId,url){
  var page=document.querySelector('.page[data-id="'+tabId+'"]');if(!page)return;
  page.className='page active';
  page.innerHTML='<div class="ifr-wrap">'
    +'<div class="page-ov" id="ov_'+tabId+'"><div class="spin"></div><div style="font-size:12px;color:var(--muted);margin-top:8px">Cargando…</div></div>'
    +'<iframe id="ifr_'+tabId+'" allow="autoplay;fullscreen;camera;microphone;clipboard-write;encrypted-media" referrerpolicy="no-referrer"></iframe>'
    +'</div>';
  showProgress(0);setTimeout(function(){showProgress(.35);},100);
  /* Try direct load first */
  var ifr=document.getElementById('ifr_'+tabId);
  var ov=document.getElementById('ov_'+tabId);
  var settled=false;
  var mh=function(e){if(e.data&&e.data.type==='TFC_NAV'&&e.data.url){window.removeEventListener('message',mh);navigate(e.data.url);}};
  window.addEventListener('message',mh);
  ifr.onload=function(){
    if(settled)return;settled=true;
    showProgress(1);
    if(ov)ov.classList.add('hidden');
    var title='';try{title=ifr.contentDocument&&ifr.contentDocument.title;}catch{}
    if(!title){try{title=new URL(url).hostname;}catch{title=url;}}
    updateTabTitle(tabId,title||'Sin título');addHist(url,title);updatePillUI();
  };
  ifr.onerror=function(){if(settled)return;window.removeEventListener('message',mh);settled=true;tryLoad(tabId);};
  setTimeout(function(){if(!settled){settled=true;window.removeEventListener('message',mh);tryLoad(tabId);}},5500);
  ifr.src=url;
  /* Long press to show context sheet */
  ifr.parentElement.addEventListener('touchstart',function(e){
    var _lt=setTimeout(function(){
      var t=getTab(tabId);if(t&&t.url)showCtxSheet(t.url,tabId);
      if(navigator.vibrate)navigator.vibrate(40);
    },520);
    ifr.parentElement.addEventListener('touchend',function h(){clearTimeout(_lt);ifr.parentElement.removeEventListener('touchend',h);},{once:true});
    ifr.parentElement.addEventListener('touchmove',function h2(){clearTimeout(_lt);ifr.parentElement.removeEventListener('touchmove',h2);},{once:true,passive:true});
  },{passive:true});
}

function showErr(tabId,url){
  var ov=document.getElementById('ov_'+tabId);if(!ov)return;
  ov.classList.remove('hidden');ov.style.opacity='1';ov.style.pointerEvents='auto';
  ov.innerHTML='<div class="err-box">'
    +'<h3>No se pudo cargar</h3>'

    +'<button class="ext-btn" onclick="window.open(\''+esc(url)+'\',\'_blank\',\'noopener,noreferrer\')">'

      +'Abrir externamente'

async function fetchNoraAI(query,tabId){
  var el=document.getElementById('noraTxt_'+tabId);if(!el)return;
  try{
    var r=await fetch(GROQ_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:GROQ_MODEL,temperature:.65,max_completion_tokens:280,
        messages:[
          {role:'system',content:'Eres NORA, el asistente de TFCore (un navegador web). Responde en español latino. Da una respuesta concisa y útil en 3-4 oraciones. Texto plano sin markdown ni asteriscos.'},
          {role:'user',content:query}
        ]
      })
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    var txt=((data.choices||[])[0]||{}).message&&data.choices[0].message.content||'';
    var elNow=document.getElementById('noraTxt_'+tabId);
    if(elNow)elNow.textContent=txt.trim()||'No se pudo generar respuesta.';
    var cta=document.getElementById('noraCta_'+tabId);
    if(cta&&txt.trim()){
      cta.style.display='inline-flex';
      cta.onclick=function(){
        try{
          var db=JSON.parse(localStorage.getItem('ctfv5')||'{"convs":[]}');
          db.convs=db.convs||[];
          var conv={id:'c_core_'+Date.now(),title:'Búsqueda: '+query.slice(0,36),ts:Date.now(),msgs:[
            {role:'user',content:'Busqué en TFCore: '+query},
            {role:'bot',content:txt.trim().slice(0,500)}
          ]};
          db.convs.unshift(conv);
          localStorage.setItem('ctfv5',JSON.stringify({convs:db.convs.slice(0,60)}));
        }catch{}
        navigate('nora.html');
      };
    }
  }catch(e){
    var elNow=document.getElementById('noraTxt_'+tabId);
    if(elNow)elNow.textContent='Sin conexión con NORA.';
  }
}

async function fetchWebResults(query,tabId){
  var container=document.getElementById('webRes_'+tabId);if(!container)return;
  try{
    var url='https://www.googleapis.com/customsearch/v1?key='+GCS_KEY+'&cx='+GCS_CX+'&q='+encodeURIComponent(query)+'&num=8&gl=AR&hl=es';
    var r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();var items=data.items||[];
    if(!items.length){container.innerHTML='<div style="color:var(--muted);font-size:12.5px;padding:8px 0">Sin resultados.</div>';return;}
    /* Featured snippet */
    var first=items[0];
    var snipHtml='';
    if(first&&first.snippet&&first.snippet.length>80){
      snipHtml='<div class="snip-box"><div class="snip-label">Resultado destacado</div>'
        +'<div style="font-size:13px;color:var(--text);line-height:1.6">'+esc(first.snippet)+'</div>'
        +'<div style="font-size:10.5px;color:var(--muted);margin-top:5px">'+esc(first.title)+'</div></div>';
    }
    container.innerHTML=snipHtml
      +'<div class="section-label">Resultados web</div>'
      +items.map(function(it){
        return'<div class="web-result" data-url="'+esc(it.link)+'">'

async function fetchImages(query,tabId){

function renderSugg(q){
  var list=$('soList');list.innerHTML='';
  var ql=q.toLowerCase().trim(),items=[];
  if(ql){
    var hm=hist.filter(function(h){return h.url.toLowerCase().includes(ql)||((h.title||'').toLowerCase().includes(ql));}).slice(-5).reverse().map(function(h){return{t:h.title||h.url,u:h.url,b:'historial'};});
    var fm=favs.filter(function(f){return f.url.toLowerCase().includes(ql)||((f.title||'').toLowerCase().includes(ql));}).slice(0,3).map(function(f){return{t:f.title||f.url,u:f.url,b:'favorito'};});
    items=fm.concat(hm,{t:'Buscar: '+q,u:q,b:'buscar'});
  }else{
    var rf=hist.slice(-5).reverse().map(function(h){return{t:h.title||h.url,u:h.url,b:'reciente'};});
    var tf=favs.slice(0,3).map(function(f){return{t:f.title||f.url,u:f.url,b:'favorito'};});
    items=tf.concat(rf);
  }
  var seen=new Set();
  items.filter(function(i){if(!i.u||seen.has(i.u))return false;seen.add(i.u);return true;})
    .slice(0,9).forEach(function(item){
      var el=document.createElement('div');el.className='so-item';
      el.innerHTML='<span class="so-text">'+esc(item.t||item.u)+'</span><span class="so-badge">'+esc(item.b||'')+'</span>';

(function(){
  var pill=$('searchPill'),pi=$('pillInput'),pt=$('pillText'),pc=$('pillClear'),sb=$('suggBox');
  if(!pill)return;
  function expand(){
    pill.classList.add('focus');pi.style.display='block';pt.style.display='none';
    var tab=getTab();var v=(tab&&tab.url&&!tab.url.startsWith('tfcore://')&&!tab.url.endsWith('.html'))?tab.url:'';
    pi.value=v;setTimeout(function(){pi.focus();if(v)pi.select();},30);
  }
  function collapse(){
    pill.classList.remove('focus');pi.style.display='none';pt.style.display='';pi.value='';
    if(sb)sb.style.display='none';
    updatePillUI();
  }
  pill.addEventListener('click',function(e){if(e.target===pc)return;if(!pill.classList.contains('focus'))expand();});
  if(pc)pc.onclick=function(e){e.stopPropagation();collapse();};
  if(pi){
    pi.addEventListener('keydown',function(e){
      if(e.key==='Enter'){var v=pi.value.trim();collapse();navigate(v);}
      if(e.key==='Escape')collapse();
    });
    pi.addEventListener('input',function(){
      if(pc)pc.style.display=pi.value?'grid':'none';
      showInlineSugg(pi.value);
    });
  }
  document.addEventListener('click',function(e){if(pill.classList.contains('focus')&&!pill.contains(e.target)&&!sb.contains(e.target))collapse();});
  /* Autocomplete suggestions */
  var _t=null;
  function showInlineSugg(q){
    if(!q||q.length<1){if(sb)sb.style.display='none';return;}
    var ql=q.toLowerCase();
    var h=hist.filter(function(x){return x.url&&(x.url.toLowerCase().includes(ql)||((x.title||'').toLowerCase().includes(ql)));}).slice(0,3);
    if(sb){
      sb.innerHTML='';sb.style.display='none';

        sb.style.display='flex';

          var row=document.createElement('div');row.className='sg-row';
          var host='';try{host=new URL(x.url).hostname.replace('www.','');}catch{}
          row.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg><div style="flex:1;min-width:0"><div style="font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(x.title||x.url)+'</div><div style="font-size:10px;color:rgba(255,255,255,.35)">'+esc(host)+'</div></div>';
          row.onclick=function(){sb.style.display='none';collapse();navigate(x.url);};
          sb.appendChild(row);
        });
        /* Search suggestion */
        var sr=document.createElement('div');sr.className='sg-row';
        sr.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,.6)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><div style="font-size:13px;color:var(--accent)">Buscar "<strong>'+esc(q)+'</strong>"</div>';
        sr.onclick=function(){sb.style.display='none';collapse();navigate(q);};
        sb.appendChild(sr);
      }else{

/* ═══════════ EVENTOS ═══════════ */
function bindEvents(){
  /* NORA button */
  $('btnNora').onclick=function(){navigate('nora.html');};
  /* Home */
  $('btnHome').onclick=function(){renderHome(activeId);};
  /* Tab pill */
  $('tabPill').onclick=openTabsPanel;
  /* Menu */
  $('btnMenu').onclick=function(e){e.stopPropagation();$('menu').classList.toggle('open');};
  document.addEventListener('click',function(e){var m=$('menu');if(m&&m.classList.contains('open')&&!m.contains(e.target)&&e.target!==$('btnMenu'))m.classList.remove('open');});
  /* Context sheet close */
  $('ctxSheet').addEventListener('click',function(e){if(e.target===$('ctxSheet'))$('ctxSheet').classList.remove('open');});
  /* Menu items */
  function ma(id,fn){var el=$(id);if(el)el.onclick=function(){$('menu').classList.remove('open');fn();};}
  ma('mBack',navBack);
  ma('mFwd',navFwd);
  ma('mReload',navReload);
  ma('mFav',function(){var t=getTab();if(t&&t.url&&!t.url.startsWith('tfcore://')&&!t.url.endsWith('.html'))toggleFav(t.url,t.title);});
  ma('mNewTab',function(){newTab();});
  ma('mHistory',function(){openHistModal();});
  ma('mFavs',function(){openFavsModal();});
  ma('mCopyUrl',function(){var t=getTab();if(t&&t.url&&navigator.clipboard)navigator.clipboard.writeText(t.url).then(function(){toast('URL copiada');});});
  ma('mShare',function(){var t=getTab();if(t&&t.url&&navigator.share)navigator.share({url:t.url,title:t.title||''}).catch(function(){});});
  ma('mOpenExt',function(){var t=getTab();if(t&&t.url&&!t.url.startsWith('tfcore://'))window.open(t.url,'_blank','noopener,noreferrer');});
  ma('mIncognito',toggleIncog);
  ma('mSettings',function(){openSettModal();$('settModal').classList.add('open');});
  /* Tabs panel */
  $('tpBack').onclick=closeTabsPanel;
  $('tpNew').onclick=function(){newTab();closeTabsPanel();};
  /* History modal */
  $('histClose').onclick=function(){$('histModal').classList.remove('open');};
  $('clearHistBtn').onclick=function(){if(confirm('¿Borrar todo el historial?')){hist=[];save();$('histModal').classList.remove('open');toast('Historial borrado');}};
  /* Favs modal */
  $('favsClose').onclick=function(){$('favsModal').classList.remove('open');};
  /* Sett modal */
  $('settClose').onclick=function(){$('settModal').classList.remove('open');};
  /* Add shortcut modal */
  $('addScClose').onclick=function(){$('addScModal').classList.remove('open');};
  $('scSave').onclick=function(){
    var nm=($('scName').value||'').trim();var url=($('scUrl').value||'').trim();
    if(!nm||!url){toast('Completa nombre y URL','err');return;}
    if(!url.startsWith('http'))url='https://'+url;
    var customs=getCustomSC();
    if(customs.length>=6){toast('Máximo 6 accesos directos personalizados');return;}
    customs.push({l:nm,u:url,c:'#7c3aed'});saveSC(customs);
    $('addScModal').classList.remove('open');
    renderHome(activeId);toast('✓ Acceso directo guardado');
  };
  /* Close modals on backdrop */
  document.querySelectorAll('.modal-bd').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});});
  /* Background file input */
  $('bgFileIn').addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0];if(!f)return;
    var r=new FileReader();r.onload=function(){cfg.bgUrl=r.result;cfg.bgOn=true;save();applyBg();toast('Fondo aplicado');};
    r.readAsDataURL(f);e.target.value='';
  });
  /* Message from iframes */
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='TFC_NAV'&&e.data.url)navigate(e.data.url);
  });
  /* Keyboard shortcuts */
  document.addEventListener('keydown',function(e){
    if(e.ctrlKey||e.metaKey){
      if(e.key==='t'){e.preventDefault();newTab();}
      else if(e.key==='w'){e.preventDefault();closeTab(activeId);}
      else if(e.key==='l'){e.preventDefault();openSearchOv();}
      else if(e.key==='r'){e.preventDefault();navReload();}
    }
    if(e.key==='Escape'){
      var om=document.querySelector('.modal-bd.open');
      if(om){om.classList.remove('open');return;}
      var cs=$('ctxSheet');if(cs&&cs.classList.contains('open')){cs.classList.remove('open');return;}
      if($('tabsPanel').style.display==='flex'){closeTabsPanel();return;}
      if($('searchOv').classList.contains('open')){closeSearchOv();return;}
    }
    if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();navBack();}
    if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();navFwd();}
  });
  /* Android hardware back */
  history.pushState({tfc:1},'');
  window.addEventListener('popstate',function(){
    if($('tabsPanel').style.display==='flex'){closeTabsPanel();history.pushState({tfc:1},'');return;}
    if($('ctxSheet').classList.contains('open')){$('ctxSheet').classList.remove('open');history.pushState({tfc:1},'');return;}
    var om=document.querySelector('.modal-bd.open');if(om){om.classList.remove('open');history.pushState({tfc:1},'');return;}
    if($('searchOv').classList.contains('open')){closeSearchOv();history.pushState({tfc:1},'');return;}
    var tab=getTab();if(tab&&tab.back&&tab.back.length>0){navBack();}
    history.pushState({tfc:1},'');
  });
  /* Swipe from left edge → go back */
  var swipeStart=null;
  document.addEventListener('touchstart',function(e){
    if(e.touches[0].clientX<30)swipeStart=e.touches[0].clientX;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(swipeStart!==null&&e.touches[0].clientX-swipeStart>50){
      var hint=$('swipeHint');if(hint)hint.style.opacity='1';
    }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(swipeStart!==null){
      var dx=e.changedTouches[0].clientX-swipeStart;
      var hint=$('swipeHint');if(hint)hint.style.opacity='0';
      if(dx>60){navBack();}
      swipeStart=null;
    }
  },{passive:true});
}

/* ═══════════ INIT ═══════════ */
loadState();applyTheme();bindEvents();

/* Start with one tab */
newTab();
/* Sync incog state */
if(cfg.incog){document.body.classList.add('incog');var b=$('mIncBadge');if(b)b.style.display='inline';}

})();
</script>

nput id="tf-login-pass" type="password" placeholder="Mínimo 4 caracteres..." style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;color:#eee8f8;font-size:13.5px;font-family:-apple-system,sans-serif;outline:none"/></div>':'')+'<button id="tf-login-submit" style="padding:12px;border-radius:11px;background:linear-gradient(135deg,#6d24d9,#a855f7);border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:-apple-system,sans-serif;cursor:pointer">'+(isEdit?'Guardar':'Crear perfil')+'</button></div>';document.body.appendChild(modal);var avFile=document.getElementById('tf-av-file');var avPreview=document.getElementById('tf-av-preview');var _newAvatar=u&&u.avatar?u.avatar:null;avFile.onchange=function(){var f=avFile.files[0];if(!f)return;var r=new FileReader();r.onload=function(){_newAvatar=r.result;avPreview.innerHTML='<img src="'+r.result+'" style="width:72px;height:72px;border-radius:50%;object-fit:cover;display:block"/>';};r.readAsDataURL(f);};document.getElementById('tf-login-submit').onclick=function(){var name=(document.getElementById('tf-login-name').value||'').trim();if(!name){TF.toast('Escribe tu nombre','err');return;}if(!isEdit){var pass=(document.getElementById('tf-login-pass').value||'').trim();if(pass.length<4){TF.toast('Mínimo 4 caracteres','err');return;}TF.saveUser({name:name,pass:pass,avatar:_newAvatar});}else{var ex=TF.getUser()||{};ex.name=name;ex.avatar=_newAvatar;TF.saveUser(ex);}modal.remove();TF.toast((isEdit?'Perfil actualizado':'Bienvenido, '+name+'!'),'ok');TF.updateProfileUI();if(onSuccess)onSuccess();};modal.onclick=function(e){if(e.target===modal)modal.remove();};};

TF.showProfilePanel=function(){if(document.getElementById('tf-profile-panel'))return;var u=TF.getUser()||{};var lvl=TF.getLvl();var rank=TF.getRank(lvl);var pct=TF.xpPct();var panel=document.createElement('div');panel.id='tf-profile-panel';panel.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center';panel.innerHTML='<div style="width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:14px;font-weight:800;color:#eee8f8">Mi perfil</div><button onclick="document.getElementById(\'tf-profile-panel\').remove()" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;display:grid;place-items:center;font-family:inherit">✕</button></div>'+(u.avatar?'<div style="display:flex;align-items:center;gap:12px"><img src="'+u.avatar+'" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.4)"/><div><div style="font-size:15px;font-weight:800;color:#eee8f8">'+(u.name||'Usuario')+'</div><div style="font-size:11.5px;color:#a855f7;margin-top:2px">'+rank.icon+' '+rank.label+'</div></div></div>':'<div style="font-size:15px;font-weight:800;color:#eee8f8">'+(u.name||'Usuario')+'</div>')+'<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px"><div style="display:flex;justify-content:space-between;margin-bottom:7px"><div style="font-size:11.5px;font-weight:700;color:#eee8f8">Nivel '+lvl+'</div><div style="font-size:10.5px;color:#7a6e98">'+pct+'%</div></div><div style="height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#6d24d9,#a855f7);border-radius:99px"></div></div></div><div style="display:flex;gap:8px"><button onclick="document.getElementById(\'tf-profile-panel\').remove();TF.showLogin(function(){TF.injectProfile();})" style="flex:1;padding:10px;border-radius:10px;background:rgba(109,36,217,.15);border:1px solid rgba(168,85,247,.25);color:#a855f7;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer">✏️ Editar</button><button onclick="if(confirm(\'¿Cerrar sesión?\')){localStorage.removeItem(\'tfapp_user\');document.getElementById(\'tf-profile-panel\').remove();TF.injectProfile();TF.toast(\'Sesión cerrada\');}" style="padding:10px;border-radius:10px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);color:#f43f5e;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer">Salir</button></div></div>';document.body.appendChild(panel);panel.onclick=function(e){if(e.target===panel)panel.remove();};};
TF.updateProfileUI=function(){TF.injectProfile();};
TF.requireLogin=function(){var user=TF.getUser();if(user)return true;TF.toast('Inicia sesión para usar esta función','err',2200);TF.showLogin();return false;};
TF.init=function(sectionKey){TF.injectNav(sectionKey);TF.injectProfile();TF.startTicker();setInterval(TF.syncMini,3000);var user=TF.getUser();if(!user){setTimeout(function(){TF.showLogin();},800);}};
TF.init("browser");

(function(){setInterval(function(){if(typeof activeId!=='undefined'){var tab=window.getTab&&window.getTab(activeId);if(tab&&tab.url&&tab.url.startsWith('tfcore://search')){var xp=TF.getXP()+200,lvl=TF.getLvl();if(xp>=TF.XP_PER_LEVEL){xp=0;lvl=Math.min(lvl+1,TF.MAX_LEVEL);TF.saveXP(xp,lvl);TF.showLevelUp(lvl);}else TF.saveXP(xp,lvl);}}},30000);})();
