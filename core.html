<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="max-age=86400"/>
<link rel="dns-prefetch" href="https://i.imgur.com"/>
<link rel="dns-prefetch" href="https://corsproxy.io"/>
<link rel="dns-prefetch" href="https://api.groq.com"/>
<link rel="dns-prefetch" href="https://wallhaven.cc"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TFVCore</title>
<style>
:root{
  --bg1:#0a0011;--bg2:#3b0066;
  --accent:#d9a3ff;--accent2:#7e3cff;
  --glass:rgba(255,255,255,.07);--glass2:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.13);
  --text:#fff;--muted:#bbb0cc;
  --danger:#ff4d6d;--danger2:#c00030;
  --good:#29c36a;
  --modal-bg:rgba(10,1,22,.97);
  --bar-h:58px;--url-h:0px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at top,var(--bg2) 0%,var(--bg1) 100%) fixed}
/* Wallpaper overlay - separate fixed element so it doesn't break stacking */
#bgWall{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;background-repeat:no-repeat;display:none;opacity:.28}

/* ── Top bar ── */
/* ── DDG-style top bar ── */
#topBar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:rgba(6,0,16,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.07);z-index:200;display:flex;align-items:center;gap:6px;padding:0 8px}
.ddg-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.75);flex-shrink:0;transition:all .15s cubic-bezier(.34,1.56,.64,1)}
.ddg-btn:active{transform:scale(.92);background:rgba(255,255,255,.12)}
.ddg-tab-count{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.25);display:grid;place-items:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:all .15s cubic-bezier(.34,1.56,.64,1)}
.ddg-tab-count:active{transform:scale(.92)}
#tabCountNum{font-size:13px;font-weight:800;font-family:inherit}
#topSearch{flex:1;min-width:0;height:38px;border-radius:99px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:7px;padding:0 13px;cursor:text;transition:all .22s cubic-bezier(.22,1,.36,1);overflow:hidden}
#topSearch.expanded{border-radius:12px;background:rgba(255,255,255,.11);border-color:rgba(126,60,255,.5);box-shadow:0 4px 20px rgba(126,60,255,.2)}
#topSearchInput{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13.5px;font-family:inherit;min-width:0}
#topSearchInput::placeholder{color:rgba(255,255,255,.38)}
#topSearchText{flex:1;font-size:12.5px;color:rgba(255,255,255,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
#topSearchClear{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);border:none;display:none;place-items:center;cursor:pointer;color:#fff;font-size:11px;flex-shrink:0}
#topSearch.expanded #topSearchClear{display:grid}
#topSearch.expanded #topSearchText{display:none}

/* ── Tab Overview Panel ── */
#tabsPanel{position:fixed;inset:0;z-index:300;background:rgba(4,0,14,.96);backdrop-filter:blur(24px);display:none;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
#tabsPanel.open{display:flex;transform:translateY(0)}
#tabsPanelBar{height:var(--bar-h);display:flex;align-items:center;gap:8px;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
#tabsPanelTitle{flex:1;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.8)}
#tabsGrid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-content:start}
#tabsGrid::-webkit-scrollbar{width:3px}
.tab-card{border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);overflow:hidden;cursor:pointer;position:relative;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.tab-card:active{transform:scale(.96)}
.tab-card.active-card{border-color:rgba(126,60,255,.6);background:rgba(126,60,255,.1);box-shadow:0 0 0 1px rgba(126,60,255,.3)}
.tab-card-preview{height:110px;background:linear-gradient(135deg,rgba(126,60,255,.08),rgba(14,0,31,.8));display:flex;align-items:flex-end;justify-content:center;overflow:hidden;position:relative}
.tab-card-label{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:9px;font-weight:600;color:rgba(255,255,255,.7);background:linear-gradient(to top,rgba(0,0,0,.7),transparent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-card-preview-favicon{width:32px;height:32px;border-radius:8px;object-fit:cover}
.tab-card-info{padding:8px 10px 10px}
.tab-card-title{font-size:11.5px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.tab-card-url{font-size:9.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-card-close{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.65);border:none;display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;line-height:1;transition:background .1s}
.tab-card-close:hover{background:rgba(255,77,109,.7);color:#fff}

/* Keep .tab hidden but in DOM for JS compatibility */
.tab{display:none}
.tab-close{display:none}
#tabsWrap{display:none}
.tb-btn{display:none}

/* ── URL bar ── */
#urlBar{display:none}
#urlDisplay{flex:1;display:flex;align-items:center;gap:5px;height:27px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:0 9px;cursor:text;transition:background .12s;overflow:hidden}
#urlDisplay:hover{background:rgba(255,255,255,.09)}
#urlText{flex:1;font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#urlText.secure{color:#29c36a}
#urlText.warn{color:#f59e0b}
.nav-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:none;display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:color .12s,background .12s;flex-shrink:0}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.07)}
.nav-btn:disabled{opacity:.28;cursor:not-allowed}
#reloadBtn.loading{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Content ── */
#content{position:fixed;top:var(--bar-h);left:0;right:0;bottom:0;z-index:10;overflow:hidden}
.page{position:absolute;inset:0;display:none;background:transparent}
.page.active{display:flex;flex-direction:column}
.home-page{overflow-y:auto;background:transparent}
.home-inner{width:min(680px,95%);margin:0 auto;padding:26px 0 58px;display:flex;flex-direction:column;align-items:center;gap:18px}
.home-brand h1{font-size:26px;font-weight:800;background:linear-gradient(90deg,#e9d5ff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px;text-align:center}
.home-brand p{font-size:12px;color:var(--muted);margin-top:3px;text-align:center}
.search-bar{width:100%;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:11px;padding:0 11px;height:44px;transition:border-color .15s,background .15s}
.search-bar:focus-within{border-color:rgba(126,60,255,.5);background:rgba(255,255,255,.09)}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit}
.search-bar input::placeholder{color:var(--muted)}
.search-bar button{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.shortcuts{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:460px){.shortcuts{grid-template-columns:repeat(2,1fr)}}
.shortcut{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 7px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.shortcut:hover,.shortcut:active{background:rgba(126,60,255,.15);border-color:rgba(126,60,255,.45);transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(126,60,255,.25)}
.shortcut-icon{width:34px;height:34px;border-radius:8px;display:grid;place-items:center}
.shortcut-label{font-size:11px;font-weight:600;text-align:center}
.sec-title{width:100%;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.recent-list{width:100%;display:flex;flex-direction:column;gap:5px}
.recent-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:background .12s}
.recent-item:hover{background:rgba(255,255,255,.08)}
.ri-title{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ri-url{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}

/* ── TFVCore internal results (when engine=tfcore) ── */
.tfv-results{width:100%;display:flex;flex-direction:column;gap:10px}
.tfv-ai-box{background:rgba(126,60,255,.08);border:1px solid rgba(126,60,255,.25);border-radius:11px;padding:14px}
.tfv-ai-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.tfv-ai-text{font-size:13px;color:var(--text);line-height:1.6}
.tfv-result{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:background .13s}
.tfv-result:hover{background:rgba(255,255,255,.08)}
.tfv-result-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tfv-result-url{font-size:11px;color:var(--good);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tfv-result-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* ── Page loading ── */
.iframe-wrap{flex:1;position:relative;overflow:hidden}
.iframe-wrap iframe{width:100%;height:100%;border:none;background:#fff;display:block}
.page-overlay{position:absolute;inset:0;background:rgba(8,0,18,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:5;transition:opacity .2s}
.page-overlay.hidden{opacity:0;pointer-events:none}
.load-spin{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);animation:spin .7s linear infinite}
.block-msg{text-align:center;padding:20px;max-width:300px}
.block-msg h3{color:var(--accent);font-size:15px;margin-bottom:7px}
.block-msg p{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:11px}
.open-ext-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;cursor:pointer;font-size:13px;font-family:inherit}

/* ── URL input overlay ── */
#urlInput{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;flex-direction:column;padding-top:calc(var(--bar-h) + var(--url-h))}
#urlInput.open{display:flex}
.url-input-box{background:rgba(10,1,22,.98);border-bottom:1px solid var(--border);padding:9px 11px;display:flex;align-items:center;gap:7px}
/* FIX #3: inputmode=url activa el botón .com en teclados Android */
.url-input-box input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(126,60,255,.4);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;font-family:inherit;outline:none;inputmode:url}
.url-input-box .go-btn{padding:9px 14px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.url-input-box .cancel-btn{padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
.url-sugg-list{overflow-y:auto;flex:1;padding:7px 11px;display:flex;flex-direction:column;gap:3px}
.url-sugg-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:background .1s}
.url-sugg-item:hover{background:rgba(255,255,255,.08)}
.sug-text{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sug-badge{font-size:10px;color:var(--muted);background:var(--glass);padding:2px 6px;border-radius:5px;border:1px solid var(--border);flex-shrink:0}

/* ── Menu ── */
#menu{position:fixed;top:calc(var(--bar-h) + 5px);right:9px;z-index:400;width:215px;background:rgba(10,1,22,.97);border:1px solid var(--border);border-radius:11px;box-shadow:0 14px 44px rgba(0,0,0,.72);opacity:0;pointer-events:none;transform:scale(.95) translateY(-5px);transform-origin:top right;transition:opacity .14s,transform .14s;overflow:hidden}
#menu.open{opacity:1;pointer-events:auto;transform:scale(1) translateY(0)}
.menu-item{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background .1s}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:rgba(255,255,255,.06)}
.menu-item svg{flex-shrink:0;opacity:.75}
.menu-item span{flex:1}
.mbadge{font-size:10px;padding:2px 6px;border-radius:99px;background:rgba(126,60,255,.2);color:var(--accent);border:1px solid rgba(126,60,255,.3)}

/* ── Modals ── */
.modal-bd{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center}
.modal-bd.open{display:flex}
.modal-box{width:min(94%,460px);background:var(--modal-bg);border:1px solid var(--border);border-radius:13px;padding:17px;box-shadow:0 22px 56px rgba(0,0,0,.8);max-height:calc(100vh - 60px);overflow-y:auto}
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.modal-title{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.mclose{width:26px;height:26px;border-radius:6px;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px}
.btn.pri{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none}
.btn.red{background:linear-gradient(135deg,var(--danger2),var(--danger));color:#fff;border:none}
.hist-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-bottom:4px;transition:background .1s}
.hist-item:hover{background:rgba(255,255,255,.08)}
.hist-info{flex:1;min-width:0;cursor:pointer}
.hist-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.hist-url{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-del{width:24px;height:24px;border-radius:5px;background:transparent;border:none;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:color .1s,background .1s;flex-shrink:0}
.hist-del:hover{color:var(--danger);background:rgba(255,77,109,.12)}
.cfg-section{margin-bottom:14px}
.cfg-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);margin-bottom:6px;gap:8px;transition:background .12s}
.cfg-row-l{min-width:0}
.cfg-row-name{font-size:13px;font-weight:600;color:var(--text)}
.cfg-row-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tog{position:relative;width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.07);border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background .17s}
.tog .knob{position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .17s;pointer-events:none}
.tog.on{background:linear-gradient(90deg,var(--accent2),var(--accent));border-color:transparent}
.tog.on .knob{transform:translateX(18px)}
.th-chips{display:flex;flex-wrap:wrap;gap:6px;padding:3px 0}
.th-chip{width:32px;height:32px;border-radius:7px;border:2px solid transparent;cursor:pointer;transition:border-color .13s;position:relative}
.th-chip.active::after{content:'';position:absolute;inset:-4px;border-radius:11px;border:2px solid var(--accent)}
/* Engine chips */
.engine-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.engine-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .13s}
.engine-chip:hover{background:var(--glass2);border-color:rgba(126,60,255,.4)}
.engine-chip.active{background:linear-gradient(135deg,rgba(126,60,255,.28),rgba(90,0,153,.2));border-color:rgba(126,60,255,.6);color:var(--accent)}
.engine-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Particles chips */
.part-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.part-chip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:999px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .13s}
.part-chip.active{background:linear-gradient(135deg,rgba(126,60,255,.28),rgba(90,0,153,.2));border-color:rgba(126,60,255,.6);color:var(--accent)}
/* Toast */
#toasts{position:fixed;right:11px;top:calc(var(--bar-h) + var(--url-h) + 8px);z-index:700;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{background:rgba(10,1,22,.97);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;font-size:12px;color:#fff;opacity:0;transform:translateX(14px);transition:opacity .16s,transform .16s;max-width:230px}
.toast.show{opacity:1;transform:none}
/* Incognito */
body.incognito{--bg1:#060606;--bg2:#0a0a0a;--accent:#8888ff;--accent2:#4444bb;--modal-bg:rgba(4,4,8,.98)}
body.incognito #topBar{background:rgba(4,4,8,.96)}
body.incognito #urlBar{background:rgba(3,3,5,.94)}
/* Particles canvas — z-index:-1 so it stays behind ALL content */
#pcv{position:fixed;inset:0;z-index:-1;pointer-events:none;display:none;width:100%;height:100%}
/* Adblock badge */
#adblockBadge{position:fixed;bottom:10px;left:10px;z-index:300;font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(41,195,106,.1);color:#29c36a;border:1px solid rgba(41,195,106,.22);pointer-events:none;display:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:3px}

/* Context menu */
#tf-ctx-menu{position:fixed;z-index:8500;background:rgba(6,0,13,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:6px;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,.5);backdrop-filter:blur(16px);display:none;animation:ctxIn .15s ease}
@keyframes ctxIn{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
.ctx-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;cursor:pointer;font-size:12.5px;color:rgba(255,255,255,.85);transition:background .1s}
.ctx-item:hover{background:rgba(255,255,255,.07)}
.ctx-item svg{flex-shrink:0;color:rgba(255,255,255,.5)}

}

/* ══════════ NAVEGACIÓN ══════════ */
function processInput(v){
  v=(v||'').trim();if(!v)return null;
  if(/^https?:\/\//i.test(v))return v;
  if(/^[a-z0-9-]+(\.[a-z]{2,})+(\/.*)?$/i.test(v))return'https://'+v;
  if(v==='about:blank')return'about:blank';
  /* Si engine externo, generar URL de búsqueda → se abrirá externamente */
  var eng=ENGINES[cfg.engine]||ENGINES.tfcore;
  if(eng.external&&eng.fn)return eng.fn(v);
  /* TFVCore propio: devolver query para búsqueda interna */
  return{query:v};
}

function navigate(input){
  var result=processInput(input);if(!result)return;
  var tab=getTab();if(!tab)return;

  /* ── FIX #4: Check external FIRST for any URL, regardless of engine ── */
  if(typeof result==='string'&&isExternal(result)){
    var host2='';try{host2=new URL(result).hostname;}catch{}
    /* FIX #5: In incognito mode, open in browser's incognito (use noopener+noreferrer; 
       most browsers open incognito links in incognito if set as default) */
    toast('Abriendo "'+host2+'" en el navegador'+(cfg.incognito?' (incógnito)':'')+' por medidas de seguridad…',2200);
    setTimeout(function(){window.open(result,'_blank','noopener,noreferrer');},300);
    addHist(result,host2);
    return;
  }

  /* ── FIX #4: External search engines → open externally ── */
  if(typeof result==='string'&&(ENGINES[cfg.engine]||{}).external&&!isUrl(input)){
    toast('Abriendo búsqueda en '+(ENGINES[cfg.engine]||{n:'?'}).n+'…',2000);
    setTimeout(function(){window.open(result,'_blank','noopener,noreferrer');},300);
    return;
  }

  /* ── Búsqueda interna TFVCore ── */
  if(result&&typeof result==='object'&&result.query){
    tab.back.push(tab.url||'');tab.fwd=[];tab.url='tfcore://search?q='+encodeURIComponent(result.query);
    closeUrlInput();updateNavUI();
    renderTFVCoreSearch(tab.id,result.query);
    return;
  }

  /* ── Navegación normal (página interna) ── */
  var url=result;
  if(tab.url&&tab.url!==url){tab.back.push(tab.url);if(tab.back.length>80)tab.back.shift();tab.fwd=[];}
  tab.url=url;
  closeUrlInput();updateNavUI();
  loadPage(tab.id,url);
}

function isUrl(v){return/^https?:\/\//i.test(v)||/^[a-z0-9-]+(\.[a-z]{2,})+(\/.*)?$/i.test(v);}

/* FIX #6 — navBack / navFwd funcionan correctamente */
function navBack(){
  var tab=getTab();if(!tab||!tab.back||!tab.back.length)return;
  var prev=tab.back.pop();tab.fwd.push(tab.url);tab.url=prev;
  updateNavUI();
  if(!prev||prev===''){renderHome(tab.id);return;}
  if(prev.startsWith('tfcore://search?q=')){
    var q=decodeURIComponent(prev.replace('tfcore://search?q=',''));
    renderTFVCoreSearch(tab.id,q);return;
  }
  if(isExternal(prev)){
    var h='';try{h=new URL(prev).hostname;}catch{}
    toast('Abriendo "'+h+'" en el navegador por medidas de seguridad…',2200);
    setTimeout(function(){window.open(prev,'_blank','noopener,noreferrer');},400);
    return;
  }
  loadPage(tab.id,prev);
}

function navFwd(){
  var tab=getTab();if(!tab||!tab.fwd||!tab.fwd.length)return;
  var next=tab.fwd.pop();tab.back.push(tab.url);tab.url=next;
  updateNavUI();
  if(!next||next===''){renderHome(tab.id);return;}
  if(next.startsWith('tfcore://search?q=')){
    var q=decodeURIComponent(next.replace('tfcore://search?q=',''));
    renderTFVCoreSearch(tab.id,q);return;
  }
  if(isExternal(next)){
    var h='';try{h=new URL(next).hostname;}catch{}
    toast('Abriendo "'+h+'" en el navegador por medidas de seguridad…',2200);
    setTimeout(function(){window.open(next,'_blank','noopener,noreferrer');},400);
    return;
  }
  loadPage(tab.id,next);
}

function navReload(){
  var tab=getTab();if(!tab||!tab.url)return;
  if(!tab.url||tab.url===''){renderHome(tab.id);return;}
  if(tab.url.startsWith('tfcore://search?q=')){
    var q=decodeURIComponent(tab.url.replace('tfcore://search?q=',''));
    renderTFVCoreSearch(tab.id,q);return;
  }
  loadPage(tab.id,tab.url,true);
}

async function fetchAI(query,tabId){
  /* Award 5 XP for each search */
  try{if(window.TF){var xp=TF.getXP()+300;var lvl=TF.getLvl();if(xp>=(TF.XP_PER_LEVEL||1800)){xp=0;lvl=Math.min(lvl+1,TF.MAX_LEVEL||25);TF.showLevelUp(lvl);}TF.saveXP(xp,lvl);}}catch(e){}
  var el=document.getElementById('aiTxt_'+tabId);if(!el)return;
  try{
    var r=await fetch(GROQ_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+GROQ_KEY
      },
      body:JSON.stringify({
        model:GROQ_MODEL,
        temperature:0.7,
        max_completion_tokens:320,
        messages:[
          {role:'system',content:'Eres el asistente de TFVCore, un navegador web. Responde en español latino. Da un resumen útil y conciso en 4-5 oraciones sobre la consulta. Sin markdown, sin asteriscos, solo texto plano.'},
          {role:'user',content:query}
        ]
      })
    });
    if(!r.ok){
      var errText=await r.text();
      throw new Error('HTTP '+r.status+': '+errText);
    }
    var data=await r.json();
    var txt=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
    var elNow=document.getElementById('aiTxt_'+tabId);
    if(elNow)elNow.textContent=txt.trim()||'No se pudo generar el resumen.';
    var ctaEl=document.getElementById('tfcta_'+tabId);
    if(ctaEl&&txt.trim()){ctaEl.style.display='flex';ctaEl.dataset.ans=txt.trim().slice(0,500);}
    var ctaEl=document.getElementById('aiCta_'+tabId);
    if(ctaEl){ctaEl.style.display='block';var btn=ctaEl.querySelector('button');if(btn)btn.dataset.q=query;}
  }catch(e){
    var elNow=document.getElementById('aiTxt_'+tabId);
    if(elNow)elNow.textContent='Error al conectar con la IA: '+e.message;
  }
}

async function fetchWebResults(query,tabId){
  var container=document.getElementById('webRes_'+tabId);if(!container)return;
  try{
    var url='https://www.googleapis.com/customsearch/v1?key='+GCS_KEY+'&cx='+GCS_CX+'&q='+encodeURIComponent(query)+'&num=8&gl=AR&hl=es&lr=lang_es';
    var r=await fetch(url);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    var items=data.items||[];
    if(!items.length){container.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0">No se encontraron resultados.</div>';return;}
    container.innerHTML=items.map(function(it){
      return'<div class="tfv-result" data-url="'+esc(it.link)+'">'+
        '<div class="tfv-result-title">'+esc(it.title)+'</div>'+

    if(container)container.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0">Error al obtener resultados: '+esc(e.message)+'</div>';
  }
}

function rewriteHTML(html,base){
  var res=html
    .replace(/<meta[^>]+http-equiv=["']?(x-frame-options|content-security-policy|x-content-type-options|referrer-policy)["']?[^>]*>/gi,'')
    .replace(/<meta[^>]+name=["']?referrer["']?[^>]*>/gi,'');
  var bt='<base href="'+base+'">';
  var sc='<script>'+NAV_SCRIPT+'<\/script>';
  if(/<head[^>]*>/i.test(res)){res=res.replace(/(<head[^>]*>)/i,'$1'+bt);}else{res=bt+res;}
  if(/<body[^>]*>/i.test(res)){res=res.replace(/(<body[^>]*>)/i,'$1'+sc);}else{res=sc+res;}
  return res;
}

async function tryProxy(url){
  for(var i=0;i<PROXIES.length;i++){
    try{
      var r=await fetch(PROXIES[i](url),{cache:'no-store',signal:AbortSignal.timeout(8000)});
      if(r.ok){var html=await r.text();if(html&&html.length>200)return{ok:true,html:html};}
    }catch(e){}
  }
  return{ok:false};
}

function loadPage(tabId,url,forceReload){
  var page=document.querySelector('.page[data-id="'+tabId+'"]');if(!page)return;
  page.className='page active';
  page.innerHTML='<div class="iframe-wrap"><div class="page-overlay" id="ov_'+tabId+'"><div class="load-spin"></div><div style="font-size:12px;color:var(--muted);margin-top:9px">Cargando…</div></div>'+
    '<iframe id="ifr_'+tabId+'" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-pointer-lock allow-popups-to-escape-sandbox" referrerpolicy="no-referrer" allow="autoplay;fullscreen;encrypted-media;clipboard-write"></iframe></div>';
  reloadBtn.classList.add('loading');
  var ifr=document.getElementById('ifr_'+tabId),ov=document.getElementById('ov_'+tabId),settled=false;
  /* Long press detection on iframe wrapper */
  var ifrWrap=ifr&&ifr.parentElement;
  if(ifrWrap&&!ifrWrap._lpSet){
    ifrWrap._lpSet=true;
    var _lpT=null;
    ifrWrap.addEventListener('touchstart',function(e){
      _lpT=setTimeout(function(){
        var tab=getTab(tabId);
        if(!tab||!tab.url||tab.url.startsWith('tfcore://'))return;
        showPageMenu(tab.url,tabId);
      },600);
    },{passive:true});
    ifrWrap.addEventListener('touchend',function(){clearTimeout(_lpT);},{passive:true});
    ifrWrap.addEventListener('touchmove',function(){clearTimeout(_lpT);},{passive:true});
    /* Right click on desktop */
    ifrWrap.addEventListener('contextmenu',function(e){
      var tab=getTab(tabId);if(!tab||!tab.url||tab.url.startsWith('tfcore://'))return;
      e.preventDefault();showPageMenu(tab.url,tabId);
    });
  }

  var mh=function(e){if(e.data&&e.data.type==='TFV_NAV'&&e.data.url){window.removeEventListener('message',mh);navigate(e.data.url);}};
  window.addEventListener('message',mh);

  function onOk(hint){
    if(settled)return;settled=true;
    if(ov)ov.classList.add('hidden');reloadBtn.classList.remove('loading');
    var title=hint;
    try{var t=ifr.contentDocument&&ifr.contentDocument.title;if(t&&t.trim())title=t;}catch{}
    if(!title){try{title=new URL(url).hostname;}catch{title=url;}}
    updateTabTitle(tabId,title);addHist(url,title);updateNavUI();
  }
  function onFail(){
    if(settled)return;
    window.removeEventListener('message',mh);
    tryProxy(url).then(function(res){
      if(res.ok){
        var blob=new Blob([rewriteHTML(res.html,url)],{type:'text/html;charset=utf-8'});
        var bu=URL.createObjectURL(blob);
        if(ifr._blobUrl)URL.revokeObjectURL(ifr._blobUrl);
        ifr._blobUrl=bu;
        window.addEventListener('message',mh);
        ifr.onload=function(){onOk(null);setTimeout(function(){URL.revokeObjectURL(bu);ifr._blobUrl=null;},30000);};
        ifr.onerror=function(){showErr(tabId,url,ov);reloadBtn.classList.remove('loading');settled=true;};
        ifr.src=bu;
      }else{showErr(tabId,url,ov);reloadBtn.classList.remove('loading');settled=true;window.removeEventListener('message',mh);}
    });
  }

  ifr.onload=function(){onOk(null);};
  ifr.onerror=function(){onFail();};
  ifr.src=url;
  var timer=setTimeout(function(){if(!settled)onFail();},5000);
  var orig=onOk;
  onOk=function(h){clearTimeout(timer);orig(h);};
}

function showErr(tabId,url,ov){
  if(!ov)return;
  ov.classList.remove('hidden');ov.style.opacity='1';ov.style.pointerEvents='auto';
  ov.innerHTML='<div class="block-msg"><h3>No se pudo cargar</h3>'+
    '<p>La página bloqueó la conexión o los proxies no están disponibles.</p>'+
    '<button class="open-ext-btn" onclick="window.open(\''+esc(url)+'\',\'_blank\',\'noopener,noreferrer\')">'+
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>'+
      'Abrir externamente</button></div>';
}

/* ══════════ HISTORIAL & FAVORITOS ══════════ */
function addHist(url,title){
  if(!url||cfg.incognito)return;
  hist=hist.filter(function(h){return h.url!==url;});
  hist.push({url:url,title:title||url,ts:Date.now()});
  if(hist.length>500)hist=hist.slice(-500);
  save();
}
function isFav(url){return favs.some(function(f){return f.url===url;});}
function toggleFav(url,title){
  if(isFav(url)){favs=favs.filter(function(f){return f.url!==url;});toast('Favorito eliminado');}
  else{favs.unshift({url:url,title:title||url,ts:Date.now()});toast('★ Añadido a favoritos');}
  save();updateFavBtn();
}
function updateFavBtn(){
  var tab=getTab();var on=!!(tab&&tab.url&&isFav(tab.url));
  var ico=$('favIco');
  if(ico){ico.setAttribute('fill',on?'var(--accent)':'none');ico.setAttribute('stroke',on?'var(--accent)':'currentColor');}
}

/* ══════════ URL BAR ══════════ */
function updateNavUI(){
  var tab=getTab();var url=(tab&&tab.url)||'';
  if(!url||url==='about:blank'||url===''){urlText.textContent='Nueva pestaña';urlText.className='';}
  else if(url.startsWith('tfcore://')){urlText.textContent='Búsqueda TFVCore';urlText.className='';}
  else{try{var u=new URL(url);urlText.textContent=u.hostname+(u.pathname&&u.pathname!=='/'?u.pathname:'');urlText.className=u.protocol==='https:'?'secure':'warn';}catch{urlText.textContent=url;urlText.className='';}}
  backBtn.disabled=!(tab&&tab.back&&tab.back.length>0);
  fwdBtn.disabled=!(tab&&tab.fwd&&tab.fwd.length>0);
  updateFavBtn();
}

function renderSugg(q){
  urlSugg.innerHTML='';
  var query=q.toLowerCase().trim(),items=[];
  if(query){
    var hm=hist.filter(function(h){return h.url.toLowerCase().includes(query)||h.title.toLowerCase().includes(query);}).slice(-6).reverse().map(function(h){return{t:h.title||h.url,u:h.url,b:'historial'};});
    var fm=favs.filter(function(f){return f.url.toLowerCase().includes(query)||f.title.toLowerCase().includes(query);}).slice(0,3).map(function(f){return{t:f.title||f.url,u:f.url,b:'favorito'};});
    var qm=QUICK.filter(function(s){return s.t.toLowerCase().includes(query)||s.u.includes(query);});
    var eng=ENGINES[cfg.engine]||ENGINES.tfcore;
    var label=eng.external?'Buscar en '+eng.n:'Buscar en TFVCore';
    items=[].concat(fm,hm,qm,{t:label+': '+q,u:q,b:'buscar'});
  }else{
    var rf=hist.slice(-5).reverse().map(function(h){return{t:h.title||h.url,u:h.url,b:'reciente'};});
    var tf=favs.slice(0,3).map(function(f){return{t:f.title||f.url,u:f.url,b:'favorito'};});
    items=[].concat(tf,rf,QUICK.slice(0,4));
  }
  var seen=new Set();
  items=items.filter(function(i){if(!i.u||seen.has(i.u))return false;seen.add(i.u);return true;});
  items.slice(0,10).forEach(function(item){
    var el=document.createElement('div');el.className='url-sugg-item';
    el.innerHTML='<span class="sug-text">'+esc(item.t||item.u)+'</span><span class="sug-badge">'+esc(item.b||'')+'</span>';
    el.onclick=function(){navigate(item.u);};
    urlSugg.appendChild(el);
  });
}

(function(){
  var ts=document.getElementById('topSearch');
  var tsi=document.getElementById('topSearchInput');
  var tst=document.getElementById('topSearchText');
  var tsc=document.getElementById('topSearchClear');
  if(!ts||!tsi)return;

  function expandSearch(){
    ts.classList.add('expanded');
    tsi.style.display='block';
    tst.style.display='none';
    /* Fill current URL or empty */
    var t=getTab(activeId);
    if(t&&t.url&&!t.url.startsWith('tfcore://')&&!t.url.startsWith('about:'))tsi.value=t.url;
    else tsi.value='';
    setTimeout(function(){tsi.focus();tsi.select();},40);
  }
  function collapseSearch(){
    ts.classList.remove('expanded');
    tsi.style.display='none';
    tst.style.display='';
    tsi.value='';
    var sb=document.getElementById('topSuggBox');if(sb)sb.style.display='none';
    syncTopSearchText();
  }
  function syncTopSearchText(){
    if(!tst)return;
    var t=getTab(activeId);
    if(t&&t.url&&!t.url.startsWith('tfcore://')&&!t.url.startsWith('about:')){
      try{tst.textContent=new URL(t.url).hostname.replace('www.','')||t.url;}catch(e){tst.textContent=t.url;}
      tst.style.color='rgba(255,255,255,.75)';
    }else{
      tst.textContent='Buscar o escribir URL…';
      tst.style.color='rgba(255,255,255,.4)';
    }
  }
  ts.addEventListener('click',function(e){
    if(e.target===tsc)return;
    if(!ts.classList.contains('expanded'))expandSearch();
  });
  if(tsc)tsc.onclick=function(e){e.stopPropagation();collapseSearch();};
  tsi.addEventListener('keydown',function(e){
    if(e.key==='Enter'){navigate(tsi.value.trim());collapseSearch();}
    if(e.key==='Escape')collapseSearch();
  });
  tsi.addEventListener('input',function(){
    if(tsc)tsc.style.display=tsi.value?'grid':'none';
    showTopSugg(tsi.value);
  });

  /* Suggestions dropdown */
  var tsSuggBox=document.createElement('div');
  tsSuggBox.id='topSuggBox';
  tsSuggBox.style.cssText='position:fixed;left:8px;right:8px;top:calc(var(--bar-h) + 4px);z-index:500;background:rgba(6,0,16,.97);border:1px solid rgba(126,60,255,.3);border-radius:14px;overflow:hidden;display:none;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.8);backdrop-filter:blur(20px)';
  document.body.appendChild(tsSuggBox);

  function showTopSugg(q){
    if(!q||q.length<1){tsSuggBox.style.display='none';return;}
    var ql=q.toLowerCase();
    var h=window._hist?window._hist():hist;
    var items=[];
    /* History matches */
    h.filter(function(x){return x.url&&(x.url.toLowerCase().includes(ql)||((x.title||'').toLowerCase().includes(ql)));})
      .slice(0,3).forEach(function(x){items.push({type:'hist',text:x.title||x.url,sub:x.url,url:x.url});});
    /* Search suggestions */
    var searches=['sitio web','wikipedia','youtube','noticias','fotos','significado','definición','cómo','qué es'];
    if(q.length>=2){
      searches.slice(0,3).forEach(function(s){
        items.push({type:'search',text:q+' '+s,sub:'Buscar',url:null});
      });
      items.push({type:'search',text:q,sub:'Buscar esto',url:null});
    }
    if(!items.length){tsSuggBox.style.display='none';return;}
    tsSuggBox.innerHTML='';
    items.slice(0,6).forEach(function(it,i){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:'+(i<items.length-1?'1px solid rgba(255,255,255,.06)':'none')+';transition:background .1s';
      row.onmouseenter=function(){this.style.background='rgba(255,255,255,.06)';};
      row.onmouseleave=function(){this.style.background='';};
      var icon=it.type==='hist'
        ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>'
        :'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>';
      row.innerHTML=icon+'<div style="flex:1;min-width:0"><div style="font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+it.text+'</div><div style="font-size:10px;color:rgba(255,255,255,.38);margin-top:1px">'+it.sub+'</div></div>';
      row.onclick=function(){
        tsSuggBox.style.display='none';
        collapseSearch();
        if(it.url)navigate(it.url);
        else navigate(it.text);
      };
      tsSuggBox.appendChild(row);
    });
    tsSuggBox.style.display='flex';
  }

  /* Google Suggest + autocomplete */
  var _suggT=null;
  tsi.addEventListener('input',function(){
    clearTimeout(_suggT);
    var q2=tsi.value.trim();
    if(q2.length<1){tsSuggBox.style.display='none';return;}
    showTopSugg(q2); /* show history immediately */
    if(q2.length<2)return;
    _suggT=setTimeout(function(){
      /* Try multiple CORS-friendly suggest endpoints */
      var urls=[
        'https://api.allorigins.win/get?url='+encodeURIComponent('https://suggestqueries.google.com/complete/search?client=firefox&hl=es&q='+encodeURIComponent(q2))
      ];
      fetch(urls[0],{signal:AbortSignal.timeout(3000)})
        .then(function(r){return r.json();})
        .then(function(proxy){
          /* allorigins wraps in {contents:string} */
          var d;
          try{d=JSON.parse(proxy.contents||proxy||'[[],[]]');}catch(e){d=[[],[]];}
          var raw=d[1]||[];
          /* d[1] is array of strings for firefox client */
          var suggs=raw.slice(0,6);
          if(!suggs.length)return;
          /* Rebuild box with fresh suggestions on top of history */
          var q2l=tsi.value.trim();
          if(!q2l)return;
          var h=window._hist?window._hist():[];
          var histItems=h.filter(function(x){
            return x.url&&(x.url.toLowerCase().includes(q2l.toLowerCase())||((x.title||'').toLowerCase().includes(q2l.toLowerCase())));
          }).slice(0,2);
          tsSuggBox.innerHTML='';
          /* Suggestions from Google first */

/* ── Tab count button + Tabs Panel ── */
(function(){
  var btnTC=document.getElementById('btnTabCount');
  var panel=document.getElementById('tabsPanel');
  var grid=document.getElementById('tabsGrid');
  var back=document.getElementById('tabsPanelBack');
  var newBtn=document.getElementById('tabsPanelNew');
  var title=document.getElementById('tabsPanelTitle');

  window.openTabsPanel=function(){
    if(!panel||!grid)return;
    grid.innerHTML='';
    if(title)title.textContent='Pestañas ('+tabs.length+')';
    tabs.forEach(function(tab){
      var card=document.createElement('div');
      card.className='tab-card'+(tab.id===activeId?' active-card':'');
      card.dataset.tabid=tab.id;
      var host='';
      try{if(tab.url&&!tab.url.startsWith('tfcore://'))host=new URL(tab.url).hostname.replace('www.','');}catch(e){}
      var fav=host?'https://www.google.com/s2/favicons?domain='+host+'&sz=64':'';
      /* Preview: try to grab a screenshot via favicon or show placeholder */
      card.innerHTML=
        '<div class="tab-card-preview">'
          +(fav?'<img class="tab-card-preview-favicon" src="'+fav+'" onerror="this.style.display=\'none\'">'
              :'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.4)" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle></svg>')
          +'<div class="tab-card-label">'+(tab.title||'Nueva pestaña')+'</div>'
        +'</div>'
        +'<button class="tab-card-close">×</button>'
        +'<div class="tab-card-info">'
          +'<div class="tab-card-title">'+(tab.title||'Nueva pestaña')+'</div>'
          +(host?'<div class="tab-card-url">'+host+'</div>':'')
        +'</div>';

      /* Swipe left to close */
      var startX=0,dx=0;
      card.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;dx=0;},{passive:true});
      card.addEventListener('touchmove',function(e){
        dx=e.touches[0].clientX-startX;
        if(Math.abs(dx)>5){card.style.transform='translateX('+dx+'px)';card.style.opacity=String(1-Math.abs(dx)/card.offsetWidth*0.8);}
      },{passive:true});
      card.addEventListener('touchend',function(){
        if(Math.abs(dx)>80){
          card.style.transition='transform .2s,opacity .2s';
          card.style.transform='translateX(-120%)';card.style.opacity='0';
          setTimeout(function(){
            if(tabs.length<=1){card.style.transform='';card.style.opacity='';return;}
            closeTab(tab.id);window.openTabsPanel();
          },200);
        }else{card.style.transform='';card.style.opacity='';}
      },{passive:true});

      card.onclick=function(e){
        if(e.target.classList.contains('tab-card-close'))return;
        activateTab(tab.id);window.closeTabsPanel();
      };
      card.querySelector('.tab-card-close').onclick=function(e){
        e.stopPropagation();
        if(tabs.length<=1){if(window.TF&&TF.toast)TF.toast('Mínimo una pestaña');return;}
        closeTab(tab.id);window.openTabsPanel();
      };
      grid.appendChild(card);
    });
    panel.style.display='flex';
    requestAnimationFrame(function(){requestAnimationFrame(function(){panel.style.transform='translateY(0)';});});
  };
  window.closeTabsPanel=function(){
    if(!panel)return;
    panel.style.transform='translateY(100%)';
    setTimeout(function(){panel.style.display='none';},320);
  };

  if(btnTC)btnTC.onclick=window.openTabsPanel;
  if(back)back.onclick=window.closeTabsPanel;
  if(newBtn)newBtn.onclick=function(){newTab();window.closeTabsPanel();};
})();

  if(form) form.addEventListener('submit',function(){
    if(window.TF&&TF.getXP){
      var xp=TF.getXP()+300,lvl=TF.getLvl();
      if(xp>=TF.XP_PER_LEVEL){xp=0;lvl=Math.min(lvl+1,TF.MAX_LEVEL);TF.saveXP(xp,lvl);TF.showLevelUp(lvl);}
      else TF.saveXP(xp,lvl);
    }
  });

  /* Clipboard paste suggestion */
  var urlInput=document.getElementById('urlInput');
  if(urlInput){
    urlInput.addEventListener('focus',function(){
      if(!navigator.clipboard||!navigator.clipboard.readText)return;
      navigator.clipboard.readText().then(function(txt){
        txt=(txt||'').trim();
        if(!txt||!/^https?:\/\//i.test(txt))return;
        var ex=document.getElementById('tf-paste-sg');if(ex)ex.remove();
        var sg=document.createElement('div');sg.id='tf-paste-sg';
        sg.style.cssText='position:absolute;top:100%;left:0;right:0;z-index:500;margin-top:4px;background:rgba(6,0,13,.97);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);backdrop-filter:blur(12px)';
        sg.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.7)" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg><span style="flex:1;font-size:11.5px;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+txt.slice(0,44)+'</span><span style="font-size:11.5px;color:#a855f7;font-weight:700;flex-shrink:0">Pegar</span>';
        sg.onclick=function(){urlInput.value=txt;sg.remove();var s=document.querySelector('#urlField button[type=submit]');if(s)s.click();};
        var wp=urlInput.parentElement;
        if(wp){wp.style.position='relative';wp.appendChild(sg);}
        setTimeout(function(){if(sg.parentNode)sg.remove();},5000);
      }).catch(function(){});
    });
  }

  /* Long-press context menu */
  var content=document.getElementById('content');
  if(!content)return;
  var _lt=null,_lx=0,_ly=0;
  content.addEventListener('touchstart',function(e){
    var tab=window.tabs&&window.tabs.find(function(t){return t.id===window.activeId;});
    var url=tab?(tab.url||''):'';
    _lx=e.touches[0].clientX;_ly=e.touches[0].clientY;
    _lt=setTimeout(function(){
      if(!url)return;
      showCtx(_lx,_ly,url);
      if(navigator.vibrate)navigator.vibrate(45);
    },480);
  },{passive:true});
  content.addEventListener('touchmove',function(){clearTimeout(_lt);},{passive:true});
  content.addEventListener('touchend',function(){clearTimeout(_lt);},{passive:true});

  function showCtx(x,y,url){
    var ex=document.getElementById('tf-long-ctx');if(ex)ex.remove();
    var menu=document.createElement('div');menu.id='tf-long-ctx';
    menu.style.cssText='position:fixed;z-index:9900;background:rgba(6,0,13,.98);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:6px;min-width:198px;box-shadow:0 8px 28px rgba(0,0,0,.55);backdrop-filter:blur(18px)';
    var lbl=document.createElement('div');
    lbl.style.cssText='font-size:10.5px;color:rgba(255,255,255,.35);padding:5px 10px 8px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    lbl.textContent=url.length>38?url.slice(0,35)+'...':url;
    menu.appendChild(lbl);
    [
      ['Nueva pestaña',function(){typeof newTab==='function'&&newTab(url);}],
      ['Copiar enlace',function(){navigator.clipboard&&navigator.clipboard.writeText(url).then(function(){window.TF&&TF.toast&&TF.toast('Enlace copiado','ok');});}],
      ['Abrir externamente',function(){window.open(url,'_blank','noopener,noreferrer');}],
      ['Compartir',function(){navigator.share&&navigator.share({url:url}).catch(function(){});}],
    ].forEach(function(item){
      var b=document.createElement('button');
      b.style.cssText='display:flex;align-items:center;padding:10px 11px;border-radius:9px;background:transparent;border:none;color:rgba(255,255,255,.85);font-size:13px;font-family:inherit;cursor:pointer;width:100%;text-align:left;transition:background .1s';
      b.textContent=item[0];
      b.onmouseover=function(){this.style.background='rgba(255,255,255,.07)';};
      b.onmouseout=function(){this.style.background='transparent';};
      b.onclick=function(){menu.remove();item[1]();};
      menu.appendChild(b);
    });
    menu.style.left=Math.min(x,window.innerWidth-208)+'px';
    menu.style.top=Math.min(y,window.innerHeight-200)+'px';
    document.body.appendChild(menu);
    setTimeout(function(){document.addEventListener('click',function h(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',h);}});},80);
  }
})();

</script>
<script>
window.TF = window.TF || {};
window.TF = window.TF || {};
/* ═══════════════════════════════════════════════════════
   TFAPP SHARED SYSTEM v1
   Embed this entire block inside each section's <script>
   ═══════════════════════════════════════════════════════ */

/* ── SHARED KEYS ── */
var TF = window.TF || {};
TF.KEY_USER  = 'tfapp_user';
TF.KEY_XP    = 'tfapp_xp';
TF.KEY_LVL   = 'tfapp_level';
TF.KEY_LAST  = 'tfapp_last_xp';
TF.XP_PER_LEVEL = 30 * 60; // 30 min in seconds of "activity"
TF.MAX_LEVEL = 25;

/* ── SECTIONS ── */
TF.SECTIONS = {
  hub:  { go:'hub.html', icon:'home',    label:'Inicio'     },
  music:{ go:'music.html',   icon:'music',   label:'Música'     },
  core: { go:'core.html',   icon:'browser', label:'Navegador'  },
  games:{ go:'games.html',   icon:'games',   label:'Juegos'     },
  walls:{ go:'walls.html',icon:'walls',   label:'Wallpapers' },
  tv:   { go:'tv.html',      icon:'tv',      label:'TFTV'       },
};

/* ── XP / LEVEL ── */
TF.RANKS = [
  { min:1,  max:5,  rank:'I',        icon:'⚔️',  label:'Rango I'      },
  { min:6,  max:10, rank:'II',       icon:'🛡️',  label:'Rango II'     },
  { min:11, max:15, rank:'III',      icon:'👑',  label:'Rango III'    },
  { min:16, max:20, rank:'IV',       icon:'💎',  label:'Rango IV'     },
  { min:21, max:25, rank:'GIGACHAD', icon:'💪',  label:'GigaChad'     },
];

TF.getRank = function(lvl){
  for(var i=0;i<TF.RANKS.length;i++){
    var r=TF.RANKS[i];
    if(lvl>=r.min&&lvl<=r.max) return r;
  }
  return TF.RANKS[TF.RANKS.length-1];
};

TF.getXP  = function(){ return parseInt(localStorage.getItem(TF.KEY_XP)||'0'); };
TF.getLvl = function(){ return parseInt(localStorage.getItem(TF.KEY_LVL)||'1'); };
TF.saveXP = function(xp,lvl){ localStorage.setItem(TF.KEY_XP,xp); localStorage.setItem(TF.KEY_LVL,lvl); };

/* Tick — call every 60s while user is active */
TF.xpTick = function(){
  var lvl=TF.getLvl();
  if(lvl>=TF.MAX_LEVEL) return;
  var xp=TF.getXP()+60; // +1 minute of XP
  var needed=TF.XP_PER_LEVEL;
  if(xp>=needed){
    xp=0; lvl=Math.min(lvl+1,TF.MAX_LEVEL);
    TF.saveXP(xp,lvl);
    TF.showLevelUp(lvl);
  } else {
    TF.saveXP(xp,lvl);
  }
};

TF.xpPct = function(){
  var lvl=TF.getLvl();
  if(lvl>=TF.MAX_LEVEL) return 100;
  return Math.round((TF.getXP()/TF.XP_PER_LEVEL)*100);
};

/* Start XP ticker */
TF.startTicker = function(){
  if(TF._ticker) return;
  TF._ticker = setInterval(TF.xpTick, 60000);
};

/* ── USER ── */
TF.getUser = function(){
  try{ return JSON.parse(localStorage.getItem(TF.KEY_USER)||'null'); }
  catch(e){ return null; }
};
TF.saveUser = function(u){ localStorage.setItem(TF.KEY_USER, JSON.stringify(u)); };

/* ── LEVEL UP NOTIFICATION ── */
TF.showLevelUp = function(lvl){
  var rank=TF.getRank(lvl);
  var user=TF.getUser();
  var name=(user&&user.name)||'Usuario';
  var isMax=lvl>=TF.MAX_LEVEL;

  var el=document.createElement('div');
  el.style.cssText='position:fixed;top:14px;right:14px;z-index:9999;max-width:260px;opacity:0;transform:translateX(20px) scale(.96);transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none';

  /* Gamer-style level up card */
  el.innerHTML=[
    '<div style="',
      'background:linear-gradient(135deg,rgba(10,2,28,.97),rgba(20,5,45,.97));',
      'border:1px solid rgba(168,85,247,.5);border-radius:14px;overflow:hidden;',
      'box-shadow:0 0 0 1px rgba(168,85,247,.1),0 12px 40px rgba(109,36,217,.4);',
      '">',

      '<div style="height:2px;background:linear-gradient(90deg,transparent,#a855f7,#6d24d9,transparent)"></div>',
      '<div style="padding:12px 14px;display:flex;align-items:center;gap:10px">',
        /* Icon with glow */
        '<div style="width:40px;height:40px;border-radius:10px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);display:grid;place-items:center;font-size:20px;flex-shrink:0;box-shadow:0 0 12px rgba(168,85,247,.3)">'+rank.icon+'</div>',
        '<div style="flex:1;min-width:0">',
          '<div style="font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#a855f7;margin-bottom:2px">'+(isMax?'🏆 NIVEL MÁXIMO':'⚡ SUBISTE DE NIVEL')+'</div>',
          '<div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+name+'</div>',
          '<div style="font-size:10.5px;color:rgba(255,255,255,.5);margin-top:1px">'+rank.label+' · Nivel '+lvl+(isMax?' 💪':'')+'</div>',
        '</div>',
      '</div>',
      /* XP progress bar */
      !isMax?[
        '<div style="padding:0 14px 12px">',
          '<div style="height:3px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden">',
            '<div style="height:100%;width:0%;background:linear-gradient(90deg,#6d24d9,#a855f7);border-radius:99px;transition:width .8s ease;animation:lvlBarIn .8s ease .3s both" id="tf-lvl-bar"></div>',
          '</div>',
        '</div>'
      ].join(''):'',
    '</div>'
  ].join('');

  document.head.insertAdjacentHTML('beforeend','<style>@keyframes lvlBarIn{from{width:0%}to{width:35%}}</style>');
  document.body.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    el.style.opacity='1';el.style.transform='translateX(0) scale(1)';
  });});
  setTimeout(function(){
    el.style.opacity='0';el.style.transform='translateX(20px) scale(.96)';
    setTimeout(function(){el.remove();},350);
  },isMax?6000:4000);
};

    cont=document.createElement('div');
    cont.id='tf-toast-cont';
    cont.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9998;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;width:max-content;max-width:88vw';
    document.body.appendChild(cont);
  }
  var el=document.createElement('div');
  var borderColor = type==='ok'?'rgba(74,222,128,.3)':type==='err'?'rgba(244,63,94,.3)':'rgba(255,255,255,.1)';
  el.style.cssText='background:rgba(6,0,13,.97);border:1px solid '+borderColor+';border-radius:10px;padding:8px 14px;font-size:12.5px;color:#fff;opacity:0;transform:translateY(6px);transition:opacity .16s,transform .16s;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;backdrop-filter:blur(12px)';
  el.textContent=msg;
  cont.appendChild(el);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    el.style.opacity='1'; el.style.transform='translateY(0)';
  }); });
  setTimeout(function(){
    el.style.opacity='0'; el.style.transform='translateY(6px)';
    setTimeout(function(){ el.remove(); }, 200);

};

TF.syncMini = function(){
  try{
    var now=JSON.parse(localStorage.getItem('tfmp_now')||'null');
    var mini=document.getElementById('tf-mini');
    if(!mini) return;
    if(!now){ mini.classList.remove('show'); return; }
    mini.classList.add('show');
    var titleEl=document.getElementById('tf-mini-title');
    var artistEl=document.getElementById('tf-mini-artist');
    var artEl=document.getElementById('tf-mini-art');
    if(titleEl) titleEl.textContent=now.title||'Sin título';
    if(artistEl) artistEl.textContent=now.artist||'TFMusic';
    if(artEl){
      if(now.cover){
        artEl.innerHTML='<img src="'+now.cover+'" onerror="this.style.display=\'none\'"/>';
      }
    }
    var bar=document.getElementById('tf-mini-bar');
    if(bar&&now.pct) bar.style.width=now.pct+'%';
    /* Play/pause icon */
    var playBtn=document.getElementById('tf-mini-play');
    if(playBtn){
      playBtn.innerHTML=now.playing
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><line x1="10" y1="15" x2="10" y2="9"></line><line x1="14" y1="15" x2="14" y2="9"></line></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"></polygon></svg>';
    }
  }catch(e){}
};

/* ── LOGIN GUARD ── */
TF.requireLogin = function(action){
  var user=TF.getUser();
  if(user) return true;
  TF.toast('Inicia sesión para usar esta función','err',2200);
  TF.showLogin();
  return false;
};

/* ── LOGIN MODAL ── */
TF.showLogin = function(onSuccess){
  if(document.getElementById('tf-login-modal')) return;
  var u=TF.getUser();
  var isEdit=!!u;

  var modal=document.createElement('div');
  modal.id='tf-login-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center';

  var avatarPreview = u&&u.avatar ? '<img src="'+u.avatar+'" style="width:68px;height:68px;border-radius:50%;object-fit:cover;display:block"/>' : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="1.6" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>';

  modal.innerHTML=[
    '<div id="tf-login-box" style="width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px;animation:loginIn .3s cubic-bezier(.22,1,.36,1) both">',
    '<style>@keyframes loginIn{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}</style>',
    '<div style="display:flex;align-items:center;justify-content:space-between">',
      '<div style="font-size:15px;font-weight:800;color:#eee8f8">'+(isEdit?'Editar perfil':'Bienvenido a TFAPP')+'</div>',
      isEdit?'<button onclick="document.getElementById(\'tf-login-modal\').remove()" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;font-size:14px;display:grid;place-items:center;font-family:inherit">✕</button>':'',
    '</div>',
    !isEdit?'<p style="font-size:12px;color:#7a6e98;line-height:1.5">Crea tu perfil para usar todas las funciones de TFAPP.</p>':'',
    /* Avatar picker */
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px">',
      '<div id="tf-av-preview" style="width:72px;height:72px;border-radius:50%;background:rgba(109,36,217,.15);border:2px solid rgba(168,85,247,.3);display:grid;place-items:center;overflow:hidden;cursor:pointer" onclick="document.getElementById(\'tf-av-file\').click()">'+avatarPreview+'</div>',
      '<div style="font-size:10.5px;color:#7a6e98">Toca para cambiar foto</div>',
      '<input type="file" id="tf-av-file" accept="image/*" style="display:none"/>',
    '</div>',
    /* Name input */
    '<div>',
      '<div style="font-size:11px;color:#7a6e98;margin-bottom:6px;font-weight:600">Nombre de usuario</div>',
      '<input id="tf-login-name" type="text" placeholder="Tu nombre…" maxlength="24" value="'+(u&&u.name?u.name:'')+'" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;color:#eee8f8;font-size:13.5px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;outline:none;transition:border-color .14s" onfocus="this.style.borderColor=\'rgba(168,85,247,.4)\'" onblur="this.style.borderColor=\'rgba(255,255,255,.09)\'"/>',
    '</div>',
    !isEdit?[
    '<div>',
      '<div style="font-size:11px;color:#7a6e98;margin-bottom:6px;font-weight:600">Contraseña</div>',
      '<input id="tf-login-pass" type="password" placeholder="Mínimo 4 caracteres…" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 12px;color:#eee8f8;font-size:13.5px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;outline:none;transition:border-color .14s" onfocus="this.style.borderColor=\'rgba(168,85,247,.4)\'" onblur="this.style.borderColor=\'rgba(255,255,255,.09)\'"/>',
    '</div>',
    ].join(''):'',
    '<button id="tf-login-submit" style="padding:12px;border-radius:11px;background:linear-gradient(135deg,#6d24d9,#a855f7);border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;cursor:pointer;transition:opacity .12s">'+(isEdit?'Guardar cambios':'Crear perfil')+'</button>',
    '</div>'
  ].join('');

  document.body.appendChild(modal);

  /* Avatar file picker */
  var avFile=document.getElementById('tf-av-file');
  var avPreview=document.getElementById('tf-av-preview');
  var _newAvatar=u&&u.avatar?u.avatar:null;

  avFile.onchange=function(){
    var f=avFile.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(){
      _newAvatar=r.result;
      avPreview.innerHTML='<img src="'+r.result+'" style="width:72px;height:72px;border-radius:50%;object-fit:cover;display:block"/>';
    };
    r.readAsDataURL(f);
  };

  /* Submit */
  document.getElementById('tf-login-submit').onclick=function(){
    var name=(document.getElementById('tf-login-name').value||'').trim();
    if(!name){ TF.toast('Escribe tu nombre de usuario','err'); return; }
    if(!isEdit){
      var pass=(document.getElementById('tf-login-pass').value||'').trim();
      if(pass.length<4){ TF.toast('La contraseña debe tener al menos 4 caracteres','err'); return; }
      var saved=TF.getUser();
      if(saved&&saved.pass&&pass!==saved.pass){ TF.toast('Contraseña incorrecta','err'); return; }
      TF.saveUser({name:name,pass:pass,avatar:_newAvatar});
    } else {
      var existing=TF.getUser()||{};
      existing.name=name; existing.avatar=_newAvatar;
      TF.saveUser(existing);
    }
    modal.remove();
    TF.toast((isEdit?'Perfil actualizado':'¡Bienvenido, '+name+'!'),'ok');
    TF.updateProfileUI();
    if(onSuccess) onSuccess();
  };

  /* Close on backdrop */
  modal.onclick=function(e){ if(e.target===modal) modal.remove(); };
};

/* ── PROFILE WIDGET ── */
TF.injectProfile = function(){
  var u=TF.getUser();
  var lvl=TF.getLvl();
  var rank=TF.getRank(lvl);
  var pct=TF.xpPct();

  /* Look for existing profile widget in header */
  var existing=document.getElementById('tf-profile-widget');
  if(existing) existing.remove();

  var widget=document.createElement('div');
  widget.id='tf-profile-widget';
  widget.style.cssText='display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0';
  widget.title='Mi perfil';

  var avatarHtml=u&&u.avatar
    ? '<div style="position:relative;flex-shrink:0"><img src="'+u.avatar+'" style="width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(168,85,247,.4)"/><div style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:#4ade80;border:1.5px solid #06000d;box-shadow:0 0 4px #4ade80"></div></div>'
    : '<div style="position:relative;flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(109,36,217,.2);border:1.5px solid rgba(168,85,247,.3);display:grid;place-items:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.7)" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><div style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:#4ade80;border:1.5px solid #06000d;box-shadow:0 0 4px #4ade80"></div></div>';

  widget.innerHTML=avatarHtml;

  widget.onclick=function(){
    if(!u){ TF.showLogin(function(){ TF.injectProfile(); }); return; }
    TF.showProfilePanel();
  };

  /* Try to append to header right area */
  var hright=document.querySelector('.hright,.hdr-right,.hbtns');
  if(hright){ hright.prepend(widget); }
  else{
    var hdr=document.getElementById('hdr');
    if(hdr) hdr.appendChild(widget);
  }
};

TF.showProfilePanel = function(){
  if(document.getElementById('tf-profile-panel')) return;
  var u=TF.getUser()||{};
  var lvl=TF.getLvl();
  var rank=TF.getRank(lvl);
  var pct=TF.xpPct();
  var remaining=TF.MAX_LEVEL-lvl;

  var panel=document.createElement('div');
  panel.id='tf-profile-panel';
  panel.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center';

  panel.innerHTML=[
    '<div style="width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px;animation:loginIn .3s cubic-bezier(.22,1,.36,1) both">',
    /* Header */
    '<div style="display:flex;align-items:center;justify-content:space-between">',
      '<div style="font-size:14px;font-weight:800;color:#eee8f8">Mi perfil</div>',
      '<button onclick="document.getElementById(\'tf-profile-panel\').remove()" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;font-size:14px;display:grid;place-items:center;font-family:inherit">✕</button>',
    '</div>',
    /* Avatar + name */
    '<div style="display:flex;align-items:center;gap:12px">',
      u.avatar
        ? '<div style="position:relative"><img src="'+u.avatar+'" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.4)"/><div style="position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#4ade80;border:2px solid #06000d"></div></div>'
        : '<div style="width:52px;height:52px;border-radius:50%;background:rgba(109,36,217,.15);border:2px solid rgba(168,85,247,.3);display:grid;place-items:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>',
      '<div>',
        '<div style="font-size:15px;font-weight:800;color:#eee8f8">'+(u.name||'Usuario')+'</div>',
        '<div style="font-size:11.5px;color:#a855f7;margin-top:2px">'+rank.icon+' '+rank.label+'</div>',
      '</div>',
    '</div>',
    /* XP bar */
    '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px">',
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">',
        '<div style="font-size:11.5px;font-weight:700;color:#eee8f8">Nivel '+lvl+(lvl>=TF.MAX_LEVEL?' <span style=\'color:#4ade80\'>MAX</span>':'')+'</div>',
        '<div style="font-size:10.5px;color:#7a6e98">'+pct+'% completado</div>',
      '</div>',
      '<div style="height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden">',
        '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#6d24d9,#a855f7);border-radius:99px;transition:width .6s ease"></div>',
      '</div>',
      lvl<TF.MAX_LEVEL
        ? '<div style="font-size:10.5px;color:#7a6e98;margin-top:6px">'+(TF.MAX_LEVEL-lvl)+' niveles para el máximo · Rango actual: '+rank.rank+'</div>'
        : '<div style="font-size:10.5px;color:#4ade80;margin-top:6px;font-weight:700">🏆 ¡Nivel máximo! Eres GigaChad.</div>',
    '</div>',
    /* Actions */
    '<div style="display:flex;gap:8px">',
      '<button onclick="document.getElementById(\'tf-profile-panel\').remove();TF.showLogin(function(){TF.injectProfile();})" style="flex:1;padding:10px;border-radius:10px;background:rgba(109,36,217,.15);border:1px solid rgba(168,85,247,.25);color:#a855f7;font-size:12.5px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;cursor:pointer">✏️ Editar</button>',
      '<button onclick="if(confirm(\'¿Cerrar sesión?\')){localStorage.removeItem(\''+TF.KEY_USER+'\');document.getElementById(\'tf-profile-panel\').remove();TF.injectProfile();TF.toast(\'Sesión cerrada\');}" style="padding:10px;border-radius:10px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);color:#f43f5e;font-size:12.5px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;cursor:pointer">Salir</button>',

  ].join('');

TF.updateProfileUI = function(){
  TF.injectProfile();
};

/* ── INIT — call this at the end of each section's script ── */
TF.init = function(sectionKey){
  /* Inject nav */
  TF.injectNav(sectionKey);
  /* Inject profile widget */
  TF.injectProfile();
  /* Start XP ticker */
  TF.startTicker();
  /* Sync mini player every 3s */
  setInterval(TF.syncMini, 3000);
  /* Show login prompt if no user and section requires it */
  var user=TF.getUser();
  if(!user){
    setTimeout(function(){
      TF.showLogin();
    }, 800);
  }
};



function showAddShortcutModal(tabId){
  var ex=document.getElementById('tf-add-sc-modal');if(ex)ex.remove();
  var modal=document.createElement('div');modal.id='tf-add-sc-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=[
    '<div style="width:min(100%,360px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:13px">',
    '<div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:14px;font-weight:800;color:#fff">Nuevo acceso directo</div><button id="asc-x" style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;display:grid;place-items:center;font-size:15px">×</button></div>',
    '<div><div style="font-size:11px;color:#7a6e98;margin-bottom:5px;font-weight:600">Nombre</div><input id="asc-name" type="text" placeholder="Ej: Google Maps" maxlength="20" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:9px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none"/></div>',
    '<div><div style="font-size:11px;color:#7a6e98;margin-bottom:5px;font-weight:600">URL</div><input id="asc-url" type="url" placeholder="https://..." style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:9px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none"/></div>',
    '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:9px;border:1px solid rgba(255,255,255,.07);cursor:pointer" id="asc-ext-row">',
    '<div style="flex:1"><div style="font-size:12.5px;font-weight:600;color:#fff">Abrir externamente</div><div style="font-size:10.5px;color:#7a6e98;margin-top:1px">Abre en el navegador del sistema</div></div>',
    '<div id="asc-ext-tog" style="width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);position:relative;transition:background .2s"><div id="asc-ext-dot" style="position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:1px;left:1px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div></div>',
    '</div>',
    '<button id="asc-save" style="padding:12px;border-radius:10px;background:linear-gradient(135deg,#6d24d9,#a855f7);border:none;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer">Agregar</button>',
    '</div>'
  ].join('');
  document.body.appendChild(modal);
  var extOn=false;
  document.getElementById('asc-ext-row').onclick=function(){
    extOn=!extOn;
    document.getElementById('asc-ext-tog').style.background=extOn?'#7c3aed':'rgba(255,255,255,.1)';
    document.getElementById('asc-ext-dot').style.transform=extOn?'translateX(16px)':'none';
  };
  document.getElementById('asc-x').onclick=function(){modal.remove();};
  modal.onclick=function(e){if(e.target===modal)modal.remove();};
  document.getElementById('asc-save').onclick=function(){
    var nm=(document.getElementById('asc-name').value||'').trim();
    var url=(document.getElementById('asc-url').value||'').trim();
    if(!nm||!url){if(window.TF&&TF.toast)TF.toast('Completa nombre y URL','err');return;}
    if(!url.startsWith('http'))url='https://'+url;
    /* Limit to 4 custom shortcuts */
    var customs=window._getCustomShortcuts?window._getCustomShortcuts():[];
    if(customs.length>=4){if(window.TF&&TF.toast)TF.toast('Máximo 4 accesos directos','err');return;}
    customs.push({l:nm,u:extOn?('__ext__'+url):url,c:'#7c3aed'});
    if(window._saveCustomShortcuts)window._saveCustomShortcuts(customs);
    modal.remove();
    /* Re-render home */
    var rid=tabId||(window._activeId?window._activeId():0);
    if(window._renderHome&&rid)window._renderHome(rid);
    if(window.TF&&TF.toast)TF.toast('✓ Acceso directo guardado','ok',2200);
  };
}
