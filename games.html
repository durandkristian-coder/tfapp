<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TFGames</title>
<style>
:root{--bg:#02000a;--bg2:#0a001e;--bg3:#14003a;--ac:#a855f7;--ac2:#7c3aed;--pk:#e91e8c;--border:rgba(255,255,255,.06);--border2:rgba(168,85,247,.3);--glass:rgba(255,255,255,.04);--text:#f0eaf8;--muted:#7864a0;--soft:#1e1535;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;background:var(--bg);overflow-x:hidden}
#hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;background:rgba(2,0,10,.96);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 10px}
.h-srch{min-width:0}
.h-brand{display:flex;align-items:center;gap:7px;flex-shrink:0}
.h-brand img{width:28px;height:28px;border-radius:7px;object-fit:cover}
.h-brand-t{font-size:15px;font-weight:900;background:linear-gradient(90deg,#d8b4fe,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-srch{flex:1;height:33px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:99px;display:flex;align-items:center;padding:0 11px;gap:7px;transition:border-color .14s}
.h-srch:focus-within{border-color:rgba(168,85,247,.5)}
#sIn{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12.5px;font-family:inherit}
#sIn::placeholder{color:var(--muted)}
#sCl{display:none;background:none;border:none;cursor:pointer;padding:2px;color:var(--muted);line-height:0;flex-shrink:0}
#tabs{display:none}
.chip{display:none}
#page{padding-top:52px;padding-bottom:calc(76px + var(--sb))}
/* HERO */
#hero{position:relative;overflow:hidden;background:var(--bg2)}
.h-track{display:flex;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.h-slide{flex:0 0 100%;padding:12px 12px 0}
.h-card{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border2);background:var(--bg3)}
.h-img{width:100%;height:188px;object-fit:cover;display:block}
.h-img-ph{width:100%;height:188px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg3),#200060)}
.h-img-ph .l{font-size:52px;font-weight:900;opacity:.35;color:#fff;letter-spacing:-2px}
.h-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.2) 55%,transparent 100%);pointer-events:none}
.h-actions{position:absolute;top:8px;right:8px;display:flex;gap:5px}
.h-get{height:28px;padding:0 13px;border-radius:99px;border:none;font-size:10.5px;font-weight:800;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,var(--pk),var(--ac));color:#fff;box-shadow:0 4px 12px rgba(168,85,247,.4)}
.h-info{position:absolute;bottom:0;left:0;right:0;padding:12px}
.h-gen{display:inline-block;font-size:8px;font-weight:800;padding:2px 7px;border-radius:3px;background:rgba(168,85,247,.4);color:#ddd6fe;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.h-title{font-size:17px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.7)}
.h-meta{font-size:10px;color:rgba(255,255,255,.55);margin-top:3px}
.h-dots{display:flex;justify-content:center;gap:5px;padding:8px 0 12px}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .2s}
.dot.on{width:18px;border-radius:99px;background:var(--ac)}
/* SECTIONS */
.sec{padding:0 12px;margin-bottom:22px}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.s-ttl{font-size:13.5px;font-weight:800;background:linear-gradient(90deg,#f9a8d4,#e91e8c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-cnt{font-size:10px;color:var(--muted)}
/* HORIZONTAL ROW */
.hrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.hrow::-webkit-scrollbar{display:none}
.hc{flex:0 0 126px;cursor:pointer}
.hc:active{opacity:.8}
.hc-img-wrap{width:126px;height:82px;border-radius:10px;overflow:hidden;background:var(--soft);border:1px solid var(--border);position:relative;margin-bottom:5px}
.hc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.hc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--soft),#200050)}
.hc-ph .l{font-size:22px;font-weight:900;opacity:.45;color:#fff}
.hc-rat{position:absolute;bottom:3px;right:3px;height:16px;padding:0 5px;border-radius:4px;background:rgba(0,0,0,.78);font-size:9px;font-weight:800;display:flex;align-items:center;gap:2px}
.hc-name{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hc-sub{font-size:9px;color:var(--muted);margin-top:1px}
/* BIG GRID */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bgc{border-radius:11px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--soft)}
.bgc:active{opacity:.8}
.bgc-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.bgc-ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--soft),#200050)}
.bgc-ph .l{font-size:28px;font-weight:900;opacity:.4;color:#fff}
.bgc-body{padding:7px 9px 9px}
.bgc-name{font-size:11px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bgc-meta{display:flex;align-items:center;gap:5px;margin-top:3px}
.bgc-rat{font-size:9px;font-weight:700}
.bgc-cat{font-size:9px;color:var(--muted)}
/* LIST */
.glist{display:flex;flex-direction:column}
.gli{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.gli:last-child{border-bottom:none}
.gli:active{background:rgba(255,255,255,.02)}
.gli-n{font-size:8px;font-weight:800;color:var(--muted);width:16px;text-align:center;flex-shrink:0}
.gli-cover{width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--soft);flex-shrink:0;position:relative}
.gli-cover img{width:100%;height:100%;object-fit:cover;display:block}
.gli-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--soft),#200050)}
.gli-ph .l{font-size:16px;font-weight:900;opacity:.5;color:#fff}
.gli-info{flex:1;min-width:0}
.gli-name{font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gli-dev{font-size:10px;color:var(--muted);margin-top:1px}
.gli-stars{font-size:9.5px;margin-top:3px}
.gli-btn{flex-shrink:0;height:28px;padding:0 13px;border-radius:99px;border:1.5px solid rgba(168,85,247,.5);background:transparent;color:var(--ac);font-size:10.5px;font-weight:800;font-family:inherit;cursor:pointer}
.gli-btn:active{background:rgba(168,85,247,.1)}
/* OFFLINE */
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 12px}
.oc{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--soft);position:relative}
.oc:active{opacity:.8}
.oc-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.oc-ph{width:100%;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg3),#200050)}
.oc-ph .l{font-size:18px;font-weight:900;opacity:.4;color:#fff}
.oc-badge{position:absolute;top:3px;left:3px;font-size:7px;font-weight:800;padding:2px 4px;border-radius:3px;background:rgba(168,85,247,.9);color:#fff}
.oc-name{font-size:9px;font-weight:700;padding:4px 6px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* PLAT TAGS */
.ptag{display:inline-flex;align-items:center;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;margin:0 2px}
.ptag.pc{background:rgba(59,130,246,.15);color:#60a5fa}
.ptag.mobile{background:rgba(34,197,94,.15);color:#4ade80}
.ptag.console{background:rgba(249,115,22,.15);color:#fb923c}
/* DETAIL SHEET */
#det{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.77);backdrop-filter:blur(18px);display:none;align-items:flex-end;justify-content:center}
#det.open{display:flex}
#dbox{width:min(100%,520px);height:88vh;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:18px 18px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding-bottom:calc(20px + var(--sb))}
#dbox::-webkit-scrollbar{display:none}
.d-handle{width:32px;height:3px;border-radius:99px;background:rgba(255,255,255,.12);margin:10px auto 4px}
.d-banner{width:100%;height:155px;object-fit:cover;display:block;background:var(--bg3)}
.d-banner-ph{width:100%;height:155px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg3),#200060)}
.d-banner-ph .l{font-size:64px;font-weight:900;opacity:.3;color:#fff}
.d-top{display:flex;gap:12px;padding:14px 14px 10px;margin-top:-22px;position:relative;align-items:flex-end}
.d-ico{width:66px;height:66px;border-radius:14px;overflow:hidden;border:2.5px solid var(--bg2);flex-shrink:0;background:var(--soft);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.d-ico img{width:100%;height:100%;object-fit:cover;display:block}
.d-ico-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--soft),#200050)}
.d-ico-ph .l{font-size:24px;font-weight:900;opacity:.5;color:#fff}
.d-titles{flex:1;min-width:0;padding-bottom:2px}
.d-name{font-size:15px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-dev{font-size:10.5px;color:var(--muted);margin-top:2px}
.d-stats{display:flex;border-bottom:1px solid var(--border);padding:0 14px 12px}
.d-stat{flex:1;text-align:center;padding:6px 0}
.d-stat+.d-stat{border-left:1px solid var(--border)}
.d-sv{font-size:13px;font-weight:800}
.d-sl{font-size:8.5px;color:var(--muted);margin-top:1px}
.d-btns{display:flex;gap:7px;padding:11px 14px;border-bottom:1px solid var(--border)}
.d-btn{flex:1;height:40px;border-radius:10px;border:none;font-size:12.5px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.d-btn:active{opacity:.8}
.d-btn.pri{background:linear-gradient(135deg,var(--pk),var(--ac));color:#fff;box-shadow:0 4px 16px rgba(168,85,247,.3)}
.d-btn.sec{background:var(--glass);border:1px solid var(--border);color:var(--text)}
.d-dh{padding:11px 14px 4px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.d-desc{padding:0 14px 16px;font-size:12.5px;color:rgba(255,255,255,.65);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.d-plats{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 14px}
/* SEARCH */
#srch-sec{display:none;padding:0 12px}
.no-res{text-align:center;padding:40px;color:var(--muted);font-size:13px}
/* TOASTS */
#tst{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;width:max-content;max-width:90vw}
.te{background:rgba(6,0,14,.97);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 14px;font-size:12px;color:#fff;opacity:0;transform:translateY(5px);transition:all .17s}
.te.s{opacity:1;transform:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
</style>
</head>

  {id:'hollowknight',name:'Hollow Knight',dev:'Team Cherry',cat:'Metroidvania',plat:['pc','console'],rating:4.9,year:2017,desc:'Exploración subterránea en el reino de los insectos. Arte hecho a mano, 40+ horas de contenido.',img:'https://cdn.akamai.steamstatic.com/steam/apps/367520/header.jpg',steam:'https://store.steampowered.com/app/367520/',apk:'https://store.steampowered.com/app/367520/',play:null},
  {id:'stardew',name:'Stardew Valley',dev:'Eric Barone',cat:'Simulación',plat:['pc','mobile'],rating:4.9,year:2016,desc:'Granja pixelada con misterios, relaciones y exploración. El indie más querido de la última década.',img:'https://cdn.akamai.steamstatic.com/steam/apps/413150/header.jpg',steam:'https://store.steampowered.com/app/413150/',apk:'https://store.steampowered.com/app/413150/',play:'https://play.google.com/store/apps/details?id=com.chucklefish.stardewvalley'},

var state={tab:'Todo',hero:0,timer:null};

function toast(msg,ms){var el=document.createElement('div');el.className='te';el.textContent=msg;document.getElementById('tst').appendChild(el);requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('s');});});setTimeout(function(){el.classList.remove('s');setTimeout(function(){el.remove();},200);},ms||1800);}
function initials(n){var w=(n||'').trim().split(/\s+/);return w.length>1?w[0][0]+w[1][0]:(w[0]||'?').slice(0,2).toUpperCase();}
function ratingColor(r){var n=parseFloat(r);return n>=4.5?'#4ade80':n>=3.5?'#fbbf24':'#f87171';}
function starsStr(r){var n=Math.round(parseFloat(r||0));var s='';for(var i=0;i<5;i++)s+=i<n?'★':'☆';return s;}

function mkCover(g,cls,phCls){
  if(g.img){var img=document.createElement('img');img.className=cls;img.loading='lazy';img.alt='';img.src=g.img;img.onerror=function(){var ph=document.createElement('div');ph.className=phCls;var l=document.createElement('span');l.className='l';l.textContent=initials(g.name);ph.appendChild(l);if(img.parentNode)img.parentNode.replaceChild(ph,img);};return img;}
  var ph=document.createElement('div');ph.className=phCls;var l=document.createElement('span');l.className='l';l.textContent=initials(g.name);ph.appendChild(l);return ph;
}

function getLink(g){
  if(g.plat.includes('mobile')&&g.play)return g.play;
  if(g.plat.includes('mobile')&&g.apk)return g.apk;
  if(g.steam)return g.steam;
  if(g.apk)return g.apk;
  return 'https://apkpure.com/search?q='+encodeURIComponent(g.name);
}
function doDownload(g){window.open(getLink(g),'_blank','noopener');toast('Abriendo…');}

/* ── HERO ── */
function buildHero(games){
  var items=games.slice(0,6);var track=document.getElementById('hTrack');var dots=document.getElementById('hDots');
  if(!track)return;track.innerHTML='';dots.innerHTML='';
  items.forEach(function(g,i){
    var slide=document.createElement('div');slide.className='h-slide';
    var card=document.createElement('div');card.className='h-card';
    var coverEl=mkCover(g,'h-img','h-img-ph');card.appendChild(coverEl);
    var grad=document.createElement('div');grad.className='h-grad';card.appendChild(grad);
    var acts=document.createElement('div');acts.className='h-actions';
    var gb=document.createElement('button');gb.className='h-get';gb.textContent='Obtener';
    gb.onclick=function(e){e.stopPropagation();doDownload(g);};acts.appendChild(gb);card.appendChild(acts);
    var info=document.createElement('div');info.className='h-info';
    var gen=document.createElement('div');gen.className='h-gen';gen.textContent=g.cat;
    var tn=document.createElement('div');tn.className='h-title';tn.textContent=g.name;
    var meta=document.createElement('div');meta.className='h-meta';meta.textContent=g.dev+' · ⭐ '+g.rating+' · '+g.year;
    info.appendChild(gen);info.appendChild(tn);info.appendChild(meta);card.appendChild(info);
    card.onclick=function(){openDetail(g);};
    slide.appendChild(card);track.appendChild(slide);
    var dot=document.createElement('div');dot.className='dot'+(i===0?' on':'');dot.onclick=function(){goHero(i);};dots.appendChild(dot);
  });
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(function(){goHero((state.hero+1)%items.length);},5000);
}
function goHero(i){state.hero=i;var t=document.getElementById('hTrack');if(t)t.style.transform='translateX(-'+(i*100)+'%)';document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('on',j===i);});}

/* ── TABS ── */
function buildTabs(){var el=document.getElementById('tabs');el.innerHTML='';CATS.forEach(function(c){var btn=document.createElement('button');btn.className='chip'+(c===state.tab?' on':'');btn.textContent=c;btn.onclick=function(){state.tab=c;document.getElementById('sIn').value='';document.getElementById('sCl').style.display='none';document.getElementById('srch-sec').style.display='none';document.getElementById('cnt').style.display='';document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});btn.classList.add('on');render();};el.appendChild(btn);});}

/* ── FILTER ── */
function filterGames(q){
  if(!q)return GAMES;
  q=q.toLowerCase();
  return GAMES.filter(function(g){return g.name.toLowerCase().includes(q)||g.cat.toLowerCase().includes(q)||g.dev.toLowerCase().includes(q);});
}
function tabGames(){
  if(state.tab==='Todo')return GAMES;
  if(state.tab==='PC')return GAMES.filter(function(g){return g.plat.includes('pc');});
  if(state.tab==='Móvil')return GAMES.filter(function(g){return g.plat.includes('mobile');});
  var catMap={Acción:'Acción',RPG:'RPG',Disparos:'Disparos',Estrategia:'Estrategia',Aventura:'Aventura'};
  return GAMES.filter(function(g){return g.cat===catMap[state.tab]||(g.cat&&g.cat.includes(catMap[state.tab]));});
}

/* ── RENDER ── */
function render(){
  var cnt=document.getElementById('cnt');cnt.innerHTML='';
  if(state.tab==='Sin Conexión'){renderOffline(cnt);return;}
  var games=tabGames();
  // HERO
  buildHero(games.slice(0,6));
  // Horizontal row — top rated
  renderHRow(cnt,'Más populares',games.slice(0,10));

<script>
/* TFGAMES EXTRA: Profile + Admin + Firebase */
var DB = 'https://tfapp-626ed-default-rtdb.firebaseio.com';
var IMGBB_KEY = '5b19d0b6dc77db62f9e15ee47c8aae2e';
var _isAdmin = localStorage.getItem('tfg_admin') === '1';
var _editingId = null; /* null = new game, string = editing existing */
var _uploadCoverB64 = null;

/* ── Profile UI ── */
function showProfileOrLogin(){
  var u=null;try{u=JSON.parse(localStorage.getItem('tfapp_user')||'null');}catch(e){}
  if(!u){if(typeof TF!=='undefined'&&TF.showLogin)TF.showLogin(function(){updateProfileUI();});return;}
  if(typeof TF!=='undefined'&&TF.showProfilePanel){TF.showProfilePanel();return;}
  var lvl=parseInt(localStorage.getItem('tfapp_level')||'1');if(lvl>25)lvl=25;
  var xp=parseInt(localStorage.getItem('tfapp_xp')||'0');
  var pct=lvl>=25?100:Math.min(100,Math.round((xp/1800)*100));
  var ranks=[{min:1,max:5,label:'Rango I'},{min:6,max:10,label:'Rango II'},{min:11,max:15,label:'Rango III'},{min:16,max:20,label:'Rango IV'},{min:21,max:25,label:'GigaChad'}];
  var rank=ranks[4];for(var ri=0;ri<ranks.length;ri++){if(lvl>=ranks[ri].min&&lvl<=ranks[ri].max){rank=ranks[ri];break;}}
  var isMax=lvl>=25;
  var panel=document.createElement('div');
  panel.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center';
  var box=document.createElement('div');
  box.style.cssText='width:min(100%,440px);background:rgba(6,0,13,.99);border:1px solid rgba(255,255,255,.09);border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;gap:14px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))';
  var hRow=document.createElement('div');hRow.style.cssText='display:flex;align-items:center;justify-content:space-between';
  var pTitle=document.createElement('div');pTitle.style.cssText='font-size:14px;font-weight:800';pTitle.textContent='Mi perfil';
  var pClose=document.createElement('button');pClose.style.cssText='width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);cursor:pointer;color:#7a6e98;font-size:14px;display:grid;place-items:center;font-family:inherit';pClose.textContent='x';pClose.onclick=function(){panel.remove();};
  hRow.appendChild(pTitle);hRow.appendChild(pClose);box.appendChild(hRow);
  var uRow=document.createElement('div');uRow.style.cssText='display:flex;align-items:center;gap:12px';
  var avWrap=document.createElement('div');avWrap.style.cssText='position:relative;flex-shrink:0';
  if(u&&u.avatar){var avEl=document.createElement('img');avEl.src=u.avatar;avEl.style.cssText='width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.4)';avWrap.appendChild(avEl);var onDot=document.createElement('div');onDot.style.cssText='position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#4ade80;border:2px solid #06000d';avWrap.appendChild(onDot);}
  uRow.appendChild(avWrap);
  var uInfo=document.createElement('div');
  var uName=document.createElement('div');uName.style.cssText='font-size:15px;font-weight:800;color:#eee8f8';uName.textContent=(u&&u.name)||'Usuario';
  var uRank=document.createElement('div');uRank.style.cssText='font-size:11.5px;color:#a855f7;margin-top:2px';uRank.textContent=rank.label;
  uInfo.appendChild(uName);uInfo.appendChild(uRank);uRow.appendChild(uInfo);box.appendChild(uRow);
  var xpBox=document.createElement('div');xpBox.style.cssText='background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px';
  var xpRow=document.createElement('div');xpRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:7px';
  var xpL=document.createElement('div');xpL.style.cssText='font-size:11.5px;font-weight:700;color:#eee8f8';xpL.textContent='Nivel '+lvl+(isMax?' MAX':'');
  var xpP=document.createElement('div');xpP.style.cssText='font-size:10.5px;color:#7a6e98';xpP.textContent=pct+'% completado';
  xpRow.appendChild(xpL);xpRow.appendChild(xpP);
  var barWrap=document.createElement('div');barWrap.style.cssText='height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden';
  var bar=document.createElement('div');bar.style.cssText='height:100%;background:linear-gradient(90deg,#6d24d9,#a855f7);border-radius:99px;width:'+pct+'%';
  barWrap.appendChild(bar);xpBox.appendChild(xpRow);xpBox.appendChild(barWrap);
  var xpSub=document.createElement('div');xpSub.style.cssText='font-size:10.5px;color:#7a6e98;margin-top:6px';
  xpSub.textContent=isMax?'Nivel maximo! Eres GigaChad.':(25-lvl)+' niveles para el maximo - '+rank.label;
  xpBox.appendChild(xpSub);box.appendChild(xpBox);
  panel.appendChild(box);document.body.appendChild(panel);
  panel.onclick=function(e){if(e.target===panel)panel.remove();};
}
function updateProfileUI(){
  var u = null;
  try { u = JSON.parse(localStorage.getItem('tfapp_user') || 'null'); } catch(e){}
  var img = document.getElementById('hProfileImg');
  var svg = document.getElementById('hProfileSvg');
  var dot = document.getElementById('hOnlineDot');
  if(u && u.avatar && img){
    img.src = u.avatar; img.style.display = 'block';
    if(svg) svg.style.display = 'none';
    if(dot) dot.style.display = 'block';
  } else {
    if(img) img.style.display = 'none';
    if(svg) svg.style.display = 'block';
    if(dot) dot.style.display = 'none';
  }
}
updateProfileUI();

/* ── Logo → Admin Modal ── */
document.getElementById('hBrand').onclick = function(){ openAdminModal(); };

function openAdminModal(){
  var m = document.getElementById('adminModal');
  m.style.display = 'flex';
  if(_isAdmin){
    document.getElementById('adminPassPanel').style.display = 'none';
    showAdminPanel();
  } else {
    document.getElementById('adminPassPanel').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminPassInp').value = '';
  }
}
function closeAdminModal(){ document.getElementById('adminModal').style.display = 'none'; }
document.getElementById('adminModal').onclick = function(e){ if(e.target === this) closeAdminModal(); };

function checkAdminPass(){
  var pw = (document.getElementById('adminPassInp').value || '').trim().toUpperCase();
  if(pw === 'TFSTAFF'){
    _isAdmin = true;
    localStorage.setItem('tfg_admin','1');
    showAdminPanel();
  } else {
    document.getElementById('adminPassInp').value = '';
    document.getElementById('adminPassInp').placeholder = 'Contraseña incorrecta...';
    setTimeout(function(){ document.getElementById('adminPassInp').placeholder = 'Contraseña de staff...'; }, 1500);
  }
}
document.getElementById('adminPassInp').addEventListener('keydown', function(e){ if(e.key === 'Enter') checkAdminPass(); });

function showAdminPanel(){
  document.getElementById('adminPassPanel').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'flex';
  loadAdminGamesList();
}

/* ── Load admin games list for editing ── */
function loadAdminGamesList(){
  var el = document.getElementById('adminGamesList');
  el.innerHTML = '<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px">Cargando juegos personalizados...</div>';
  fetch(DB + '/customGames.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      el.innerHTML = '';
      if(!data || !Object.keys(data).length){
        el.innerHTML = '<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px">Sin juegos publicados aún</div>';
        return;
      }
      Object.entries(data).forEach(function(entry){
        var id = entry[0], g = entry[1];
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)';
        var ico = document.createElement('div');
        ico.style.cssText = 'width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--soft)';
        if(g.img){ var img = document.createElement('img'); img.src = g.img; img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block'; ico.appendChild(img); }
        var info = document.createElement('div'); info.style.cssText = 'flex:1;min-width:0';
        var nm = document.createElement('div'); nm.style.cssText = 'font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'; nm.textContent = g.name;
        var cat = document.createElement('div'); cat.style.cssText = 'font-size:10px;color:var(--muted);margin-top:1px'; cat.textContent = g.cat + ' · ' + g.year;
        info.appendChild(nm); info.appendChild(cat);
        var editBtn = document.createElement('button');
        editBtn.style.cssText = 'height:26px;padding:0 10px;border-radius:7px;border:1px solid rgba(168,85,247,.4);background:transparent;color:var(--ac);font-size:10px;font-weight:800;font-family:-apple-system,sans-serif;cursor:pointer;flex-shrink:0';
        editBtn.textContent = 'Editar';
        editBtn.onclick = (function(gid, gg){ return function(){ openEditGame(gid, gg); }; })(id, g);
        var delBtn = document.createElement('button');
        delBtn.style.cssText = 'height:26px;padding:0 10px;border-radius:7px;border:1px solid rgba(244,63,94,.3);background:transparent;color:#f43f5e;font-size:10px;font-weight:800;font-family:-apple-system,sans-serif;cursor:pointer;flex-shrink:0';
        delBtn.textContent = 'Borrar';
        delBtn.onclick = (function(gid, gname){ return function(){
          if(!confirm('Borrar "'+gname+'"?')) return;
          fetch(DB+'/customGames/'+gid+'.json',{method:'DELETE'}).then(function(){
            loadAdminGamesList(); loadCustomGames(); toast('Juego eliminado');
          });
        }; })(id, g.name);
        row.appendChild(ico); row.appendChild(info); row.appendChild(editBtn); row.appendChild(delBtn);
        el.appendChild(row);
      });
    })
    .catch(function(){ el.innerHTML = '<div style="font-size:11px;color:#f43f5e;text-align:center;padding:8px">Error al cargar</div>'; });
}

/* ── Upload / Edit Game ── */
function openUploadGame(){
  _editingId = null;
  _uploadCoverB64 = null;
  document.getElementById('uploadModalTitle').textContent = 'Subir nuevo juego';
  document.getElementById('submitGameBtn').textContent = 'Publicar juego';
  clearUploadForm();
  document.getElementById('uploadModal').style.display = 'flex';
  document.getElementById('adminModal').style.display = 'none';
}
function openEditGame(id, g){
  _editingId = id;
  _uploadCoverB64 = g.img || null;
  document.getElementById('uploadModalTitle').textContent = 'Editar juego';
  document.getElementById('submitGameBtn').textContent = 'Guardar cambios';
  /* Fill fields */
  document.getElementById('gfName').value = g.name || '';
  document.getElementById('gfDev').value = g.dev || '';
  document.getElementById('gfCat').value = g.cat || 'Acción';
  document.getElementById('gfYear').value = g.year || new Date().getFullYear();
  document.getElementById('gfRating').value = g.rating || 4.0;
  document.getElementById('gfPlat').value = (g.plat||['mobile']).join(',');
  document.getElementById('gfDesc').value = g.desc || '';
  document.getElementById('gfLink').value = g.link || '';
  var cp = document.getElementById('coverPreview');
  if(g.img){ cp.src = g.img; cp.style.display = 'block'; }
  else { cp.style.display = 'none'; }
  document.getElementById('uploadModal').style.display = 'flex';
  document.getElementById('adminModal').style.display = 'none';
}
function clearUploadForm(){
  ['gfName','gfDev','gfYear','gfRating','gfDesc','gfLink','gfMobileLink'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('coverPreview').src = '';
  document.getElementById('gameImgFile').value = '';
}
function closeUploadModal(){ document.getElementById('uploadModal').style.display = 'none'; }
document.getElementById('uploadModal').onclick = function(e){ if(e.target === this) closeUploadModal(); };

function previewGameImg(input){
  var f = input.files[0]; if(!f) return;
  var reader = new FileReader();
  reader.onload = function(){
    _uploadCoverB64 = reader.result;
    var cp = document.getElementById('coverPreview');
    cp.src = reader.result; cp.style.display = 'block';
  };
  reader.readAsDataURL(f);
}

async function submitGame(){
  var name = (document.getElementById('gfName').value||'').trim();
  var dev = (document.getElementById('gfDev').value||'').trim();
  var cat = document.getElementById('gfCat').value;
  var year = parseInt(document.getElementById('gfYear').value||0);
  var rating = parseFloat(document.getElementById('gfRating').value||0);
  var platRaw = document.getElementById('gfPlat').value;
  var desc = (document.getElementById('gfDesc').value||'').trim();
  var link = (document.getElementById('gfLink').value||'').trim();
  var mobileLink = (document.getElementById('gfMobileLink').value||'').trim();

  if(!name||!dev||!year||!rating||!desc||!link){ toast('Completa todos los campos obligatorios','err'); return; }
  if(!_uploadCoverB64){ toast('Selecciona una portada','err'); return; }
  if(rating < 1 || rating > 5){ toast('Rating debe ser entre 1 y 5','err'); return; }

  var btn = document.getElementById('submitGameBtn');
  btn.textContent = 'Subiendo...'; btn.disabled = true;

  /* Upload image to imgBB */
  var imgUrl = _uploadCoverB64;
  try {
    var b64 = _uploadCoverB64.split(',')[1] || _uploadCoverB64;
    var fd = new FormData(); fd.append('image', b64);
    var r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
    var d = await r.json();
    if(d.success && d.data && d.data.url) imgUrl = d.data.url;
  } catch(e){ /* keep base64 if imgbb fails */ }

  var gameData = {
    name:name, dev:dev, cat:cat, year:year, rating:rating,
    plat:platRaw.split(','), desc:desc, link:link,
    mobileLink:mobileLink||null,
    img:imgUrl, ts:Date.now()
  };

  var isBuiltin=_editingId&&_editingId.startsWith('builtin_');
  var fbId,path;
  if(isBuiltin){fbId=_editingId.replace('builtin_','');path=DB+'/gameOverrides/'+fbId+'.json';}
  else if(_editingId){fbId=_editingId;path=DB+'/customGames/'+fbId+'.json';}
  else{fbId=Date.now()+'_'+Math.random().toString(36).slice(2,6);path=DB+'/customGames/'+fbId+'.json';}

  try {
    await fetch(path, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(gameData)});
    toast(isBuiltin?'Cambios aplicados para todos':(_editingId?'Juego actualizado':'Juego publicado'),'ok');
    closeUploadModal();
    loadCustomGames();
    loadAdminGamesList();
    btn.textContent = _editingId ? 'Guardar cambios' : 'Publicar juego';
    btn.disabled = false;
    _editingId = null;
  } catch(e){
    toast('Error al guardar: '+e.message, 'err');
    btn.textContent = _editingId ? 'Guardar cambios' : 'Publicar juego';
    btn.disabled = false;
  }
}

/* ── Load Custom Games from Firebase ── */
var _customGames = [];
function loadCustomGames(){
  fetch(DB+'/customGames.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      _customGames = [];
      if(!data) return;
      Object.entries(data).forEach(function(entry){
        var g = entry[1];
        g._fbId = entry[0];
        g._custom = true;
        g.apk = g.link; g.play = g.link; g.steam = null;
        _customGames.push(g);
      });
      _customGames.sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
      renderCustomSection();
    })
    .catch(function(){});
}

function renderCustomSection(){
  var existing = document.getElementById('customSec');
  if(existing) existing.remove();
  if(!_customGames.length) return;
  var cnt = document.getElementById('cnt');
  if(!cnt) return;
  var sec = document.createElement('div');
  sec.id = 'customSec'; sec.className = 'sec';
  sec.style.cssText = 'order:-1;margin-bottom:20px';
  var hdr = document.createElement('div'); hdr.className = 's-hdr';
  var t = document.createElement('span'); t.className = 's-ttl';
  t.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--ac)" stroke-width="2.2" stroke-linecap="round" style="vertical-align:middle;margin-right:4px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>Juegos recientes';
  hdr.appendChild(t); sec.appendChild(hdr);
  var list = document.createElement('div'); list.className = 'glist';
  _customGames.forEach(function(g, i){
    var item = document.createElement('div'); item.className = 'gli';
    var n = document.createElement('div'); n.className = 'gli-n'; n.textContent = i+1; item.appendChild(n);
    var cover = document.createElement('div'); cover.className = 'gli-cover';
    if(g.img){
      var img = document.createElement('img'); img.src = g.img; img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      img.onerror = function(){ cover.innerHTML = '<div class="gli-ph"><span class="l">'+initials(g.name)+'</span></div>'; };
      cover.appendChild(img);
    } else { cover.innerHTML = '<div class="gli-ph"><span class="l">'+initials(g.name)+'</span></div>'; }
    var info = document.createElement('div'); info.className = 'gli-info';
    var nm = document.createElement('div'); nm.className = 'gli-name'; nm.textContent = g.name;
    var dv = document.createElement('div'); dv.className = 'gli-dev'; dv.textContent = g.dev+' · '+g.cat;
    var st = document.createElement('div'); st.className = 'gli-stars'; st.style.color = ratingColor(g.rating); st.textContent = starsStr(g.rating)+' '+g.rating+' · '+g.year;
    info.appendChild(nm); info.appendChild(dv); info.appendChild(st);
    var btn = document.createElement('button'); btn.className = 'gli-btn'; btn.textContent = 'Obtener';
    btn.onclick = function(e){ e.stopPropagation(); window.open(g.link,'_blank','noopener'); toast('Abriendo...'); };
    item.appendChild(cover); item.appendChild(info); item.appendChild(btn);
    item.onclick = function(){
      /* Custom game detail */
      var g2 = Object.assign({}, g);
      g2.plat = Array.isArray(g2.plat) ? g2.plat : [g2.plat||'mobile'];
      openDetail(g2);
    };
    list.appendChild(item);
  });
  sec.appendChild(list);
  /* Insert at top of cnt */
  if(cnt.firstChild) cnt.insertBefore(sec, cnt.firstChild);
  else cnt.appendChild(sec);
}

/* Override doDownload for custom games */
var _origDoDownload = doDownload;
doDownload = function(g){
  if(g._custom && g.link){window.open(g.link,'_blank','noopener');toast('Abriendo...');return;}
  if(g._overridden && g._overrideLink){window.open(g._overrideLink,'_blank','noopener');toast('Abriendo...');return;}
  _origDoDownload(g);
};

/* Init: load custom games + overrides from Firebase */
loadCustomGames();
loadGameOverrides();
function loadGameOverrides(){
  fetch(DB+'/gameOverrides.json').then(function(r){return r.json();}).then(function(data){
    if(!data)return;
    Object.entries(data).forEach(function(entry){
      var id=entry[0],ov=entry[1];
      var game=GAMES.find(function(g){return g.id===id;});
      if(!game)return;
      if(ov.img)game.img=ov.img;
      if(ov.link){game.apk=ov.link;game.steam=null;game.play=null;game._overrideLink=ov.link;}
      if(ov.name)game.name=ov.name;if(ov.dev)game.dev=ov.dev;if(ov.cat)game.cat=ov.cat;
      if(ov.year)game.year=ov.year;if(ov.rating)game.rating=ov.rating;if(ov.desc)game.desc=ov.desc;
      if(ov.plat)game.plat=Array.isArray(ov.plat)?ov.plat:[ov.plat];
      game._overridden=true;
    });
    render();
  }).catch(function(){});
}
